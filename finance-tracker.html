async function resetAll() {
  // Profile-scoped reset when cloud is active (multi-profile mode)
  if (cloud.user && cloud.activeProfileId) {
    const profile = cloud.profiles.find(p => p.id === cloud.activeProfileId);
    const profileName = profile?.name || 'this profile';
    if (!confirm(`Delete ALL data in profile "${profileName}" ONLY?\n\nOther profiles will NOT be affected.\n\nThis wipes both local cache AND cloud data for this profile. Cannot be undone.`)) return;
    const typed = prompt(`Type the profile name to confirm: "${profileName}"`);
    if (typed !== profileName) { toast('Name did not match — cancelled','info'); return; }
    toast(`Wiping "${profileName}"…`, 'info');
    // Delete only this profile's records locally
    for (const s of STORES) {
      const all = await dbAll(s);
      const ids = all.filter(r => r.profileId === cloud.activeProfileId).map(r => r.id);
      if (ids.length) await dbBulkDel(s, ids);
    }
    // Delete from cloud — one DELETE per table scoped by profile_id
    try {
      for (const key of Object.keys(TABLE_MAP)) {
        const map = TABLE_MAP[key];
        await cloud.client.from(map.table).delete().eq('profile_id', cloud.activeProfileId);
      }
    } catch (err) { console.warn('Cloud reset partial failure:', err.message); }
    // Clear sync timestamps
    localStorage.removeItem(getLastSyncKey());
    // Clear outbox (in case there were pending ops)
    outbox.pending = outbox.pending.filter(op => false);
    outbox.save();
    // Re-init defaults (categories, settings, tax flags) for this profile
    clearStateArrays();
    await initIfFirstRun();
    applyTheme();
    toast(`Profile "${profileName}" cleared`,'success');
    renderCurrent();
    return;
  }
  // Offline-only mode: legacy full wipe (no profiles concept)
  if (!confirm('Delete EVERYTHING in local storage? Cannot be undone.')) return;
  if (!confirm('Are you absolutely sure?')) return;
  for (const s of STORES) await dbClear(s);
  clearStateArrays();
  await initIfFirstRun();
  applyTheme();
  toast('All data cleared','success');
  renderCurrent();
}

/* ============================================================
   SPRINT 3 — FINANCIAL HEALTH (24 RATIOS)
============================================================ */

function getSelfAge() {
  const self = state.people.find(p => p.relationship === 'Self');
  if (!self || !self.dob) return null;
  return Math.floor((todayDate() - new Date(self.dob)) / (365.25 * 86400000));
}

function getAnnualIncome() {
  // Last 12 months of settled income
  const cutoff = addDays(today(), -365);
  return state.transactions
    .filter(t => t.status === 'Settled' && t.type === 'income' && t.date >= cutoff)
    .reduce((s,t) => s + +t.amount, 0);
}

function getAnnualExpenses() {
  const cutoff = addDays(today(), -365);
  return state.transactions
    .filter(t => t.status === 'Settled' && t.type === 'expense' && t.date >= cutoff)
    .reduce((s,t) => s + +t.amount, 0);
}

function getMonthlyIncome() { return getAnnualIncome() / 12; }
function getMonthlyExpenses() { return getAnnualExpenses() / 12; }

function getMonthlyEssentialExpenses() {
  const cutoff = addDays(today(), -365);
  const essentialCats = state.categories.filter(c => c.kind === 'expense' && c.essential).map(c => c.name);
  return state.transactions
    .filter(t => t.status === 'Settled' && t.type === 'expense' && t.date >= cutoff && essentialCats.includes(t.category))
    .reduce((s,t) => s + +t.amount, 0) / 12;
}

function getMonthlyDiscretionary() {
  const cutoff = addDays(today(), -365);
  const essentialCats = state.categories.filter(c => c.kind === 'expense' && c.essential).map(c => c.name);
  return state.transactions
    .filter(t => t.status === 'Settled' && t.type === 'expense' && t.date >= cutoff && !essentialCats.includes(t.category))
    .reduce((s,t) => s + +t.amount, 0) / 12;
}

function getTotalLiquid() {
  return state.accounts
    .filter(a => a.status === 'Active' && !['Fixed Deposit','Recurring Deposit'].includes(a.type))
    .reduce((s,a) => s + +a.balance, 0);
}

function getTotalDeposits() {
  return state.accounts
    .filter(a => a.status === 'Active' && ['Fixed Deposit','Recurring Deposit'].includes(a.type))
    .reduce((s,a) => s + +a.balance, 0);
}

function getTotalInvestments() {
  return state.investments
    .filter(i => i.status !== 'Closed')
    .reduce((s,i) => s + +(i.currentValue || i.invested || 0), 0);
}

function getTotalAssets() { return getTotalLiquid() + getTotalDeposits() + getTotalInvestments(); }

function getTotalLoanOutstanding() {
  return state.loans.filter(l => l.status === 'Active').reduce((s,l) => s + +l.outstanding, 0);
}

function getTotalCardOutstanding() {
  return state.cards.filter(c => c.status !== 'Closed').reduce((s,c) => s + getCardOutstanding(c.id), 0);
}

function getTotalLiabilities() { return getTotalLoanOutstanding() + getTotalCardOutstanding(); }

function getNetWorth() { return getTotalAssets() - getTotalLiabilities(); }

function getTotalEMIs() {
  return state.loans.filter(l => l.status === 'Active').reduce((s,l) => s + +(l.currentEmi || l.originalEmi || 0), 0);
}

function getCardMinPayments() {
  const pct = (state.settings.cardMinPaymentPct || 5) / 100;
  return state.cards.filter(c => c.status !== 'Closed').reduce((s,c) => {
    const out = getCardOutstanding(c.id);
    return s + (out > 0 ? Math.max(out * pct, 100) : 0);
  }, 0);
}

function getMonthlyInvestments() {
  // Sum of category="Investment" expenses + SIP amounts from investments
  const cutoff = addDays(today(), -365);
  const txnInvestments = state.transactions
    .filter(t => t.status === 'Settled' && t.type === 'expense' && t.date >= cutoff && t.category === 'Investment')
    .reduce((s,t) => s + +t.amount, 0) / 12;
  return txnInvestments;
}

function getLifeInsuranceCover() {
  return state.insurance
    .filter(i => i.status === 'Active' && i.type === 'Term Life')
    .reduce((s,i) => s + +i.cover, 0);
}

function getInvestmentByAssetClass() {
  const result = { Equity: 0, Debt: 0, Hybrid: 0, Gold: 0, 'Real Estate': 0, Cash: 0, Crypto: 0, Other: 0 };
  state.investments.filter(i => i.status !== 'Closed').forEach(i => {
    const cls = i.assetClass || defaultAssetClass(i.type);
    result[cls] = (result[cls] || 0) + +(i.currentValue || i.invested || 0);
  });
  return result;
}

function getRetirementCorpus() {
  return state.investments
    .filter(i => i.status !== 'Closed' && (i.purpose === 'Retirement' || ['EPF','PPF','NPS'].includes(i.type)))
    .reduce((s,i) => s + +(i.currentValue || i.invested || 0), 0);
}

function getMonthlyHousingCost() {
  const cutoff = addDays(today(), -365);
  return state.transactions
    .filter(t => t.status === 'Settled' && t.type === 'expense' && t.date >= cutoff && t.category === 'Housing')
    .reduce((s,t) => s + +t.amount, 0) / 12;
}

function getHomeLoanEMI() {
  return state.loans.filter(l => l.status === 'Active' && l.type === 'Home').reduce((s,l) => s + +(l.currentEmi || l.originalEmi || 0), 0);
}

/* Ratio definitions */
function computeAllRatios() {
  const age = getSelfAge();
  const monthIncome = getMonthlyIncome();
  const annualIncome = getAnnualIncome();
  const annualExpenses = getAnnualExpenses();
  const monthEssential = getMonthlyEssentialExpenses();
  const monthDisc = getMonthlyDiscretionary();
  const totEmi = getTotalEMIs();
  const cardMins = getCardMinPayments();
  const cardLimit = state.cards.filter(c => c.status !== 'Closed').reduce((s,c) => s + +c.limit, 0);
  const cardOut = getTotalCardOutstanding();
  const liquid = getTotalLiquid();
  const liab = getTotalLiabilities();
  const assets = getTotalAssets();
  const nw = getNetWorth();
  const invValue = getTotalInvestments();
  const lifeCover = getLifeInsuranceCover();
  const allocation = getInvestmentByAssetClass();
  const retirement = getRetirementCorpus();
  const homeLoanEmi = getHomeLoanEMI();
  const housingCost = getMonthlyHousingCost();
  const monthInv = getMonthlyInvestments();

  const ratios = [];

  // A. SOLVENCY
  const dti = monthIncome > 0 ? (totEmi + cardMins) / monthIncome * 100 : null;
  ratios.push({ id:'dti', category:'Solvency', name:'Debt-to-Income (DTI)', value: dti, format:'%', formula:'(EMIs + Card min) / Monthly income',
    benchmark:'<36%', status: dti === null ? null : dti < 20 ? 'green' : dti < 36 ? 'green' : dti < 43 ? 'yellow' : 'red',
    weight: 1.5, description: 'What portion of income goes to debt servicing. Banks use this to assess loan eligibility.' });

  const emiRatio = monthIncome > 0 ? totEmi / monthIncome * 100 : null;
  ratios.push({ id:'emiRatio', category:'Solvency', name:'EMI-to-Income', value: emiRatio, format:'%', formula:'Total EMIs / Monthly income',
    benchmark:'<40%', status: emiRatio === null ? null : emiRatio < 30 ? 'green' : emiRatio < 40 ? 'green' : emiRatio < 50 ? 'yellow' : 'red',
    weight: 1.5, description: 'Indian banks won\'t approve new loans if total EMIs exceed 50% of take-home.' });

  const debtAsset = assets > 0 ? liab / assets * 100 : null;
  ratios.push({ id:'debtAsset', category:'Solvency', name:'Debt-to-Asset', value: debtAsset, format:'%', formula:'Total Liabilities / Total Assets',
    benchmark:'<50%', status: debtAsset === null ? null : debtAsset < 30 ? 'green' : debtAsset < 50 ? 'green' : debtAsset < 70 ? 'yellow' : 'red',
    weight: 1, description: 'How much of your asset value is funded by debt. >100% means negative net worth.' });

  const solvency = assets > 0 ? nw / assets * 100 : null;
  ratios.push({ id:'solvency', category:'Solvency', name:'Solvency Ratio', value: solvency, format:'%', formula:'Net Worth / Total Assets',
    benchmark:'>50%', status: solvency === null ? null : solvency > 50 ? 'green' : solvency > 30 ? 'yellow' : 'red',
    weight: 1, description: 'What % of your assets you actually OWN (vs financed).' });

  // B. LIQUIDITY
  const efr = monthEssential > 0 ? liquid / monthEssential : null;
  ratios.push({ id:'efr', category:'Liquidity', name:'Emergency Fund Ratio', value: efr, format:'months', formula:'Liquid Assets / Monthly Essential Expenses',
    benchmark:'3-6 months', status: efr === null ? null : efr >= 6 ? 'green' : efr >= 3 ? 'green' : efr >= 1 ? 'yellow' : 'red',
    weight: 2, description: 'How many months you can survive without income.' });

  const liquidNW = liquid - cardOut;
  ratios.push({ id:'liquidNW', category:'Liquidity', name:'Liquid Net Worth', value: liquidNW, format:'currency', formula:'Liquid Assets − Current Liabilities',
    benchmark:'Positive', status: liquidNW > 0 ? 'green' : liquidNW > -10000 ? 'yellow' : 'red',
    weight: 1, description: 'What you\'d have if you settled all immediate obligations today.' });

  const cashReserve = annualIncome > 0 ? liquid / annualIncome * 100 : null;
  ratios.push({ id:'cashReserve', category:'Liquidity', name:'Cash Reserve Ratio', value: cashReserve, format:'%', formula:'Liquid / Annual Income',
    benchmark:'>15%', status: cashReserve === null ? null : cashReserve > 15 ? 'green' : cashReserve > 5 ? 'yellow' : 'red',
    weight: 1, description: 'Cash buffer relative to your earning.' });

  // C. SAVINGS / GROWTH
  const savingsRate = annualIncome > 0 ? (annualIncome - annualExpenses) / annualIncome * 100 : null;
  ratios.push({ id:'savingsRate', category:'Savings & Growth', name:'Savings Rate', value: savingsRate, format:'%', formula:'(Income − Expenses) / Income',
    benchmark:'>20%', status: savingsRate === null ? null : savingsRate > 30 ? 'green' : savingsRate > 20 ? 'green' : savingsRate > 10 ? 'yellow' : 'red',
    weight: 2, description: 'The single most important ratio for long-term wealth. A high savings rate solves many problems.' });

  const investRate = annualIncome > 0 ? (monthInv * 12) / annualIncome * 100 : null;
  ratios.push({ id:'investRate', category:'Savings & Growth', name:'Investment Rate', value: investRate, format:'%', formula:'Money Invested / Income',
    benchmark:'>15%', status: investRate === null ? null : investRate > 15 ? 'green' : investRate > 5 ? 'yellow' : 'red',
    weight: 1.5, description: 'Distinct from savings — money actively put to work in investments.' });

  const wealthRatio = annualExpenses > 0 ? invValue / annualExpenses : null;
  ratios.push({ id:'wealthRatio', category:'Savings & Growth', name:'Wealth Ratio (Years of Expenses)', value: wealthRatio, format:'x', formula:'Investments / Annual Expenses',
    benchmark:'25x = FI', status: wealthRatio === null ? null : wealthRatio >= 25 ? 'green' : wealthRatio >= 10 ? 'green' : wealthRatio >= 5 ? 'yellow' : 'red',
    weight: 1.5, description: 'Years you could live off investments. 25× = Financial Independence (4% rule).' });

  // D. NET WORTH BENCHMARKS (needs age)
  if (age !== null) {
    const expectedNW = age * annualIncome / 10;
    const sdRatio = expectedNW > 0 ? nw / expectedNW : null;
    let sdLabel = '';
    if (sdRatio !== null) sdLabel = sdRatio >= 2 ? 'PAW' : sdRatio >= 0.5 ? 'AAW' : 'UAW';
    ratios.push({ id:'stanleyDanko', category:'Net Worth Benchmarks', name:'Stanley-Danko Wealth Score', value: sdRatio, format:'x', label: sdLabel,
      formula:'Net Worth / (Age × Annual Income ÷ 10)', benchmark:'PAW > 2x · AAW 0.5-2x · UAW < 0.5x',
      status: sdRatio === null ? null : sdRatio >= 2 ? 'green' : sdRatio >= 0.5 ? 'yellow' : 'red',
      weight: 1, description: 'From "The Millionaire Next Door" — are you ahead of the wealth curve for your age?' });

    // NW vs target multiple
    const ageTargets = { 30: 1, 35: 2, 40: 3, 45: 4, 50: 6, 55: 7, 60: 8, 65: 10, 67: 10 };
    const nearest = Object.keys(ageTargets).map(Number).reduce((p,c) => Math.abs(c-age) < Math.abs(p-age) ? c : p);
    const targetMult = ageTargets[nearest];
    const nwIncome = annualIncome > 0 ? nw / annualIncome : null;
    ratios.push({ id:'nwIncome', category:'Net Worth Benchmarks', name:'Net Worth / Annual Income', value: nwIncome, format:'x',
      formula:'NW / Annual Income', benchmark:`${targetMult}x by age ${nearest}`,
      status: nwIncome === null ? null : nwIncome >= targetMult ? 'green' : nwIncome >= targetMult * 0.7 ? 'yellow' : 'red',
      weight: 1, description: 'Age-based net worth multiple. Fidelity-style guidance.' });
  } else {
    ratios.push({ id:'stanleyDanko', category:'Net Worth Benchmarks', name:'Stanley-Danko Wealth Score', value: null, format:'x',
      formula:'Net Worth / (Age × Annual Income ÷ 10)', benchmark:'PAW > 2x · AAW 0.5-2x · UAW < 0.5x', status: null, weight: 1,
      description: 'Set DOB on Self person to enable.', needsDob: true });
    ratios.push({ id:'nwIncome', category:'Net Worth Benchmarks', name:'Net Worth / Annual Income', value: null, format:'x',
      formula:'NW / Annual Income', benchmark:'Age-based', status: null, weight: 1,
      description: 'Set DOB on Self person to enable.', needsDob: true });
  }

  // E. CREDIT HEALTH
  const cur = cardLimit > 0 ? cardOut / cardLimit * 100 : null;
  ratios.push({ id:'creditUtil', category:'Credit Health', name:'Credit Utilization', value: cur, format:'%', formula:'Card Outstanding / Total Limit',
    benchmark:'<30%', status: cur === null ? null : cur < 10 ? 'green' : cur < 30 ? 'green' : cur < 50 ? 'yellow' : 'red',
    weight: 1, description: 'Heavily affects CIBIL score. Keep below 30% always; <10% before a big loan.' });

  // Card payment health: last 12 months
  const cutoff12 = addDays(today(), -365);
  const cardSpent12 = state.transactions.filter(t => t.status === 'Settled' && t.cardId && t.type === 'expense' && t.date >= cutoff12).reduce((s,t) => s + +t.amount, 0);
  const cardSet12 = state.transactions.filter(t => t.status === 'Settled' && t.cardId && t.type === 'settlement' && t.date >= cutoff12).reduce((s,t) => s + +t.amount, 0);
  const cardHealth = cardSpent12 > 0 ? cardSet12 / cardSpent12 * 100 : null;
  ratios.push({ id:'cardHealth', category:'Credit Health', name:'Card Payment Health', value: cardHealth, format:'%', formula:'Settled / Spent (12mo)',
    benchmark:'>95%', status: cardHealth === null ? null : cardHealth > 95 ? 'green' : cardHealth > 80 ? 'yellow' : 'red',
    weight: 1, description: 'Closer to 100% = paying in full = no interest charges.' });

  // F. INSURANCE
  const requiredLife = annualIncome * 10 + liab - liquid;
  const lifeAdequacy = requiredLife > 0 ? lifeCover / requiredLife * 100 : (lifeCover > 0 ? 100 : null);
  ratios.push({ id:'lifeAdequacy', category:'Insurance', name:'Life Insurance Adequacy', value: lifeAdequacy, format:'%',
    formula:'Cover / (10× Income + Loans − Liquid)', benchmark:'>90%',
    status: lifeAdequacy === null ? null : lifeAdequacy >= 90 ? 'green' : lifeAdequacy >= 50 ? 'yellow' : 'red',
    weight: 1, description: 'Term life cover should be enough that family can replace your income + pay off loans.' });

  // Health cover (per family member with health policy)
  const healthPolicies = state.insurance.filter(i => i.status === 'Active' && i.type === 'Health');
  const totalHealthCover = healthPolicies.reduce((s,i) => s + +i.cover, 0);
  const healthAdequacy = state.people.length > 0 ? totalHealthCover / (state.people.length * 500000) * 100 : null;
  ratios.push({ id:'healthAdequacy', category:'Insurance', name:'Health Insurance Adequacy', value: healthAdequacy, format:'%',
    formula:'Total cover / (₹5L × persons)', benchmark:'>100%',
    status: healthAdequacy === null ? null : healthAdequacy >= 100 ? 'green' : healthAdequacy >= 50 ? 'yellow' : 'red',
    weight: 1, description: '₹5L per person minimum, ₹10L recommended.' });

  // G. INVESTMENT QUALITY
  // Asset allocation — just show, no single ratio
  const equityPct = invValue > 0 ? allocation.Equity / invValue * 100 : 0;
  if (age !== null) {
    const targetEquity = 110 - age;
    const dev = Math.abs(equityPct - targetEquity);
    ratios.push({ id:'ruleOf110', category:'Investment Quality', name:'Rule of 110 (Equity Allocation)', value: equityPct, format:'%',
      label: `target ${targetEquity}%`,
      formula:'Recommended equity % = 110 − Age', benchmark:`±5% of ${targetEquity}%`,
      status: dev <= 5 ? 'green' : dev <= 15 ? 'yellow' : 'red',
      weight: 1, description: `For age ${age}, target equity is ${targetEquity}%. You're at ${equityPct.toFixed(0)}%.` });
  } else {
    ratios.push({ id:'ruleOf110', category:'Investment Quality', name:'Rule of 110 (Equity Allocation)', value: null, format:'%',
      formula:'Recommended equity % = 110 − Age', benchmark:'Age-based',
      status: null, weight: 1, description: 'Set DOB on Self person to enable.', needsDob: true });
  }

  // H. HOUSING
  const housingTotal = housingCost + homeLoanEmi;
  const housingRatio = monthIncome > 0 ? housingTotal / monthIncome * 100 : null;
  ratios.push({ id:'housingRatio', category:'Housing', name:'Housing Expense Ratio', value: housingRatio, format:'%',
    formula:'(Rent + Home EMI) / Gross Income', benchmark:'<28%',
    status: housingRatio === null ? null : housingRatio < 28 ? 'green' : housingRatio < 35 ? 'yellow' : 'red',
    weight: 1, description: '28/36 rule — housing under 28%, total debt under 36%.' });

  // I. RETIREMENT
  if (age !== null) {
    const yearsToRet = Math.max(1, (state.settings.retirementAge || 60) - age);
    const inflRate = (state.settings.inflationRate || 6) / 100;
    const annualRetExpenses = monthEssential * 12 * Math.pow(1 + inflRate, yearsToRet);
    const corpusNeeded = annualRetExpenses * 25;
    const retReadiness = corpusNeeded > 0 ? retirement / corpusNeeded * 100 : null;
    const ageProgress = age / (state.settings.retirementAge || 60);
    const onTrack = retReadiness >= ageProgress * 100;
    ratios.push({ id:'retirementReadiness', category:'Retirement', name:'Retirement Readiness', value: retReadiness, format:'%',
      formula:'Corpus / (Annual ret. expenses × 25)',
      benchmark: `${(ageProgress * 100).toFixed(0)}% by your age`,
      status: retReadiness === null ? null : onTrack ? 'green' : retReadiness >= ageProgress * 70 ? 'yellow' : 'red',
      weight: 1, description: `Target corpus: ${fmt(corpusNeeded)} (assumes ${inflRate*100}% inflation, retire at ${state.settings.retirementAge||60}, 25× rule).` });
  } else {
    ratios.push({ id:'retirementReadiness', category:'Retirement', name:'Retirement Readiness', value: null, format:'%',
      formula:'Corpus / (Annual ret. expenses × 25)', benchmark:'Age-dependent',
      status: null, weight: 1, description: 'Set DOB on Self person to enable.', needsDob: true });
  }

  // J. CASH FLOW QUALITY
  const totalExp = monthEssential + monthDisc;
  const discPct = totalExp > 0 ? monthDisc / totalExp * 100 : null;
  ratios.push({ id:'discRatio', category:'Cash Flow Quality', name:'Discretionary Spending %', value: discPct, format:'%',
    formula:'Non-essential / Total Expenses', benchmark:'<25%',
    status: discPct === null ? null : discPct < 15 ? 'green' : discPct < 25 ? 'green' : discPct < 40 ? 'yellow' : 'red',
    weight: 1, description: 'How much you spend on wants vs needs.' });

  const fcf = monthIncome - monthEssential - totEmi;
  ratios.push({ id:'fcf', category:'Cash Flow Quality', name:'Free Cash Flow (Monthly)', value: fcf, format:'currency',
    formula:'Income − Essential − EMIs', benchmark:'Positive',
    status: fcf > monthIncome * 0.2 ? 'green' : fcf > 0 ? 'yellow' : 'red',
    weight: 1, description: 'Money truly available for SIPs, prepayments, emergency fund.' });

  return ratios;
}

function computeHealthScore(ratios) {
  const scored = ratios.filter(r => r.status !== null);
  if (!scored.length) return { score: 0, grade: 'N/A', greenCount: 0, total: 0 };
  let totalWeight = 0, weightedScore = 0;
  let green = 0, yellow = 0, red = 0;
  scored.forEach(r => {
    const w = r.weight || 1;
    const s = r.status === 'green' ? 1 : r.status === 'yellow' ? 0.5 : 0;
    totalWeight += w;
    weightedScore += s * w;
    if (r.status === 'green') green++;
    else if (r.status === 'yellow') yellow++;
    else red++;
  });
  const score = Math.round(weightedScore / totalWeight * 100);
  const grade = score >= 80 ? 'Excellent' : score >= 65 ? 'Healthy' : score >= 50 ? 'Watch' : 'Needs Attention';
  return { score, grade, greenCount: green, yellowCount: yellow, redCount: red, total: scored.length };
}

function renderRatioCard(r) {

    if (format === 'x') return v.toFixed(2) + 'x';
    return v.toFixed(1);

  const statusColor = r.status === 'green' ? 'success' : r.status === 'yellow' ? 'warning' : r.status === 'red' ? 'danger' : 'muted';

function getCurrentFY() {
  const fyStart = state.settings.fyStartMonth || 4;
  const now = new Date();
  let fyYear = now.getMonth() + 1 >= fyStart ? now.getFullYear() : now.getFullYear() - 1;
  return {
    start: `${fyYear}-${String(fyStart).padStart(2,'0')}-01`,
    end: addDays(`${fyYear+1}-${String(fyStart).padStart(2,'0')}-01`, -1),
    label: `FY ${fyYear}-${String((fyYear+1)%100).padStart(2,'0')}`
  };
}

function getPeriodRange() {
  const today_ = today();
  if (reportsState.period === 'thisMonth') { const mk = currentMonthKey(); return { start: `${mk}-01`, end: today_, label: monthRange(mk).label }; }
  if (reportsState.period === 'lastMonth') { const mk = previousMonthKey(); const r = monthRange(mk); return { start: r.start, end: r.end, label: r.label }; }
  if (reportsState.period === 'thisFY') return getCurrentFY();
  if (reportsState.period === 'lastFY') { const cf = getCurrentFY(); const ly = +cf.start.slice(0,4) - 1; return { start: `${ly}-${cf.start.slice(5)}`, end: addDays(cf.start, -1), label: `FY ${ly}-${String((ly+1)%100).padStart(2,'0')}` }; }
  if (reportsState.period === 'last3Months') return { start: addDays(today_, -90), end: today_, label: 'Last 3 months' };
  if (reportsState.period === 'last12Months') return { start: addDays(today_, -365), end: today_, label: 'Last 12 months' };
  if (reportsState.period === 'custom') return { start: reportsState.customStart || addDays(today_, -30), end: reportsState.customEnd || today_, label: 'Custom' };
  return getCurrentFY();
}

/* ----- Income & Expense Report ----- */
function renderIncomeExpenseReport() {
  const period = getPeriodRange();
  const txns = state.transactions.filter(t => t.status === 'Settled' && t.date >= period.start && t.date <= period.end);
  const income = txns.filter(t => t.type === 'income');
  const expense = txns.filter(t => t.type === 'expense');
  // Group by category

/* ----- Cash Flow Report ----- */
function renderCashFlowReport() {
  const period = getPeriodRange();
  const txns = state.transactions.filter(t => t.status === 'Settled' && t.date >= period.start && t.date <= period.end);
  // Opening balance: current liquid - net cash flow from txns
  const liquidAccts = state.accounts.filter(a => a.status === 'Active' && !['Fixed Deposit','Recurring Deposit'].includes(a.type));
  const currentLiquid = liquidAccts.reduce((s,a) => s + +a.balance, 0);
  // Compute net cash impact of all settled txns AFTER period.start
  const futurePostStart = state.transactions.filter(t => t.status === 'Settled' && t.date > period.end).reduce((s,t) => {
    if (t.type === 'income' && t.toAccountId && liquidAccts.some(a => a.id === t.toAccountId)) return s + +t.amount;
    if (t.type === 'expense' && t.fromAccountId && liquidAccts.some(a => a.id === t.fromAccountId)) return s - +t.amount;
    if (t.type === 'settlement' && t.fromAccountId && liquidAccts.some(a => a.id === t.fromAccountId)) return s - +t.amount;
    if (t.type === 'transfer' && t.fromAccountId && liquidAccts.some(a => a.id === t.fromAccountId) && !liquidAccts.some(a => a.id === t.toAccountId)) return s - +t.amount;
    if (t.type === 'transfer' && t.toAccountId && liquidAccts.some(a => a.id === t.toAccountId) && !liquidAccts.some(a => a.id === t.fromAccountId)) return s + +t.amount;
    return s;
  }, 0);
  const periodInflowTotal = txns.filter(t => t.type === 'income').reduce((s,t) => s + +t.amount, 0);
  const periodOutflowTotal = txns.filter(t => t.type === 'expense' || t.type === 'settlement').reduce((s,t) => s + +t.amount, 0);
  const periodNet = periodInflowTotal - periodOutflowTotal;
  const closingBal = currentLiquid - futurePostStart;
  const openingBal = closingBal - periodNet;

  // Group inflows and outflows
  const inflowByCat = {}; txns.filter(t => t.type === 'income').forEach(t => inflowByCat[t.category] = (inflowByCat[t.category]||0) + +t.amount);
  const outflowByCat = {}; txns.filter(t => t.type === 'expense' || t.type === 'settlement').forEach(t => outflowByCat[t.category] = (outflowByCat[t.category]||0) + +t.amount);

  document.getElementById('main').innerHTML = `
    ${reportTopBar('Cash Flow Report', period.label, { exportFn: "exportReportToExcel('cashFlow')" })}
    <div class="card" id="reportContent">
      <div style="text-align:center;padding:16px;border-bottom:2px solid var(--border-strong);">
        <div class="page-title">Cash Flow Report</div>
        <div class="text-sm text-tertiary">${period.label}</div>
      </div>
      <div class="grid grid-stats mt-md mb-md">
        <div class="card" style="padding:12px;"><div class="card-title">Opening Balance</div><div class="stat-value" style="font-size:18px;">${fmt(openingBal)}</div></div>
        <div class="card" style="padding:12px;"><div class="card-title">Total Inflows</div><div class="stat-value text-success" style="font-size:18px;">+${fmt(periodInflowTotal)}</div></div>
        <div class="card" style="padding:12px;"><div class="card-title">Total Outflows</div><div class="stat-value text-danger" style="font-size:18px;">−${fmt(periodOutflowTotal)}</div></div>
        <div class="card" style="padding:12px;"><div class="card-title">Closing Balance</div><div class="stat-value" style="font-size:18px;">${fmt(closingBal)}</div></div>
      </div>
      <div class="section">
        <div class="section-title text-success">CASH INFLOWS</div>
        <table class="tbl"><tbody>
          ${Object.entries(inflowByCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt]) => `<tr><td>${escapeHTML(cat)}</td><td class="num">+${fmt(amt)}</td></tr>`).join('')}
          <tr style="background:var(--success-soft);"><td class="fw-700">Total Inflows</td><td class="num fw-700">+${fmt(periodInflowTotal)}</td></tr>
        </tbody></table>
      </div>
      <div class="section">
        <div class="section-title text-danger">CASH OUTFLOWS</div>
        <table class="tbl"><tbody>
          ${Object.entries(outflowByCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt]) => `<tr><td>${escapeHTML(cat)}</td><td class="num">−${fmt(amt)}</td></tr>`).join('')}
          <tr style="background:var(--danger-soft);"><td class="fw-700">Total Outflows</td><td class="num fw-700">−${fmt(periodOutflowTotal)}</td></tr>
        </tbody></table>
      </div>
      <div style="margin-top:16px;padding:16px;background:var(--surface-2);border-radius:var(--radius-md);">
        <div class="row-between">
          <div class="fw-700">Net Cash Flow</div>
          <div class="fw-700 ${periodNet >= 0 ? 'text-success' : 'text-danger'}" style="font-size:20px;">${fmtSigned(periodNet)}</div>
        </div>
      </div>
    </div>
  `;
  refreshIcons();
}

/* ----- Ledger ----- */
function renderLedger() {
  const period = getPeriodRange();
  const acctOpts = state.accounts.map(a => `<option value="${a.id}" ${reportsState.accountId === a.id ? 'selected' : ''}>${escapeHTML(a.name)}</option>`).join('');
  const accountId = reportsState.accountId || (state.accounts[0]?.id);
  let bodyHTML = '<div class="empty-sub" style="padding:20px;text-align:center;">Pick an account</div>';
  if (accountId) {
    const a = getAccount(accountId);
    const allTxns = state.transactions.filter(t => t.status === 'Settled' && (t.fromAccountId === accountId || t.toAccountId === accountId)).sort((x,y) => x.date.localeCompare(y.date));
    const periodTxns = allTxns.filter(t => t.date >= period.start && t.date <= period.end);
    // Compute opening balance (current - txns from period.start onwards)
    let endBal = +a.balance;
    for (const t of allTxns) {
      if (t.date > period.end) endBal -= txnDeltaForAccount(t, accountId);
    }
    let opening = endBal;
    for (const t of periodTxns) opening -= txnDeltaForAccount(t, accountId);
    let running = opening;
    const rows = periodTxns.map(t => {
      const delta = txnDeltaForAccount(t, accountId);
      const debit = delta < 0 ? -delta : 0;
      const credit = delta > 0 ? delta : 0;
      running += delta;
      return { t, debit, credit, balance: running };
    });
    bodyHTML = `<div style="text-align:center;padding:12px;background:var(--surface-2);border-radius:var(--radius-md);margin-bottom:12px;">
      <div class="fw-700">${escapeHTML(a.name)}${a.last4 ? ` ··${a.last4}` : ''}</div>
      <div class="text-sm text-tertiary">${escapeHTML(a.bank || '')} · ${period.label}</div>
    </div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Date</th><th>Particulars</th><th class="num">Debit</th><th class="num">Credit</th><th class="num">Balance</th></tr></thead>
      <tbody>
        <tr style="background:var(--surface-2);font-style:italic;"><td>${fmtDate(period.start)}</td><td>Opening balance</td><td></td><td></td><td class="num fw-700">${fmt(opening)}</td></tr>
        ${rows.map(r => `<tr>
          <td class="text-xs">${fmtDate(r.t.date, { year: '2-digit' })}</td>
          <td>${escapeHTML(r.t.category || r.t.type)}${r.t.note ? `<div class="text-xs text-tertiary">${escapeHTML(r.t.note)}</div>` : ''}</td>
          <td class="num text-danger">${r.debit ? fmt(r.debit) : ''}</td>
          <td class="num text-success">${r.credit ? fmt(r.credit) : ''}</td>
          <td class="num">${fmt(r.balance)}</td>
        </tr>`).join('')}
        <tr style="background:var(--surface-2);font-style:italic;"><td>${fmtDate(period.end)}</td><td class="fw-700">Closing balance</td><td></td><td></td><td class="num fw-700">${fmt(running)}</td></tr>
      </tbody>
    </table></div>
    <div class="text-sm text-muted mt-sm">${periodTxns.length} transactions in period</div>`;
  }
  document.getElementById('main').innerHTML = `
    ${reportTopBar('Ledger', 'Per-account transactions with running balance', { exportFn: "exportReportToExcel('ledger')" })}
    <div class="row gap-sm mb-md">
      <label class="fw-600">Account:</label>
      <select style="max-width:300px;" onchange="reportsState.accountId=this.value;renderReports()">
        <option value="">— Choose —</option>${acctOpts}
      </select>
    </div>
    <div class="card" id="reportContent">${bodyHTML}</div>
  `;
  refreshIcons();
}

/* ----- Net Worth Trend (approximation using monthly aggregates) ----- */
function renderNetWorthTrend() {
  const months = 12;
  const labels = [], data = [];
  const liquidAccts = state.accounts.filter(a => a.status === 'Active' && !['Fixed Deposit','Recurring Deposit'].includes(a.type));
  const depAccts = state.accounts.filter(a => a.status === 'Active' && ['Fixed Deposit','Recurring Deposit'].includes(a.type));
  const currentLiquid = liquidAccts.reduce((s,a) => s + +a.balance, 0);
  const currentDep = depAccts.reduce((s,a) => s + +a.balance, 0);
  const currentInv = state.investments.filter(i => i.status !== 'Closed').reduce((s,i) => s + +(i.currentValue || i.invested), 0);
  const currentLoanOut = state.loans.filter(l => l.status === 'Active').reduce((s,l) => s + +l.outstanding, 0);
  const currentCardOut = state.cards.filter(c => c.status !== 'Closed').reduce((s,c) => s + getCardOutstanding(c.id), 0);
  // Approximate: walk back month by month using settled transactions
  for (let i = months - 1; i >= 0; i--) {
    const d = new Date(); d.setMonth(d.getMonth() - i); d.setDate(1);
    const cutoff = d.toISOString().slice(0,10);
    // Liquid: subtract net cash flow from this date onwards
    const liquidNet = state.transactions.filter(t => t.status === 'Settled' && t.date >= cutoff).reduce((s,t) => {
      if (t.type === 'income' && t.toAccountId && liquidAccts.some(a => a.id === t.toAccountId)) return s + +t.amount;
      if (t.type === 'expense' && t.fromAccountId && liquidAccts.some(a => a.id === t.fromAccountId)) return s - +t.amount;
      if (t.type === 'settlement' && t.fromAccountId && liquidAccts.some(a => a.id === t.fromAccountId)) return s - +t.amount;
      if (t.type === 'transfer' && t.fromAccountId && liquidAccts.some(a => a.id === t.fromAccountId) && !liquidAccts.some(a => a.id === t.toAccountId)) return s - +t.amount;
      if (t.type === 'transfer' && t.toAccountId && liquidAccts.some(a => a.id === t.toAccountId) && !liquidAccts.some(a => a.id === t.fromAccountId)) return s + +t.amount;
      return s;
    }, 0);
    const pastLiquid = currentLiquid - liquidNet;
    const pastNW = pastLiquid + currentDep + currentInv - currentLoanOut - currentCardOut;
    labels.push(d.toLocaleDateString('en-IN', { month: 'short', year: '2-digit' }));
    data.push(pastNW);
  }
  document.getElementById('main').innerHTML = `
    ${reportTopBar('Net Worth Trend', 'Last 12 months (approximated from settled transactions)', { hidePeriod: true })}
    <div class="card" id="reportContent"><div class="chart-wrap" style="height:400px;"><canvas id="nwTrendChart"></canvas></div>
    <div class="text-xs text-tertiary mt-md">💡 Approximation — assumes investments, FDs, loan outstanding are static. Daily NW snapshots come in Sprint 6.</div></div>
  `;
  const ctx = document.getElementById('nwTrendChart');
  new Chart(ctx, { type: 'line',
    data: { labels, datasets: [{ label: 'Net Worth', data, fill: true, borderColor: getCSS('--primary'), backgroundColor: 'rgba(79,70,229,.1)', tension: 0.3 }] },
    options: { responsive: true, maintainAspectRatio: false,
      scales: { y: { ticks: { callback: v => fmt(v), color: getCSS('--text-secondary') }, grid: { color: getCSS('--border') } },
                x: { ticks: { color: getCSS('--text-secondary') }, grid: { display: false } } },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `NW: ${fmt(c.parsed.y)}` } } } }
  });
  refreshIcons();
}

/* ----- Recurring vs One-off ----- */
function renderRecurringVsOneoff() {
  const period = getPeriodRange();
  const txns = state.transactions.filter(t => t.status === 'Settled' && t.type === 'expense' && t.date >= period.start && t.date <= period.end);
  const recurring = txns.filter(t => t.recurringId).reduce((s,t) => s + +t.amount, 0);
  const oneoff = txns.filter(t => !t.recurringId).reduce((s,t) => s + +t.amount, 0);
  const total = recurring + oneoff;
  document.getElementById('main').innerHTML = `
    ${reportTopBar('Recurring vs One-off', period.label, { exportFn: "exportReportToExcel('recurringVsOneoff')" })}
    <div class="grid grid-2" id="reportContent">
      <div class="card">
        <div class="card-title">Recurring</div>
        <div class="stat-value">${fmt(recurring)}</div>
        <div class="text-xs text-tertiary">${total > 0 ? Math.round(recurring/total*100) : 0}% of expenses · ${txns.filter(t => t.recurringId).length} txns</div>
      </div>
      <div class="card">
        <div class="card-title">One-off</div>
        <div class="stat-value">${fmt(oneoff)}</div>
        <div class="text-xs text-tertiary">${total > 0 ? Math.round(oneoff/total*100) : 0}% of expenses · ${txns.filter(t => !t.recurringId).length} txns</div>
      </div>
    </div>
  `;
  refreshIcons();
}

/* ----- Recurring Templates Schedule ----- */
function renderRecurringSchedule() {
  const horizon = 12; // months
  const items = [];
  state.recurring.filter(r => r.active !== false).forEach(r => {
    for (let i = 0; i < horizon; i++) {
      const d = new Date(); d.setMonth(d.getMonth() + i);
      if (r.frequency === 'monthly') {
        const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
        const dom = Math.min(r.dayOfMonth || 1, lastDay);
        const date = new Date(d.getFullYear(), d.getMonth(), dom).toISOString().slice(0,10);
        items.push({ date, ...r });
      } else if (r.frequency === 'yearly' && i === 0) {
        const date = new Date(d.getFullYear(), (r.month || 1) - 1, r.dayOfMonth || 1).toISOString().slice(0,10);
        if (date >= today()) items.push({ date, ...r });
      } else if (r.frequency === 'quarterly' && i % 3 === 0) {
        items.push({ date: d.toISOString().slice(0,10), ...r });
      }
    }
  });
  items.sort((a,b) => a.date.localeCompare(b.date));
  document.getElementById('main').innerHTML = `
    ${reportTopBar('Recurring Templates Schedule', `${items.length} upcoming items over next ${horizon} months`, { hidePeriod: true })}
    <div class="card" id="reportContent">
      <table class="tbl">
        <thead><tr><th>Date</th><th>Label</th><th>Type</th><th>Category</th><th class="num">Amount</th></tr></thead>
        <tbody>${items.map(i => {
          const sign = i.type === 'income' ? '+' : (i.type === 'expense' || i.type === 'settlement') ? '−' : '';
          const cls = i.type === 'income' ? 'text-success' : (i.type === 'expense' || i.type === 'settlement') ? 'text-danger' : '';
          return `<tr>
            <td class="text-xs">${fmtDate(i.date, { year: '2-digit' })}</td>
            <td>${escapeHTML(i.label)}</td>
            <td class="text-xs"><span class="badge">${i.type}</span></td>
            <td class="text-xs">${escapeHTML(i.category || '—')}</td>
            <td class="num ${cls}">${sign}${fmt(i.amount)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  `;
  refreshIcons();
}

/* ----- Excel export for reports ----- */
function exportReportToExcel(reportId) {
  if (!window.XLSX) { toast('Excel library not loaded','error'); return; }
  const period = getPeriodRange();
  let wb = XLSX.utils.book_new();
  let filename = `${reportId}_${today()}.xlsx`;
  if (reportId === 'netWorth') {
    const liquid = state.accounts.filter(a => a.status === 'Active' && !['Fixed Deposit','Recurring Deposit'].includes(a.type)).map(a => ['Liquid - '+a.name, +a.balance]);
    const dep = state.accounts.filter(a => a.status === 'Active' && ['Fixed Deposit','Recurring Deposit'].includes(a.type)).map(a => ['Deposit - '+a.name, +a.balance]);
    const inv = state.investments.filter(i => i.status !== 'Closed').map(i => ['Investment - '+i.name, +(i.currentValue || i.invested)]);
    const card = state.cards.filter(c => c.status !== 'Closed').map(c => ['Card Out - '+c.name, getCardOutstanding(c.id)]);
    const loan = state.loans.filter(l => l.status === 'Active').map(l => ['Loan Out - '+l.name, +l.outstanding]);
    const rows = [['Net Worth Statement as on', today()],[],['ASSETS',''],...liquid,...dep,...inv,[],['LIABILITIES',''],...card,...loan];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, 'Net Worth');
  } else if (reportId === 'incomeExpense') {
    const txns = state.transactions.filter(t => t.status === 'Settled' && t.date >= period.start && t.date <= period.end);
    const rows = [['Income & Expense', period.label],[],['Date','Type','Category','Subcategory','Payee','Amount','Note']];
    txns.forEach(t => rows.push([t.date, t.type, t.category, t.subcategory, t.payee, +t.amount, t.note]));
    const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, 'IncomeExpense');
  } else if (reportId === 'dayBook') {
    const txns = state.transactions.filter(t => t.status === 'Settled' && t.date >= period.start && t.date <= period.end).sort((a,b) => a.date.localeCompare(b.date));
    const rows = [['Day Book', period.label],[],['Date','Type','Category','Description','From/To','Amount','Reference','Tax Flag']];
    txns.forEach(t => {
      let detail = t.type === 'transfer' ? `${accountLabel(t.fromAccountId)} → ${accountLabel(t.toAccountId)}` :
        t.type === 'settlement' ? `${accountLabel(t.fromAccountId)} → ${cardLabel(t.cardId)}` :
        t.type === 'income' ? `→ ${accountLabel(t.toAccountId)}` : (t.cardId ? `← ${cardLabel(t.cardId)}` : `← ${accountLabel(t.fromAccountId)}`);
      rows.push([t.date, t.type, t.category, t.payee || t.note, detail, +t.amount, t.reference, t.taxFlag]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows); XLSX.utils.book_append_sheet(wb, ws, 'DayBook');
  } else {
    // Generic export: dump everything as JSON
    const ws = XLSX.utils.aoa_to_sheet([[reportId + ' export'],[],['No specialized exporter — see Export module for full data export']]);
    XLSX.utils.book_append_sheet(wb, ws, reportId);
  }
  XLSX.writeFile(wb, filename);
  toast('Excel exported','success');
  audit('export', null, null, null, null, 'Report exported: ' + reportId);
}

async function doFullBackup() {
  const data = { _exportedAt: nowISO(), _version: 3 };
  for (const s of STORES) data[s] = await dbAll(s);
  let blob, ext = 'json';
  const encrypt = document.getElementById('encryptBackup').checked;
  if (encrypt) {
    const pwd = document.getElementById('encryptPwd').value;
    if (!pwd || pwd.length < 8) { toast('Password min 8 chars','error'); return; }
    try {
      const enc = new TextEncoder().encode(JSON.stringify(data));
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' }, keyMat, { name:'AES-GCM', length:256 }, false, ['encrypt']);
      const ciphertext = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc);
      const out = { encrypted: true, version: 3, salt: btoa(String.fromCharCode(...salt)), iv: btoa(String.fromCharCode(...iv)), data: btoa(String.fromCharCode(...new Uint8Array(ciphertext))) };
      blob = new Blob([JSON.stringify(out)], { type: 'application/octet-stream' });
      ext = 'fpb';
    } catch (e) { toast('Encryption failed: ' + e.message,'error'); return; }
  } else {
    blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  }
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = `finance-portal-backup-${today()}.${ext}`; a.click(); URL.revokeObjectURL(url);
  await audit('export', null, null, null, null, encrypt ? 'Encrypted backup' : 'Full backup');
  toast('Backup exported','success');
}

async function doRestore(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = async (evt) => {
    try {
      let data = JSON.parse(evt.target.result);
      if (data.encrypted) {
        const pwd = prompt('Enter backup password:');
        if (!pwd) return;
        const salt = Uint8Array.from(atob(data.salt), c => c.charCodeAt(0));
        const iv = Uint8Array.from(atob(data.iv), c => c.charCodeAt(0));
        const ct = Uint8Array.from(atob(data.data), c => c.charCodeAt(0));
        const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveKey']);
        const key = await crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' }, keyMat, { name:'AES-GCM', length:256 }, false, ['decrypt']);
        const decrypted = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
        data = JSON.parse(new TextDecoder().decode(decrypted));
      }
      if (!confirm('Replace ALL current data with this backup?')) return;
      for (const s of STORES) await dbClear(s);
      for (const s of STORES) {
        const items = data[s];
        if (Array.isArray(items)) for (const it of items) await dbPut(s, it);
        else if (items) await dbPut(s, items);
      }
      await loadState(); await initIfFirstRun(); applyTheme(); buildNav();
      await audit('import', null, null, null, null, 'Backup imported');
      toast('Backup restored','success'); renderCurrent();
    } catch (err) { toast('Restore failed: ' + err.message,'error'); }
  };
  r.readAsText(file); e.target.value = '';
}

function exportStoreToExcel(storeName, label) {
  if (!window.XLSX) { toast('Excel library not loaded','error'); return; }
  const data = state[storeName] || [];
  if (!data.length) { toast('No records to export','warning'); return; }
  const keys = Object.keys(data[0]);
  const rows = [keys, ...data.map(d => keys.map(k => Array.isArray(d[k]) ? d[k].join(',') : d[k]))];
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, label);
  XLSX.writeFile(wb, `${label}_${today()}.xlsx`);
  toast('Exported','success');
}

function exportStoreToCSV(storeName, label) {
  const data = state[storeName] || [];
  if (!data.length) { toast('No records to export','warning'); return; }
  const keys = Object.keys(data[0]);
  const csv = '﻿' + [keys.join(','), ...data.map(d => keys.map(k => {
    let v = d[k]; if (Array.isArray(v)) v = v.join('|'); if (v === null || v === undefined) v = '';
    v = String(v).replace(/"/g, '""');
    return /[",\n]/.test(v) ? `"${v}"` : v;
  }).join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = `${label}_${today()}.csv`; a.click(); URL.revokeObjectURL(url);
  toast('Exported','success');
}

async function generateTaxBundle() {

  // 2. Income & Expense as Excel

  const rows = [['Date','Type','Category','Subcategory','Payee','Amount','Note','TaxFlag']];
  txns.forEach(t => rows.push([t.date, t.type, t.category, t.subcategory, t.payee, +t.amount, t.note, t.taxFlag]));
  const ws = XLSX.utils.aoa_to_sheet(rows); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'AllTxns');
  const wbBlob = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  zip.file(`AllTransactions_${period.label}.xlsx`, wbBlob);
  // 3. Net Worth Statement as text
  const liquid = state.accounts.filter(a => a.status === 'Active' && !['Fixed Deposit','Recurring Deposit'].includes(a.type)).reduce((s,a) => s + +a.balance, 0);
  const dep = state.accounts.filter(a => a.status === 'Active' && ['Fixed Deposit','Recurring Deposit'].includes(a.type)).reduce((s,a) => s + +a.balance, 0);
  const inv = state.investments.filter(i => i.status !== 'Closed').reduce((s,i) => s + +(i.currentValue || i.invested), 0);
  const loanOut = state.loans.filter(l => l.status === 'Active').reduce((s,l) => s + +l.outstanding, 0);
  const cardOut = state.cards.filter(c => c.status !== 'Closed').reduce((s,c) => s + getCardOutstanding(c.id), 0);
  const nw = liquid + dep + inv - loanOut - cardOut;
  const nwTxt = `NET WORTH STATEMENT — As on ${today()}\n\nASSETS:\n  Liquid: ${fmt(liquid)}\n  Deposits: ${fmt(dep)}\n  Investments: ${fmt(inv)}\n  Total: ${fmt(liquid+dep+inv)}\n\nLIABILITIES:\n  Loans: ${fmt(loanOut)}\n  Cards: ${fmt(cardOut)}\n  Total: ${fmt(loanOut+cardOut)}\n\nNET WORTH: ${fmt(nw)}\n`;
  zip.file(`NetWorthStatement_${today()}.txt`, nwTxt);
  // Generate
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = `TaxBundle_${period.label.replace(/\s/g,'_')}.zip`; a.click(); URL.revokeObjectURL(url);
  await audit('export', null, null, null, null, 'Tax bundle: ' + period.label);
  toast('Tax bundle generated','success');
}

function toSnake(obj, mapEntry) {
  const out = {};
  const cols = mapEntry.cols || {};
  for (const k of Object.keys(obj)) {
    const v = obj[k];
    // Skip Date objects converted incorrectly; pass through
    let snake = cols[k];
    if (!snake) {
      // default: convert camelCase → snake_case
      snake = k.replace(/[A-Z]/g, c => '_' + c.toLowerCase());
    }
    out[snake] = v === '' ? null : v;
  }
  return out;
}

function toCamel(obj, mapEntry) {
  const out = {};
  const cols = mapEntry.cols || {};
  const reverseMap = {};
  for (const [camel, snake] of Object.entries(cols)) reverseMap[snake] = camel;
  for (const k of Object.keys(obj)) {
    let camel = reverseMap[k];
    if (!camel) {
      // default: snake_case → camelCase
      camel = k.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
    }
    out[camel] = obj[k];
  }
  return out;
}

function saveCloudConfig(cfg) { localStorage.setItem('cloudConfig', JSON.stringify(cfg)); }
function clearCloudConfig() { localStorage.removeItem('cloudConfig'); }

async function initSupabase() {
  const cfg = getCloudConfig();
  if (!cfg || !cfg.url || !cfg.anonKey) return false;
  if (!window.supabase) { console.warn('Supabase SDK not loaded'); return false; }
  cloud.config = cfg;
  cloud.client = supabase.createClient(cfg.url, cfg.anonKey);
  // Check session
  const { data: { session } } = await cloud.client.auth.getSession();
  if (session) {
    cloud.user = session.user;
    cloud.status = 'online';
    return true;
  }
  cloud.status = 'offline';
  return true; // SDK initialized but not logged in
}

/* When categories are upserted with onConflict on (profile_id, kind, name),
   Postgres keeps the existing cloud UUID. So local subcategories pointing to a local-only
   category UUID will fail FK on push. This remap fetches cloud category UUIDs and updates
   local subcategory.categoryId (and any other references) to match. */
async function remapCategoryAndOtherIds() {
  if (!cloud.client || !cloud.activeProfileId) return;
  try {
    const { data: cloudCats, error } = await cloud.client.from('categories')
      .select('id, kind, name')
      .eq('profile_id', cloud.activeProfileId);
    if (error || !cloudCats) return;
    // Map: "kind::name" → cloud UUID
    const cloudByName = new Map();
    for (const c of cloudCats) cloudByName.set(`${c.kind}::${c.name}`, c.id);
    // Build local: localCatId → "kind::name"
    const localIdToName = new Map();
    for (const c of state.categories.filter(x => x.profileId === cloud.activeProfileId)) {
      localIdToName.set(c.id, `${c.kind}::${c.name}`);
    }
    // Map: localCatId → cloudCatId (for ones that need remapping)
    const idRemap = new Map();
    for (const [localId, name] of localIdToName) {
      const cloudId = cloudByName.get(name);
      if (cloudId && cloudId !== localId) idRemap.set(localId, cloudId);
    }
    if (idRemap.size === 0) return;
    console.log(`Remapping ${idRemap.size} category UUIDs (cloud keeps existing IDs)`);
    // 1. Update local categories to use cloud's UUID (delete old, insert new)
    for (const [oldId, newId] of idRemap) {
      const local = state.categories.find(c => c.id === oldId);
      if (!local) continue;
      const updated = { ...local, id: newId };
      await _origDbDel('categories', oldId);
      await _origDbPut('categories', updated);
      // Update in-memory state
      const idx = state.categories.findIndex(c => c.id === oldId);
      if (idx >= 0) state.categories[idx] = updated;
    }
    // 2. Update all subcategories that reference remapped categories
    for (const sub of state.subcategories.filter(s => s.profileId === cloud.activeProfileId)) {
      if (idRemap.has(sub.categoryId)) {
        sub.categoryId = idRemap.get(sub.categoryId);
        await _origDbPut('subcategories', sub);
      }
    }
  } catch (err) {
    console.warn('Category remap failed (non-fatal):', err);
  }
}

/* Auto-push: direct bulk upsert to Supabase for every local record of active profile.
   Pushes in dependency waves to respect foreign-key constraints.
   Runs on profile enter. Idempotent — safe to call repeatedly. */
async function autoPushLocalToCloud() {
  if (!cloud.user || !cloud.activeProfileId || !cloud.client) return { pushed: 0, failed: 0, errors: [] };
  if (!navigator.onLine) return { pushed: 0, failed: 0, errors: ['offline'] };

  // Dependency-ordered waves:
  // Wave 0: settings + lookups + accounts + people (no FK except profile)
  // Wave 1: categories children + items that FK to accounts (cards, insurance, investments, loans, recurring)
  // Wave 2: items that FK to wave-1 (loanEvents → loans, transactions → multiple, investmentTxns → investments, etc)
  const waves = [
    ['settings', 'people', 'accounts', 'categories', 'taxFlags'],
    ['subcategories', 'cards', 'insurance', 'investments', 'loans', 'recurring'],
    ['loanEvents', 'transactions', 'investmentTxns', 'statementUploads', 'attachments', 'netWorthSnapshots']
  ];

  let pushed = 0, failed = 0;
  const errors = [];
  cloud.status = 'syncing'; updateConnIndicator();

  for (let waveIdx = 0; waveIdx < waves.length; waveIdx++) {
    const wave = waves[waveIdx];

    // Between Wave 1 (categories pushed) and Wave 2 (subcategories): remap category UUIDs
    // because upsert with onConflict keeps cloud's existing UUID, not the pushed one.
    if (waveIdx === 1) {
      await remapCategoryAndOtherIds();
    }

    const batches = [];
    for (const key of wave) {
      const map = TABLE_MAP[key];
      if (!map) continue;
      if (key === 'settings') {
        if (state.settings && isUuid(state.settings.id) && state.settings.profileId === cloud.activeProfileId) {
          batches.push({ key, map, items: [state.settings] });
        }
        continue;
      }
      const items = state[key];
      if (!items || !Array.isArray(items)) continue;
      const valid = items.filter(it => it && it.id && isUuid(it.id) && it.profileId === cloud.activeProfileId);
      if (valid.length) batches.push({ key, map, items: valid });
    }

    await Promise.all(batches.map(async ({ key, map, items }) => {
      try {
        const rows = items.map(item => {
          const snake = toSnake(item, map);
          snake.profile_id = cloud.activeProfileId;
          return snake;
        });
        let opts;
        if (key === 'categories') opts = { onConflict: 'profile_id,kind,name', ignoreDuplicates: false };
        else if (key === 'subcategories') opts = { onConflict: 'category_id,name', ignoreDuplicates: false };
        else if (key === 'taxFlags') opts = { onConflict: 'profile_id,name', ignoreDuplicates: false };
        const { error } = await cloud.client.from(map.table).upsert(rows, opts);
        if (error) throw new Error(`${key}: ${error.message}`);
        pushed += rows.length;
      } catch (err) {
        failed += items.length;
        errors.push(err.message);
        console.error('Wave push failed for', key, err);
      }
    }));
  }

  if (failed === 0) {
    cloud.status = 'online'; updateConnIndicator();
    cloud.lastSyncError = null;
  } else {
    cloud.status = 'error'; updateConnIndicator();
    cloud.lastSyncError = errors.join(' · ');
  }

  return { pushed, failed, errors };
}

/* ---------- Incremental sync with parallel pulls + bulk writes ---------- */
function getLastSyncKey() { return `lastSync_${cloud.activeProfileId}`; }
function getLastSync() {
  try { return JSON.parse(localStorage.getItem(getLastSyncKey()) || '{}'); } catch(e) { return {}; }
}
function setLastSync(map) { localStorage.setItem(getLastSyncKey(), JSON.stringify(map)); }

// Clear all state arrays (used when switching profiles)
function clearStateArrays() {
  Object.assign(state, {
    settings: null, people:[], accounts:[], cards:[], loans:[], loanEvents:[],
    insurance:[], investments:[], transactions:[], recurring:[],
    categories:[], subcategories:[], taxFlags:[], statementUploads:[],
    investmentTxns:[], attachments:[], netWorthSnapshots:[]
  });
}

// Cached local-only data for active profile — STRICT profile filtering
async function loadProfileFromCache() {
  if (!cloud.activeProfileId) return;
  clearStateArrays();
  for (const s of STORES) {
    if (s === 'settings') continue;
    const all = await dbAll(s);
    // STRICT: only records belonging to this profile
    state[s] = all.filter(r => r.profileId === cloud.activeProfileId);
  }
  const allSettings = await dbAll('settings');
  state.settings = allSettings.find(s => s.profileId === cloud.activeProfileId) || null;
}

// Count orphaned records (no profileId tag)
async function countOrphanedRecords() {
  let count = 0;
  for (const s of STORES) {
    const all = await dbAll(s);
    count += all.filter(r => !r.profileId).length;
  }
  return count;
}

// Assign orphaned records to the active profile (migration)
async function claimOrphanedRecords() {
  if (!cloud.activeProfileId) return 0;
  let count = 0;
  for (const s of STORES) {
    const all = await dbAll(s);
    const orphans = all.filter(r => !r.profileId);
    if (!orphans.length) continue;
    const updated = orphans.map(r => ({ ...r, profileId: cloud.activeProfileId }));
    await dbBulkPut(s, updated);
    count += orphans.length;
  }
  return count;
}

// Delete all orphaned records
async function deleteOrphanedRecords() {
  let count = 0;
  for (const s of STORES) {
    const all = await dbAll(s);
    const orphanIds = all.filter(r => !r.profileId).map(r => r.id);
    if (orphanIds.length) {
      await dbBulkDel(s, orphanIds);
      count += orphanIds.length;
    }
  }
  return count;
}

// FAST: parallel fetches + bulk writes + incremental sync
async function pullAllFromCloud(opts = {}) {
  if (!cloud.client || !cloud.activeProfileId) return;
  const fullSync = opts.full === true;
  cloud.status = 'syncing'; updateConnIndicator();
  const startTime = performance.now();
  try {
    const lastSync = fullSync ? {} : getLastSync();
    const now = new Date().toISOString();
    const tableKeys = Object.keys(TABLE_MAP).filter(k => k !== 'auditLog');

    // Parallel fetches — all tables at once
    const results = await Promise.all(tableKeys.map(async key => {
      const map = TABLE_MAP[key];
      try {
        let q = cloud.client.from(map.table).select('*').eq('profile_id', cloud.activeProfileId);
        if (lastSync[key]) q = q.gt('updated_at', lastSync[key]);
        const { data, error } = await q;
        if (error) { console.warn(`Pull ${key}:`, error.message); return { key, data: [] }; }
        return { key, data: data || [] };
      } catch (e) { console.warn(`Pull ${key}:`, e.message); return { key, data: [] }; }
    }));

    // Bulk write everything in parallel per-store transactions
    let totalRows = 0;
    await Promise.all(results.map(async ({ key, data }) => {
      if (!data.length) return;
      const map = TABLE_MAP[key];
      const items = data.map(r => {
        const obj = toCamel(r, map);
        // ALWAYS tag with profileId (defensive — cloud rows already have profile_id but ensure)
        obj.profileId = cloud.activeProfileId;
        return obj;
      });
      // Merge into state (upsert)
      const stateArr = state[key];
      if (key === 'settings') {
        state.settings = items[0];
      } else if (Array.isArray(stateArr)) {
        const byId = new Map(stateArr.map(x => [x.id, x]));
        items.forEach(it => byId.set(it.id, it));
        state[key] = Array.from(byId.values());
      }
      await dbBulkPut(key, items);
      totalRows += items.length;
    }));

    // Save last sync timestamp per table
    const newLastSync = { ...lastSync };
    results.forEach(({ key }) => { newLastSync[key] = now; });
    setLastSync(newLastSync);

    cloud.status = 'online'; updateConnIndicator();
    const ms = Math.round(performance.now() - startTime);
    if (totalRows > 0 || opts.silent !== true) {
      console.log(`Sync done in ${ms}ms · ${totalRows} rows`);
      if (totalRows > 0 && opts.silent !== true) toast(`Synced ${totalRows} update${totalRows===1?'':'s'} in ${ms}ms`, 'success');
    }
  } catch (err) {
    console.error('Pull failed:', err); cloud.status = 'error'; updateConnIndicator();
    toast('Sync error: ' + err.message, 'error');
  }
}

/* ---------- Outbox queue for resilient writes ---------- */
const outbox = {
  pending: [],
  inFlight: false,
  load() { try { this.pending = JSON.parse(localStorage.getItem('cloudOutbox') || '[]'); } catch(e) { this.pending = []; } },
  save() { localStorage.setItem('cloudOutbox', JSON.stringify(this.pending)); },
  enqueue(op) { this.pending.push(op); this.save(); this.flush(); },
  async flush() {
    if (this.inFlight || !navigator.onLine || !cloud.client || !cloud.activeProfileId) return;
    this.inFlight = true;
    let lastError = null;
    // Try every queued op once; collect failures for next round
    const queue = [...this.pending];
    this.pending = [];
    const failed = [];
    const failureKey = (op) => `${op.kind}:${op.store}:${op.data?.id || op.id || ''}`;
    if (!this.failureCounts) this.failureCounts = {};
    for (const op of queue) {
      try {
        await doCloudOp(op);
        delete this.failureCounts[failureKey(op)];
      } catch (err) {
        lastError = err;
        const k = failureKey(op);
        this.failureCounts[k] = (this.failureCounts[k] || 0) + 1;
        console.warn('Outbox op failed:', op.kind, op.store, err.message, `(attempt ${this.failureCounts[k]})`);
        // Drop after 5 failures permanently — corrupt or constraint-violating
        if (this.failureCounts[k] < 5) failed.push(op);
        else console.error('Dropping op after 5 failures:', op);
      }
    }
    this.pending = failed;
    this.save();
    this.inFlight = false;
    if (lastError && failed.length > 0) {
      cloud.status = 'error'; updateConnIndicator();
      cloud.lastSyncError = lastError.message;
      if (!cloud.errorShown) {
        cloud.errorShown = true;
        toast(`Sync partial: ${failed.length} item(s) failing. See Settings → Sync → Diagnose.`, 'warning');
        setTimeout(() => { cloud.errorShown = false; }, 60000);
      }
    } else if (this.pending.length === 0 && cloud.status !== 'online') {
      cloud.status = 'online'; updateConnIndicator();
      cloud.lastSyncError = null;
    }
  },
  clear() {
    this.pending = [];
    this.failureCounts = {};
    this.save();
  }
};

/* Dedupe local lookup-like tables before pushing (one-time cleanup of past duplicates) */
async function dedupeLocalLookups() {
  if (!cloud.activeProfileId) return 0;
  let removed = 0;
  // Categories: dedupe by (profile_id, kind, name)
  const cats = await dbAll('categories');
  const catSeen = new Map();
  for (const c of cats.filter(x => x.profileId === cloud.activeProfileId)) {
    const key = `${c.kind}::${c.name}`;
    if (catSeen.has(key)) {
      await dbDel('categories', c.id);
      removed++;
    } else catSeen.set(key, c);
  }
  state.categories = await dbAll('categories');
  state.categories = state.categories.filter(c => c.profileId === cloud.activeProfileId);
  // Subcategories: dedupe by (category_id, name)
  const subs = await dbAll('subcategories');
  const subSeen = new Set();
  for (const s of subs.filter(x => x.profileId === cloud.activeProfileId)) {
    const key = `${s.categoryId}::${s.name}`;
    if (subSeen.has(key)) {
      await dbDel('subcategories', s.id);
      removed++;
    } else subSeen.add(key);
  }
  state.subcategories = await dbAll('subcategories');
  state.subcategories = state.subcategories.filter(s => s.profileId === cloud.activeProfileId);
  // Tax flags: dedupe by (profile_id, name)
  const flags = await dbAll('taxFlags');
  const flagSeen = new Set();
  for (const f of flags.filter(x => x.profileId === cloud.activeProfileId)) {
    if (flagSeen.has(f.name)) {
      await dbDel('taxFlags', f.id);
      removed++;
    } else flagSeen.add(f.name);
  }
  state.taxFlags = await dbAll('taxFlags');
  state.taxFlags = state.taxFlags.filter(f => f.profileId === cloud.activeProfileId);
  return removed;
}

async function doCloudOp(op) {
  const map = TABLE_MAP[op.store]; if (!map) return;
  if (op.kind === 'upsert') {
    if (op.store === 'auditLog') {
      await cloud.client.from('audit_log').insert({
        id: op.data.id, profile_id: cloud.activeProfileId, user_id: cloud.user?.id || null,
        timestamp: op.data.timestamp, action: op.data.action,
        entity_type: op.data.entityType, entity_id: op.data.entityId,
        before_data: op.data.beforeData, after_data: op.data.afterData, notes: op.data.notes
      });
    } else {
      const snake = toSnake(op.data, map);
      snake.profile_id = cloud.activeProfileId;
      // Handle unique constraints beyond primary key
      let opts;
      if (op.store === 'categories') opts = { onConflict: 'profile_id,kind,name', ignoreDuplicates: true };
      else if (op.store === 'subcategories') opts = { onConflict: 'category_id,name', ignoreDuplicates: true };
      else if (op.store === 'taxFlags') opts = { onConflict: 'profile_id,name', ignoreDuplicates: true };
      const { error } = await cloud.client.from(map.table).upsert(snake, opts);
      if (error) throw new Error(error.message);
    }
  } else if (op.kind === 'delete') {
    const { error } = await cloud.client.from(map.table).delete().eq('id', op.id).eq('profile_id', cloud.activeProfileId);
    if (error) throw new Error(error.message);
  }
}

async function pushToCloud(storeName, obj) {
  if (!cloud.client || !cloud.activeProfileId) return;
  if (!TABLE_MAP[storeName]) return;
  // Skip records with non-UUID ids (legacy data from before UUID fix)
  if (obj.id && !isUuid(obj.id)) {
    console.warn(`Skipping cloud sync for ${storeName} id="${obj.id}" — not a UUID. Reset profile data to regenerate.`);
    return;
  }
  outbox.enqueue({ kind: 'upsert', store: storeName, data: obj });
}

async function deleteFromCloud(storeName, id) {
  if (!cloud.client || !cloud.activeProfileId) return;
  if (!TABLE_MAP[storeName]) return;
  if (id && !isUuid(id)) return; // skip legacy non-UUID
  outbox.enqueue({ kind: 'delete', store: storeName, id });
}

/* ---------- Realtime subscriptions ---------- */
function setupRealtimeSync() {
  if (!cloud.client || !cloud.activeProfileId) return;
  // Clean previous channels
  cloud.realtimeChannels.forEach(ch => { try { cloud.client.removeChannel(ch); } catch(e){} });
  cloud.realtimeChannels = [];
  cloud.realtimeStatus = {};
  // Subscribe to every profile-scoped table including settings
  for (const storeName of Object.keys(TABLE_MAP)) {
    if (storeName === 'auditLog') continue; // audit log doesn't need realtime
    const map = TABLE_MAP[storeName];
    const chanName = `${map.table}_${cloud.activeProfileId}`;
    const channel = cloud.client.channel(chanName)
      .on('postgres_changes',
        { event: '*', schema: 'public', table: map.table, filter: `profile_id=eq.${cloud.activeProfileId}` },
        async (payload) => {
          try {
            console.log(`📡 Realtime [${storeName}] ${payload.eventType}:`, payload.new?.id || payload.old?.id);
            if (payload.eventType === 'DELETE') {
              if (storeName === 'settings') {
                if (state.settings?.id === payload.old.id) state.settings = null;
              } else {
                state[storeName] = (state[storeName] || []).filter(x => x.id !== payload.old.id);
              }
              await _origDbDel(storeName, payload.old.id); // BYPASS cloud wrapper
            } else {
              const camel = toCamel(payload.new, map);
              if (storeName === 'settings') {
                state.settings = camel;
              } else {
                const arr = state[storeName] || (state[storeName] = []);
                const idx = arr.findIndex(x => x.id === camel.id);
                if (idx >= 0) arr[idx] = camel; else arr.push(camel);
              }
              await _origDbPut(storeName, camel); // BYPASS cloud wrapper
            }
            renderCurrent();
          } catch (err) {
            console.error('Realtime callback error:', storeName, err);
          }
        })
      .subscribe((status, err) => {
        cloud.realtimeStatus[storeName] = status;
        if (status === 'SUBSCRIBED') {
          console.log(`✓ Realtime subscribed: ${storeName}`);
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.warn(`✗ Realtime ${status}: ${storeName}`, err);
        }
      });
    cloud.realtimeChannels.push(channel);
  }
}

/* ---------- Wrap dbPut/dbDel: cloud-direct when connected, IndexedDB when offline ---------- */
const _origDbPut = dbPut;
const _origDbDel = dbDel;

async function dbPutSync(storeName, obj) {
  // AUTO-TAG profileId for profile isolation
  if (cloud.activeProfileId && obj && typeof obj === 'object' && !obj.profileId) {
    obj.profileId = cloud.activeProfileId;
  }
  // CLOUD-DIRECT MODE: when cloud is connected, write directly to Supabase
  if (cloud.user && cloud.activeProfileId && cloud.client) {
    // Settings is a singleton — special handling
    if (storeName === 'settings') {
      // Always write through to local cache for fast reads
      await _origDbPut(storeName, obj);
    }
    const map = TABLE_MAP[storeName];
    if (map) {
      // Skip non-UUID ids
      if (obj.id && !isUuid(obj.id)) {
        await _origDbPut(storeName, obj); // local only
        return;
      }
      try {
        if (storeName === 'auditLog') {
          await cloud.client.from('audit_log').insert({
            id: obj.id, profile_id: cloud.activeProfileId, user_id: cloud.user.id,
            timestamp: obj.timestamp, action: obj.action,
            entity_type: obj.entityType, entity_id: obj.entityId,
            before_data: obj.beforeData, after_data: obj.afterData, notes: obj.notes
          });
        } else {
          const snake = toSnake(obj, map);
          snake.profile_id = cloud.activeProfileId;
          let opts;
          if (storeName === 'categories') opts = { onConflict: 'profile_id,kind,name', ignoreDuplicates: false };
          else if (storeName === 'subcategories') opts = { onConflict: 'category_id,name', ignoreDuplicates: false };
          else if (storeName === 'taxFlags') opts = { onConflict: 'profile_id,name', ignoreDuplicates: false };
          const { error } = await cloud.client.from(map.table).upsert(snake, opts);
          if (error) throw new Error(error.message);
        }
        // Mirror to IndexedDB as cache (so next session starts fast)
        await _origDbPut(storeName, obj);
        cloud.status = 'online'; updateConnIndicator();
      } catch (err) {
        cloud.status = 'error'; updateConnIndicator();
        cloud.lastSyncError = err.message;
        toast('Save failed: ' + err.message.slice(0, 80), 'error');
        throw err;
      }
    } else {
      await _origDbPut(storeName, obj);
    }
    return;
  }
  // OFFLINE MODE: IndexedDB only
  await _origDbPut(storeName, obj);
}

async function dbDelSync(storeName, id) {
  if (cloud.user && cloud.activeProfileId && cloud.client && isUuid(id)) {
    const map = TABLE_MAP[storeName];
    if (map) {
      try {
        const { error } = await cloud.client.from(map.table).delete().eq('id', id).eq('profile_id', cloud.activeProfileId);
        if (error) throw new Error(error.message);
        await _origDbDel(storeName, id); // mirror local cache
        cloud.status = 'online'; updateConnIndicator();
        return;
      } catch (err) {
        cloud.status = 'error'; updateConnIndicator();
        toast('Delete failed: ' + err.message.slice(0, 80), 'error');
        throw err;
      }
    }
  }
  await _origDbDel(storeName, id);
}

// Replace globally
dbPut = dbPutSync;
dbDel = dbDelSync;

function confirmAndSwitchProfile(targetId) {
  const active = cloud.profiles.find(p => p.id === cloud.activeProfileId);
  const target = cloud.profiles.find(p => p.id === targetId);
  if (!target) return;
  const activeInitial = active ? active.name.charAt(0).toUpperCase() : '?';
  const targetInitial = target.name.charAt(0).toUpperCase();
  // Stats for current profile
  const accountsCount = state.accounts.length;
  const txnsCount = state.transactions.length;
  const draftsCount = state.transactions.filter(t => t.status === 'Draft').length;
  const outboxCount = outbox.pending.length;
  const lastSyncMap = getLastSync();
  const lastSyncTimes = Object.values(lastSyncMap).filter(Boolean).sort();
  const lastSync = lastSyncTimes[lastSyncTimes.length - 1];
  const lastSyncStr = lastSync ? timeAgo(lastSync) : 'Never';
  openModal('Switch Profile?', `
    <div class="text-xs text-tertiary mb-sm" style="text-transform:uppercase;letter-spacing:.06em;font-weight:700;">Currently in</div>

          <div class="text-xs text-tertiary">Last synced: ${lastSyncStr} ${cloud.status === 'online' ? '✓' : ''}</div>
        </div>
      </div>

      ${outboxCount > 0 ? `<strong>${outboxCount} unsynced change${outboxCount===1?'':'s'}</strong> queued — these will sync when you switch back.` : ''}

  `);
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return Math.round(diff/1000) + ' sec ago';
  if (diff < 3600000) return Math.round(diff/60000) + ' min ago';
  if (diff < 86400000) return Math.round(diff/3600000) + ' hr ago';
  return Math.round(diff/86400000) + ' day(s) ago';
}
