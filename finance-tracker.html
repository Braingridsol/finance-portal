      <button class="btn btn-ghost btn-sm" title="${r.active === false ? 'Activate' : 'Pause'}" onclick="toggleRecurring('${r.id}')"><i data-lucide="${r.active === false ? 'play' : 'pause'}"></i></button>
      <button class="btn btn-ghost btn-sm" onclick="openRecurringModal('${r.id}')"><i data-lucide="pencil"></i></button>
      <button class="btn btn-ghost btn-sm" onclick="deleteRecurring('${r.id}')"><i data-lucide="trash-2"></i></button>
    </div>
  </div>`;
}

async function saveRecurring(id) {
  const label = document.getElementById('rLabel').value.trim();
  if (!label) { toast('Label required','error'); return; }
  const type = document.getElementById('rType').value;
  const obj = {
    id: id || uid(), label, type,
    amount: +document.getElementById('rAmount').value || 0,
    category: document.getElementById('rCategory').value,
    frequency: document.getElementById('rFreq').value,
    dayOfMonth: +document.getElementById('rDay').value || 1,
    month: +(document.getElementById('rMonth')?.value || 0),
    fromAccountId: type === 'income' ? null : (document.getElementById('rFrom')?.value || null),
    toAccountId: (type === 'income' || type === 'transfer') ? (document.getElementById('rTo')?.value || null) : null,
    cardId: (type === 'settlement' || type === 'expense') ? (document.getElementById('rCard')?.value || null) : null,
    startDate: document.getElementById('rStart').value,
    endDate: document.getElementById('rEnd').value,
    active: id ? (state.recurring.find(x => x.id === id).active !== false) : true,
    autoCreateDrafts: document.getElementById('rAutoCreate').checked,
    draftAdvanceMonths: +document.getElementById('rAdvance').value || 3
  };
  const before = id ? state.recurring.find(x => x.id === id) : null;
  await dbPut('recurring', obj);
  if (id) {
    const i = state.recurring.findIndex(x => x.id === id);
    state.recurring[i] = obj;
    // Update existing future drafts from this template
    const futureDrafts = state.transactions.filter(t => t.recurringId === id && t.status === 'Draft' && t.date >= today());
    for (const d of futureDrafts) {
      const dBefore = { ...d };
      d.amount = obj.amount; d.category = obj.category;
      d.fromAccountId = obj.fromAccountId; d.toAccountId = obj.toAccountId; d.cardId = obj.cardId;
      d.payee = obj.label; d.type = obj.type;
      await dbPut('transactions', d);
      await audit('update','transaction',d.id,dBefore,d,'Updated from recurring template');
    }
  } else state.recurring.push(obj);
  await audit(id ? 'update' : 'create', 'recurring', obj.id, before, obj);
  // Generate fresh drafts
  await generateRecurringDrafts();
  closeModal(); toast('Saved — drafts updated','success'); renderCurrent();
}

async function toggleRecurring(id) {
  const r = state.recurring.find(x => x.id === id);
  const before = { ...r };
  r.active = !(r.active !== false);
  await dbPut('recurring', r);
  // If pausing, ask about future drafts
  if (!r.active) {
    const futureDrafts = state.transactions.filter(t => t.recurringId === id && t.status === 'Draft' && t.date >= today());
    if (futureDrafts.length && confirm(`Delete ${futureDrafts.length} pending draft(s) from this template?`)) {
      for (const d of futureDrafts) { await dbDel('transactions', d.id); }
      state.transactions = state.transactions.filter(t => !(t.recurringId === id && t.status === 'Draft' && t.date >= today()));
    }
  } else {
    await generateRecurringDrafts();
  }
  await audit('update', 'recurring', r.id, before, r, r.active ? 'Activated' : 'Paused');
  toast(r.active ? 'Activated' : 'Paused','success'); renderCurrent();
}

async function deleteRecurring(id) {
  const futureDrafts = state.transactions.filter(t => t.recurringId === id && t.status === 'Draft' && t.date >= today());
  if (!confirm(`Delete this template${futureDrafts.length ? ` and ${futureDrafts.length} pending draft(s)?` : '?'}`)) return;
  const r = state.recurring.find(x => x.id === id);
  await dbDel('recurring', id);
  state.recurring = state.recurring.filter(x => x.id !== id);
  // Delete future unsettled drafts
  for (const d of futureDrafts) { await dbDel('transactions', d.id); }
  state.transactions = state.transactions.filter(t => !(t.recurringId === id && t.status === 'Draft' && t.date >= today()));
  await audit('delete', 'recurring', id, r, null);
  toast('Deleted','success'); renderCurrent();
}

function renderProjection() {
  const horizon = state.settings.projectionDays || 60;
  const main = document.getElementById('main');
  const endDate = addDays(today(), horizon);
  // Reads from Draft transactions in next horizon days
  const drafts = state.transactions
    .filter(t => t.status === 'Draft' && t.date >= today() && t.date <= endDate)
    .sort((a,b) => a.date.localeCompare(b.date));
  // Compute per-account running balance starting from current
  const accountIds = state.accounts.filter(a => a.status === 'Active').map(a => a.id);
  const startBal = {}; accountIds.forEach(id => startBal[id] = +getAccount(id).balance);
  const running = { ...startBal };
  const projected = drafts.map(d => {
    const p = { ...d };
    if (d.type === 'income' && d.toAccountId) {
      running[d.toAccountId] = (running[d.toAccountId] || 0) + +d.amount;
      p.balAfter = running[d.toAccountId]; p.balAccountId = d.toAccountId;
    } else if (d.type === 'expense' && d.fromAccountId) {
      running[d.fromAccountId] = (running[d.fromAccountId] || 0) - +d.amount;
      p.balAfter = running[d.fromAccountId]; p.balAccountId = d.fromAccountId;
    } else if (d.type === 'settlement' && d.fromAccountId) {
      running[d.fromAccountId] = (running[d.fromAccountId] || 0) - +d.amount;
      p.balAfter = running[d.fromAccountId]; p.balAccountId = d.fromAccountId;
    } else if (d.type === 'transfer' && d.fromAccountId && d.toAccountId) {
      running[d.fromAccountId] = (running[d.fromAccountId] || 0) - +d.amount;
      running[d.toAccountId] = (running[d.toAccountId] || 0) + +d.amount;
      p.balAfter = running[d.fromAccountId]; p.balAccountId = d.fromAccountId;
    }
    const a = getAccount(p.balAccountId);
    p.lowBalance = a && +a.minBalance > 0 && p.balAfter < +a.minBalance && (a.minBalanceType || 'None') === 'Daily';
    return p;
  });
  const totalIn = projected.filter(p => p.type === 'income').reduce((s,p) => s + +p.amount, 0);
  const totalOut = projected.filter(p => p.type === 'expense' || p.type === 'settlement').reduce((s,p) => s + +p.amount, 0);
  const startTotal = Object.values(startBal).reduce((s,v) => s+v, 0);
  const endTotal = Object.values(running).reduce((s,v) => s+v, 0);
  const lowCount = projected.filter(p => p.lowBalance).length;

  main.innerHTML = `
    <div class="topbar">
      <div><div class="page-title">Projection</div>
        <div class="page-sub">${horizon}-day cash flow forecast · ${projected.length} planned items${lowCount ? ` · <span class="text-danger">${lowCount} low-balance warning${lowCount===1?'':'s'}</span>` : ''}</div></div>
      <div class="row">

const INVESTMENT_TYPES = ['Mutual Fund - SIP','Mutual Fund - Lumpsum','Stock','ETF','Gold','EPF','PPF','NPS','Bonds','Crypto','Other'];
const INV_STATUSES = ['Active','Closed','Matured','Sold'];
const INV_PURPOSES = ['Retirement','Emergency','Tax Saving','Specific Goal','Wealth Building','Liquidity','Other'];
const INV_ASSET_CLASSES = ['Equity','Debt','Hybrid','Gold','Real Estate','Cash','Crypto','Other'];
let invFilter = { status: 'Active' };

// Auto-suggest defaults
function defaultAssetClass(type) {
  if (type === 'Stock' || type === 'ETF') return 'Equity';
  if (type === 'Mutual Fund - SIP' || type === 'Mutual Fund - Lumpsum') return 'Equity';
  if (type === 'Bonds' || type === 'PPF' || type === 'EPF' || type === 'NPS') return 'Debt';
  if (type === 'Gold') return 'Gold';
  if (type === 'Crypto') return 'Crypto';
  return 'Other';
}
function defaultPurpose(type) {
  if (type === 'EPF' || type === 'PPF' || type === 'NPS') return 'Retirement';
  return 'Wealth Building';
}

function renderInvestments() {
  const main = document.getElementById('main');
  const list = state.investments.filter(i => invFilter.status === 'All' || i.status === invFilter.status);
  const totInv = state.investments.filter(i => i.status !== 'Closed').reduce((s,i) => s + +i.invested, 0);
  const totVal = state.investments.filter(i => i.status !== 'Closed').reduce((s,i) => s + +(i.currentValue || i.invested || 0), 0);
  const gain = totVal - totInv;
  const gainPct = totInv > 0 ? gain / totInv * 100 : 0;
  main.innerHTML = `
    <div class="topbar">
      <div><div class="page-title">Investments</div>
        <div class="page-sub">Invested <strong>${fmt(totInv)}</strong> · Current <strong>${fmt(totVal)}</strong> · <span class="${gain >= 0 ? 'text-success' : 'text-danger'}">${gain >= 0 ? '+' : ''}${fmt(gain)} (${gainPct.toFixed(1)}%)</span></div></div>
      <button class="btn btn-primary" onclick="openInvModal()"><i data-lucide="plus"></i>Add Investment</button>
    </div>
    <div class="pill-group">
      ${['Active','Matured','Sold','Closed','All'].map(s => `<button class="pill ${invFilter.status === s ? 'active' : ''}" onclick="invFilter.status='${s}';renderInvestments()">${s}</button>`).join('')}
    </div>
    ${list.length === 0 ? `
      <div class="empty">
        <div class="empty-icon"><i data-lucide="trending-up"></i></div>
        <div class="empty-title">No investments</div>
        <div class="empty-sub">Track SIPs, mutual funds, stocks, gold, EPF, PPF.</div>
      </div>
    ` : `<div class="grid grid-2">${list.map(i => investmentCardHTML(i)).join('')}</div>`}`;
  refreshIcons();
}

function investmentCardHTML(i) {
  const cur = +(i.currentValue || i.invested || 0);
  const g = cur - +i.invested;
  const gp = +i.invested > 0 ? g / +i.invested * 100 : 0;
  return `<div class="card">
    <div class="card-head">
      <div class="row gap-sm">
        <div class="list-icon"><i data-lucide="trending-up"></i></div>
        <div>
          <div class="list-title" style="font-size:14px;">${escapeHTML(i.name)}</div>
          <div class="list-sub">${escapeHTML(i.provider || '')}${i.folio ? ` · ${escapeHTML(i.folio)}` : ''}${i.status !== 'Active' ? ` · <span class="badge badge-warning">${i.status}</span>` : ''}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-ghost btn-sm" title="Update value" onclick="quickUpdateInvValue('${i.id}')"><i data-lucide="dollar-sign"></i></button>
        <button class="btn btn-ghost btn-sm" onclick="openInvModal('${i.id}')"><i data-lucide="pencil"></i></button>
        <button class="btn btn-ghost btn-sm" onclick="deleteInv('${i.id}')"><i data-lucide="trash-2"></i></button>
      </div>
    </div>
    <div class="grid mt-sm" style="grid-template-columns:1fr 1fr;gap:8px;">
      <div><div class="card-title">Invested</div><div class="fw-700" style="font-size:18px">${fmt(i.invested)}</div></div>
      <div><div class="card-title">Current Value</div><div class="fw-700" style="font-size:18px;color:var(--success)">${fmt(cur)}</div></div>
    </div>
    <div class="mt-sm row-between">
      <div class="row gap-xs">
        <span class="badge">${escapeHTML(i.type)}</span>
        <span class="badge badge-info">${escapeHTML(i.assetClass || defaultAssetClass(i.type))}</span>
        <span class="badge badge-primary">${escapeHTML(i.purpose || defaultPurpose(i.type))}</span>
      </div>
      <span class="fw-700 ${g >= 0 ? 'text-success' : 'text-danger'}">${g >= 0 ? '▲' : '▼'} ${fmt(Math.abs(g))} (${gp.toFixed(1)}%)</span>
    </div>
    ${i.sipAmount ? `<div class="text-xs text-tertiary mt-sm">SIP ${fmt(i.sipAmount)} on ${i.sipDay}${getDaySuffix(i.sipDay)} from ${escapeHTML((getAccount(i.paidFromAccountId) || {}).name || '—')}</div>` : ''}
    ${i.taxBenefit ? `<div class="mt-sm"><span class="badge badge-primary">${escapeHTML(i.taxBenefit)}</span></div>` : ''}
  </div>`;
}

      <div><label>Units (optional)</label><input id="iiUnits" type="number" step="0.0001" value="${i.units ?? ''}" /></div>
    </div>
    <div class="form-row"><div><label>Notes</label><textarea id="iiNotes">${i.notes ? escapeHTML(i.notes) : ''}</textarea></div></div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveInv('${id || ''}')">Save</button>
  `);
}

function onInvTypeChange() {
  const type = document.getElementById('iiType').value;
  document.getElementById('iiAssetClass').value = defaultAssetClass(type);
  document.getElementById('iiPurpose').value = defaultPurpose(type);
}

async function saveInv(id) {
  const name = document.getElementById('iiName').value.trim();
  if (!name) { toast('Name required','error'); return; }
  const type = document.getElementById('iiType').value;
  const obj = {
    id: id || uid(), name,
    provider: document.getElementById('iiProvider').value.trim(),
    type,
    status: document.getElementById('iiStatus').value,
    folio: document.getElementById('iiFolio').value.trim(),
    assetClass: document.getElementById('iiAssetClass').value,
    purpose: document.getElementById('iiPurpose').value,
    invested: +document.getElementById('iiInvested').value || 0,
    currentValue: +document.getElementById('iiCurrent').value || 0,
    sipAmount: +document.getElementById('iiSip').value || 0,
    sipDay: +document.getElementById('iiSipDay').value || 0,
    paidFromAccountId: document.getElementById('iiPaidFrom').value || null,
    startDate: document.getElementById('iiStart').value,
    maturityDate: document.getElementById('iiMaturity').value,
    taxBenefit: document.getElementById('iiTax').value,
    units: +document.getElementById('iiUnits').value || 0,
    notes: document.getElementById('iiNotes').value.trim()
  };
  const before = id ? state.investments.find(x => x.id === id) : null;
  await dbPut('investments', obj);
  if (id) { const idx = state.investments.findIndex(x => x.id === id); state.investments[idx] = obj; } else state.investments.push(obj);
  await audit(id ? 'update' : 'create', 'investment', obj.id, before, obj);
  closeModal(); toast('Saved','success'); renderCurrent();
}

async function deleteInv(id) {
  if (!confirm('Delete this investment?')) return;
  const i = state.investments.find(x => x.id === id);
  await dbDel('investments', id);
  state.investments = state.investments.filter(x => x.id !== id);
  await audit('delete', 'investment', id, i, null);
  toast('Deleted','success'); renderCurrent();
}

function quickUpdateInvValue(id) {
  const i = state.investments.find(x => x.id === id);
  openModal(`Update value: ${escapeHTML(i.name)}`, `
    <div class="form-row"><div><label>Current value</label><input id="qv" type="number" value="${i.currentValue || i.invested || 0}" autofocus /></div></div>
    <div class="text-sm text-tertiary">Invested: ${fmt(i.invested)} · Previous: ${fmt(i.currentValue || 0)}</div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveQuickInvValue('${id}')">Update</button>
  `);
}

async function saveQuickInvValue(id) {
  const v = +document.getElementById('qv').value;
  if (isNaN(v)) { toast('Invalid','error'); return; }
  const i = state.investments.find(x => x.id === id);
  const before = { ...i };
  i.currentValue = v;
  await dbPut('investments', i);
  await audit('update', 'investment', i.id, before, i, 'Value update');
  closeModal(); toast('Updated','success'); renderCurrent();
}

function getDaySuffix(d) { if (d > 3 && d < 21) return 'th'; switch (d % 10) { case 1: return 'st'; case 2: return 'nd'; case 3: return 'rd'; default: return 'th'; } }

function renderCards() {
  const main = document.getElementById('main');

        <div class="page-sub">Outstanding <strong>${fmt(totOut)}</strong> / Limit <strong>${fmt(totLimit)}</strong> · Utilization ${totLimit > 0 ? Math.round(totOut/totLimit*100) : 0}%</div></div>

function cardCardHTML(c) {
  const outstanding = getCardOutstanding(c.id);
  const avail = +c.limit - outstanding;
  const pct = c.limit > 0 ? outstanding / +c.limit * 100 : 0;
  const fill = pct >= 80 ? 'danger' : pct >= 50 ? 'warning' : 'success';
  const cycle = getCardCycle(c.id);
  const dueDays = cycle ? daysUntil(cycle.dueDate) : null;
  return `<div class="card">
    <div class="card-head">
      <div class="row gap-sm">
        <div class="list-icon"><i data-lucide="credit-card"></i></div>
        <div>
          <div class="list-title" style="font-size:14px;">${escapeHTML(c.name)}</div>
          <div class="list-sub">${escapeHTML(c.bank || '')}${c.network ? ` · ${escapeHTML(c.network)}` : ''}${c.last4 ? ` · ··${escapeHTML(c.last4)}` : ''}${c.status !== 'Active' ? ` · <span class="badge badge-warning">${c.status}</span>` : ''}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-ghost btn-sm" title="Settle bill" onclick="openSettlementModal('${c.id}')"><i data-lucide="banknote"></i></button>
        <button class="btn btn-ghost btn-sm" title="Statement" onclick="openCardStatement('${c.id}')"><i data-lucide="file-text"></i></button>
        <button class="btn btn-ghost btn-sm" title="Cycle history" onclick="openCardCycles('${c.id}')"><i data-lucide="calendar"></i></button>
        <button class="btn btn-ghost btn-sm" onclick="openCardModal('${c.id}')"><i data-lucide="pencil"></i></button>
        <button class="btn btn-ghost btn-sm" onclick="deleteCard('${c.id}')"><i data-lucide="trash-2"></i></button>
      </div>
    </div>
    <div class="grid mt-sm" style="grid-template-columns:1fr 1fr;gap:8px;">
      <div><div class="card-title">Outstanding</div><div class="fw-700" style="font-size:18px;color:${outstanding > 0 ? 'var(--danger)' : 'var(--success)'}">${fmt(outstanding)}</div></div>
      <div><div class="card-title">Available</div><div class="fw-700" style="font-size:18px;color:var(--success)">${fmt(avail)}</div></div>
    </div>
    <div class="mt-sm">
      <div class="row-between text-xs text-tertiary">
        <span>${pct.toFixed(0)}% utilization</span>
        <span class="badge badge-${pct >= 80 ? 'danger' : pct >= 50 ? 'warning' : 'success'}">${pct >= 80 ? 'High' : pct >= 50 ? 'Medium' : 'Healthy'}</span>
      </div>
      <div class="progress mt-sm"><div class="progress-fill ${fill}" style="width:${Math.min(100, pct)}%"></div></div>
    </div>
    ${cycle ? `<div class="alert alert-${dueDays <= 2 ? 'danger' : dueDays <= 7 ? 'warning' : 'info'} mt-sm" style="margin-bottom:0;">
      <i data-lucide="calendar-days" class="alert-icon"></i>
      <div><div><strong>Cycle:</strong> ${fmtDate(cycle.startDate, { year: '2-digit' })} – ${fmtDate(cycle.endDate, { year: '2-digit' })}</div>
        <div>Bill on ${c.billDay}${getDaySuffix(c.billDay)} · Due ${fmtDate(cycle.dueDate, { year: '2-digit' })}${dueDays !== null ? ` (${dueDays >= 0 ? 'in ' + dueDays + 'd' : -dueDays + 'd overdue'})` : ''}</div></div>
    </div>` : ''}
    <div class="text-xs text-tertiary mt-sm">Limit: ${fmt(c.limit)}${c.annualFee ? ` · Annual fee: ${fmt(c.annualFee)}` : ''}${c.rewardType && c.rewardType !== 'None' ? ` · ${c.rewardRate || 0}${c.rewardType === 'Cashback' ? '%' : ' pts/₹'} ${escapeHTML(c.rewardType)}` : ''}</div>
  </div>`;
}

    dueDay: +document.getElementById('cDueDay').value || 25,
    annualFee: +document.getElementById('cAnnualFee').value || 0,

async function deleteCard(id) {
  const refs = state.transactions.filter(t => t.cardId === id).length;

  if (!confirm('Delete this card?')) return;
  const c = getCard(id);
  await dbDel('cards', id);
  state.cards = state.cards.filter(x => x.id !== id);
  await audit('delete', 'card', id, c, null);
  toast('Deleted','success'); renderCurrent();
}

function openCardCycles(cardId) {
  const c = getCard(cardId); if (!c) return;
  const cycles = [];
  for (let i = 0; i < 12; i++) {
    const now = new Date();
    let start = new Date(now.getFullYear(), now.getMonth() - i, c.billDay || 1);
    let end = new Date(start); end.setMonth(end.getMonth() + 1); end.setDate(end.getDate() - 1);
    let due = new Date(end.getFullYear(), end.getMonth(), c.dueDay || 25);
    if (due < end) due.setMonth(due.getMonth() + 1);
    const sD = start.toISOString().slice(0,10), eD = end.toISOString().slice(0,10), dD = due.toISOString().slice(0,10);
    const exp = state.transactions.filter(t => t.cardId === cardId && t.status === 'Settled' && t.type === 'expense' && t.date >= sD && t.date <= eD).reduce((s,t) => s + +t.amount, 0);
    const set = state.transactions.filter(t => t.cardId === cardId && t.status === 'Settled' && t.type === 'settlement' && t.date >= sD && t.date <= addDays(dD, 5)).reduce((s,t) => s + +t.amount, 0);
    cycles.push({ start: sD, end: eD, due: dD, exp, set });
  }
  openModal(`Cycle history: ${escapeHTML(c.name)}`, `
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Cycle</th><th>Due</th><th class="num">Billed</th><th class="num">Paid</th><th>Status</th></tr></thead>
      <tbody>
        ${cycles.map(cy => {
          const bal = cy.exp - cy.set;
          const status = cy.exp === 0 ? 'No spend' : bal <= 0 ? 'Settled' : (new Date(cy.due) < todayDate() ? 'Overdue' : 'Pending');
          const cls = status === 'Settled' ? 'badge-success' : status === 'Overdue' ? 'badge-danger' : status === 'Pending' ? 'badge-warning' : '';
          return `<tr>
            <td class="text-xs">${fmtDate(cy.start, { year: '2-digit' })} – ${fmtDate(cy.end, { year: '2-digit' })}</td>
            <td class="text-xs">${fmtDate(cy.due, { year: '2-digit' })}</td>
            <td class="num">${fmt(cy.exp)}</td>
            <td class="num text-success">${fmt(cy.set)}</td>
            <td><span class="badge ${cls}">${status}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Close</button>`);
}

   SPRINT 2 — CARD STATEMENT VIEW + RECONCILIATION
============================================================ */

function buildCardCycleList(c) {
  // Returns array of {startDate, endDate, dueDate, label, isCurrent} for last 13 cycles (current + 12 past)
  const cycles = [];
  const now = new Date();
  const billDay = c.billDay || 1;
  const dueDay = c.dueDay || 25;
  for (let i = 0; i <= 12; i++) {
    let start = new Date(now.getFullYear(), now.getMonth() - i, billDay);
    if (i === 0 && now < start) start = new Date(now.getFullYear(), now.getMonth() - 1, billDay);
    let end = new Date(start); end.setMonth(end.getMonth() + 1); end.setDate(end.getDate() - 1);
    let due = new Date(end.getFullYear(), end.getMonth(), dueDay);
    if (due < end) due.setMonth(due.getMonth() + 1);
    const sD = start.toISOString().slice(0,10), eD = end.toISOString().slice(0,10), dD = due.toISOString().slice(0,10);
    cycles.push({
      startDate: sD, endDate: eD, dueDate: dD,
      label: `${fmtDate(sD, { year: '2-digit' })} – ${fmtDate(eD, { year: '2-digit' })}`,
      isCurrent: i === 0,
      isClosed: new Date(eD) < new Date()
    });
  }
  return cycles;
}

function openCardStatement(cardId, cycleIdx) {
  const c = getCard(cardId); if (!c) return;
  const cycles = buildCardCycleList(c);
  const idx = cycleIdx ?? cycles.findIndex(cy => cy.isClosed) ?? 1; // default to first closed
  const cy = cycles[idx];
  // Transactions in cycle
  const cardTxns = state.transactions.filter(t => t.cardId === cardId && t.status === 'Settled');
  const cyTxns = cardTxns.filter(t => t.date >= cy.startDate && t.date <= cy.endDate);
  const expenses = cyTxns.filter(t => t.type === 'expense');
  const purchases = expenses.filter(t => t.category !== 'Cash Advance' && t.category !== 'Fees' && t.category !== 'Interest').reduce((s,t) => s + +t.amount, 0);
  const fees = expenses.filter(t => t.category === 'Fees').reduce((s,t) => s + +t.amount, 0);
  const interest = expenses.filter(t => t.category === 'Interest').reduce((s,t) => s + +t.amount, 0);
  const cashAdv = expenses.filter(t => t.category === 'Cash Advance').reduce((s,t) => s + +t.amount, 0);
  // Settlements during cycle (paying off this bill)
  const payments = cardTxns.filter(t => t.type === 'settlement' && t.date >= cy.startDate && t.date <= addDays(cy.dueDate, 5)).reduce((s,t) => s + +t.amount, 0);
  // Previous balance = outstanding at start of this cycle (purchases before − settlements before)
  const prevExp = cardTxns.filter(t => t.type === 'expense' && t.date < cy.startDate).reduce((s,t) => s + +t.amount, 0);
  const prevSet = cardTxns.filter(t => t.type === 'settlement' && t.date < cy.startDate).reduce((s,t) => s + +t.amount, 0);
  const previousBalance = Math.max(0, prevExp - prevSet);
  const statementBalance = previousBalance + purchases + cashAdv + fees + interest - payments;
  const minPayment = Math.max(Math.round(statementBalance * (state.settings.cardMinPaymentPct || 5) / 100), statementBalance > 0 ? 100 : 0);
  const dueDays = daysUntil(cy.dueDate);
  // Comparison
  const prevCycle = cycles[idx + 1];
  let prevTotal = 0;
  if (prevCycle) {
    prevTotal = cardTxns.filter(t => t.type === 'expense' && t.date >= prevCycle.startDate && t.date <= prevCycle.endDate).reduce((s,t) => s + +t.amount, 0);
  }
  const cycleTotal = purchases + cashAdv + fees + interest;
  const vsPrevPct = prevTotal > 0 ? Math.round((cycleTotal - prevTotal) / prevTotal * 100) : 0;
  // 3-month avg
  let last3Total = 0, last3Count = 0;
  for (let i = idx + 1; i <= Math.min(idx + 3, cycles.length - 1); i++) {
    const pc = cycles[i];
    last3Total += cardTxns.filter(t => t.type === 'expense' && t.date >= pc.startDate && t.date <= pc.endDate).reduce((s,t) => s + +t.amount, 0);
    last3Count++;
  }
  const last3Avg = last3Count > 0 ? last3Total / last3Count : 0;
  const vsAvgPct = last3Avg > 0 ? Math.round((cycleTotal - last3Avg) / last3Avg * 100) : 0;
  // Top category
  const catTotals = {};
  expenses.forEach(t => catTotals[t.category] = (catTotals[t.category] || 0) + +t.amount);
  const topCat = Object.entries(catTotals).sort((a,b) => b[1] - a[1])[0];
  // Rewards
  let rewards = 0, rewardLabel = '';
  if (c.rewardType && c.rewardType !== 'None') {
    if (c.rewardType === 'Cashback') rewards = purchases * (c.rewardRate || 0) / 100;
    else rewards = Math.floor(purchases * (c.rewardRate || 0)); // points/miles
    rewardLabel = c.rewardType === 'Cashback' ? fmt(rewards) : `${rewards.toLocaleString('en-IN')} ${c.rewardType.toLowerCase()}`;
  }
  // Check for uploaded statement reconciliation
  const upload = (state.statementUploads || []).find(u => u.cardId === cardId && u.cycleStart === cy.startDate);
  const variance = upload ? +upload.statementBalance - statementBalance : 0;

  openModal(`Statement: ${escapeHTML(c.name)}`, `
    <div class="row gap-sm mb-md" style="align-items:end;">
      <div style="flex:1;"><label>Cycle</label><select id="cycleSelect" onchange="openCardStatement('${cardId}', +this.value)">
        ${cycles.map((cyc, i) => `<option value="${i}" ${i === idx ? 'selected' : ''}>${cyc.label}${cyc.isCurrent ? ' (current)' : ''}</option>`).join('')}
      </select></div>
      <button class="btn btn-secondary btn-sm" onclick="openStatementUpload('${cardId}','${cy.startDate}','${cy.endDate}',${statementBalance})"><i data-lucide="upload"></i>Reconcile</button>
    </div>
    ${cy.isCurrent ? `<div class="alert alert-info"><i data-lucide="info" class="alert-icon"></i><div>This cycle is in progress. Numbers will update until cycle close on ${fmtDate(cy.endDate)}.</div></div>` : ''}
    ${upload ? `<div class="alert ${Math.abs(variance) > 10 ? 'alert-warning' : 'alert-success'}">
      <i data-lucide="${Math.abs(variance) > 10 ? 'alert-triangle' : 'check-circle'}" class="alert-icon"></i>
      <div><strong>Reconciliation:</strong> Bank statement ${fmt(upload.statementBalance)} vs our calculation ${fmt(statementBalance)} · Variance ${fmtSigned(variance)}${Math.abs(variance) > 10 ? ' — review needed' : ' — within tolerance'}</div></div>` : ''}
    <div class="card mb-md" style="background:var(--surface-2);">
      <div class="section-title">Statement Summary</div>
      <table class="tbl" style="background:transparent;">
        <tbody>
          <tr><td>Previous balance</td><td class="num">${fmt(previousBalance)}</td></tr>
          <tr><td>Purchases (+)</td><td class="num text-danger">${fmt(purchases)}</td></tr>
          ${cashAdv > 0 ? `<tr><td>Cash advances (+)</td><td class="num text-danger">${fmt(cashAdv)}</td></tr>` : ''}
          ${fees > 0 ? `<tr><td>Fees & charges (+)</td><td class="num text-danger">${fmt(fees)}</td></tr>` : ''}
          ${interest > 0 ? `<tr><td>Interest (+)</td><td class="num text-danger">${fmt(interest)}</td></tr>` : ''}
          <tr><td>Payments / Credits (−)</td><td class="num text-success">${fmt(payments)}</td></tr>
          <tr style="background:var(--surface);font-weight:700;"><td>Statement balance</td><td class="num">${fmt(statementBalance)}</td></tr>
          <tr><td>Minimum payment due (${state.settings.cardMinPaymentPct || 5}%)</td><td class="num fw-700">${fmt(minPayment)}</td></tr>
          <tr><td>Payment due date</td><td class="num fw-700">${fmtDate(cy.dueDate)}${dueDays !== null ? ` <span class="badge ${dueDays <= 2 ? 'badge-danger' : dueDays <= 7 ? 'badge-warning' : 'badge-info'}">${dueDays >= 0 ? 'in ' + dueDays + 'd' : -dueDays + 'd overdue'}</span>` : ''}</td></tr>
        </tbody>
      </table>
    </div>
    ${c.rewardType && c.rewardType !== 'None' ? `<div class="card mb-md">
      <div class="section-title">Rewards This Cycle</div>
      <div class="text-sm">Earned: <strong>${rewardLabel}</strong> (${c.rewardRate}${c.rewardType === 'Cashback' ? '%' : ' per ₹'} on ${fmt(purchases)})</div>
    </div>` : ''}
    <div class="card mb-md">
      <div class="section-title">Transactions in this cycle (${cyTxns.length})</div>
      ${cyTxns.length === 0 ? '<div class="empty-sub" style="padding:20px;text-align:center;">No transactions in this cycle</div>' : `
        <div class="tbl-wrap"><table class="tbl">
          <thead><tr><th>Date</th><th>Description</th><th>Category</th><th class="num">Amount</th></tr></thead>
          <tbody>
            ${cyTxns.sort((a,b) => a.date.localeCompare(b.date)).map(t => `<tr>
              <td class="text-xs">${fmtDate(t.date, { year: '2-digit' })}</td>
              <td>${escapeHTML(t.payee || t.note || '—')}</td>
              <td class="text-xs"><span class="badge">${escapeHTML(t.category)}</span></td>
              <td class="num ${t.type === 'settlement' ? 'text-success' : 'text-danger'}">${t.type === 'settlement' ? '−' : ''}${fmt(t.amount)}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>
      `}
    </div>
    ${prevCycle || last3Avg > 0 ? `<div class="card">
      <div class="section-title">Comparison</div>
      <div class="grid grid-mini">
        ${prevCycle ? `<div class="card" style="padding:12px;">
          <div class="card-title">vs Last Cycle</div>
          <div class="stat-value ${vsPrevPct > 0 ? 'text-danger' : 'text-success'}" style="font-size:18px;">${vsPrevPct > 0 ? '+' : ''}${vsPrevPct}%</div>
          <div class="text-xs text-tertiary">Last cycle: ${fmt(prevTotal)}</div>
        </div>` : ''}
        ${last3Avg > 0 ? `<div class="card" style="padding:12px;">
          <div class="card-title">vs 3-Month Avg</div>
          <div class="stat-value ${vsAvgPct > 0 ? 'text-danger' : 'text-success'}" style="font-size:18px;">${vsAvgPct > 0 ? '+' : ''}${vsAvgPct}%</div>
          <div class="text-xs text-tertiary">3-mo avg: ${fmt(last3Avg)}</div>
        </div>` : ''}
        ${topCat ? `<div class="card" style="padding:12px;">
          <div class="card-title">Top Category</div>
          <div class="fw-700">${escapeHTML(topCat[0])}</div>
          <div class="text-xs text-tertiary">${fmt(topCat[1])} (${Math.round(topCat[1]/cycleTotal*100)}%)</div>
        </div>` : ''}
      </div>
    </div>` : ''}
  `, `
    <button class="btn btn-secondary" onclick="window.print()"><i data-lucide="printer"></i>Print</button>
    ${statementBalance > 0 && !cy.isCurrent ? `<button class="btn btn-primary" onclick="closeModal();openSettlementModal('${cardId}')"><i data-lucide="banknote"></i>Settle this bill</button>` : ''}
    <button class="btn btn-secondary" onclick="closeModal()">Close</button>
  `, { wide: true });
}

function openStatementUpload(cardId, cycleStart, cycleEnd, appBalance) {
  const existing = (state.statementUploads || []).find(u => u.cardId === cardId && u.cycleStart === cycleStart);
  openModal('Bank Statement Reconciliation', `
    <div class="alert alert-info"><i data-lucide="info" class="alert-icon"></i>
      <div>Enter the statement balance from your bank's statement. We'll compare to our calculated total of <strong>${fmt(appBalance)}</strong>.</div></div>
    <div class="form-row form-row-2">
      <div><label>Cycle start</label><input value="${fmtDate(cycleStart)}" readonly /></div>
      <div><label>Cycle end</label><input value="${fmtDate(cycleEnd)}" readonly /></div>
    </div>
    <div class="form-row">
      <div><label>Statement balance (from bank)</label><input id="stmBal" type="number" step="0.01" value="${existing?.statementBalance ?? ''}" autofocus /></div>
    </div>
    <div class="form-row"><div><label>Notes</label><textarea id="stmNotes" placeholder="e.g. EMI conversion charges">${existing?.notes ? escapeHTML(existing.notes) : ''}</textarea></div></div>
  `, `
    ${existing ? `<button class="btn btn-danger" onclick="deleteStatementUpload('${existing.id}','${cardId}')">Remove</button>` : ''}
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveStatementUpload('${cardId}','${cycleStart}','${cycleEnd}',${appBalance})">Save</button>
  `);
}

async function saveStatementUpload(cardId, cycleStart, cycleEnd, appBalance) {
  const bal = +document.getElementById('stmBal').value;
  if (isNaN(bal)) { toast('Enter statement balance','error'); return; }
  const notes = document.getElementById('stmNotes').value.trim();
  // Ensure object store exists (lazy add to state)
  state.statementUploads = state.statementUploads || [];
  // Check if we need to add it to STORES
  try {
    const existing = state.statementUploads.find(u => u.cardId === cardId && u.cycleStart === cycleStart);
    const obj = existing ? { ...existing } : { id: uid(), cardId, cycleStart, cycleEnd, uploadedAt: nowISO() };
    obj.statementBalance = bal;
    obj.appBalance = appBalance;
    obj.variance = bal - appBalance;
    obj.notes = notes;
    // Try to save; if store doesn't exist, fall back to localStorage
    try { await dbPut('statementUploads', obj); }
    catch (e) {
      // Store doesn't exist in IndexedDB v1 schema — use localStorage fallback
      const all = JSON.parse(localStorage.getItem('statementUploads') || '[]');
      const idx = all.findIndex(x => x.id === obj.id);
      if (idx >= 0) all[idx] = obj; else all.push(obj);
      localStorage.setItem('statementUploads', JSON.stringify(all));
    }
    if (existing) {
      const i = state.statementUploads.findIndex(x => x.id === obj.id);
      state.statementUploads[i] = obj;
    } else state.statementUploads.push(obj);
    closeModal(); toast('Reconciliation saved','success');
    openCardStatement(cardId);
  } catch (err) { toast('Save failed: ' + err.message,'error'); }
}

async function deleteStatementUpload(id, cardId) {
  if (!confirm('Remove this reconciliation?')) return;
  try { await dbDel('statementUploads', id); } catch (e) {
    const all = JSON.parse(localStorage.getItem('statementUploads') || '[]').filter(x => x.id !== id);
    localStorage.setItem('statementUploads', JSON.stringify(all));
  }
  state.statementUploads = (state.statementUploads || []).filter(x => x.id !== id);
  closeModal(); toast('Removed','success'); openCardStatement(cardId);
}

async function saveLoan(id) {
  const name = document.getElementById('lName').value.trim();
  if (!name) { toast('Name required','error'); return; }
  const emi = +document.getElementById('lEmi').value || 0;
  const rate = +document.getElementById('lRate').value || 0;
  const tenure = +document.getElementById('lTenure').value || 0;
  const obj = {
    id: id || uid(), name,
    lender: document.getElementById('lLender').value.trim(),
    type: document.getElementById('lType').value,
    status: document.getElementById('lStatus').value,
    last4: document.getElementById('lLast4').value.trim(),
    sanctionedAmount: +document.getElementById('lSanctioned').value || 0,
    outstanding: +document.getElementById('lOutstanding').value || 0,
    originalEmi: id ? (getLoan(id).originalEmi || emi) : emi,
    currentEmi: emi,
    emiDay: +document.getElementById('lEmiDay').value || 0,
    originalRate: id ? (getLoan(id).originalRate || rate) : rate,
    currentRate: rate,
    rateType: document.getElementById('lRateType').value,
    disbursementDate: document.getElementById('lDisb').value,
    originalTenureMonths: id ? (getLoan(id).originalTenureMonths || tenure) : tenure,
    currentTenureRemaining: tenure,
    paidFromAccountId: document.getElementById('lPaidFrom').value || null,
    processingFee: +document.getElementById('lProcFee').value || 0,
    otherCharges: +document.getElementById('lOther').value || 0,
    notes: document.getElementById('lNotes').value.trim()
  };
  const before = id ? getLoan(id) : null;
  await dbPut('loans', obj);
  if (id) { const i = state.loans.findIndex(x => x.id === id); state.loans[i] = obj; } else state.loans.push(obj);
  await audit(id ? 'update' : 'create', 'loan', obj.id, before, obj);
  closeModal(); toast('Saved','success'); renderCurrent();
}

async function deleteLoan(id) {
  if (!confirm('Delete this loan?')) return;
  const l = getLoan(id);
  await dbDel('loans', id);
  state.loans = state.loans.filter(x => x.id !== id);
  // Delete loan events
  const events = state.loanEvents.filter(e => e.loanId === id);
  for (const e of events) await dbDel('loanEvents', e.id);
  state.loanEvents = state.loanEvents.filter(e => e.loanId !== id);
  await audit('delete', 'loan', id, l, null);
  toast('Deleted','success'); renderCurrent();
}

/* ============================================================
   SPRINT 2 — LOAN AMORTIZATION + EDIT TABS + PREPAYMENT RECALC
============================================================ */

/* ---------- Amortization math ---------- */
function calcEMI(principal, annualRate, months) {
  if (!principal || !months) return 0;
  const r = annualRate / 12 / 100;
  if (r === 0) return principal / months;
  const p = Math.pow(1 + r, months);
  return principal * r * p / (p - 1);
}

function calcMonthsForEMI(balance, emi, annualRate) {
  // n = ln(EMI / (EMI - B*r)) / ln(1 + r)
  const r = annualRate / 12 / 100;
  if (r === 0) return Math.ceil(balance / emi);
  const denom = emi - balance * r;
  if (denom <= 0) return Infinity; // EMI can't even cover interest
  return Math.ceil(Math.log(emi / denom) / Math.log(1 + r));
}

function totalInterestForPlan(balance, emi, months, annualRate) {
  const r = annualRate / 12 / 100;
  let bal = balance, totInt = 0;
  for (let i = 0; i < months && bal > 0.01; i++) {
    const interest = bal * r;
    const principal = Math.min(emi - interest, bal);
    totInt += interest;
    bal -= principal;
  }
  return totInt;
}

/* Generate full schedule from loan's event log + project forward */
function generateLoanSchedule(loan) {
  const schedule = [];
  const events = state.loanEvents.filter(e => e.loanId === loan.id).sort((a,b) => a.date.localeCompare(b.date));
  let balance = +loan.sanctionedAmount;
  let emi = +loan.originalEmi;
  let rate = +loan.originalRate;
  let date = loan.disbursementDate || today();
  let n = +loan.originalTenureMonths || calcMonthsForEMI(balance, emi, rate);
  let remaining = n;
  let monthCount = 0;

  // Walk through historical events
  for (const ev of events) {
    // Auto-generate any scheduled EMIs between current date and event date
    while (date < ev.date && balance > 0.01) {
      const monthlyRate = rate / 12 / 100;
      const interest = balance * monthlyRate;
      const principal = Math.min(emi - interest, balance);
      balance -= principal;
      monthCount++;
      schedule.push({
        month: monthCount, date,
        openingBalance: balance + principal,
        emi, interest, principal,
        closingBalance: balance,
        status: 'Projected (pre-event)',
        eventType: null
      });
      date = addMonths(date, 1);
      remaining--;
      if (remaining <= 0) break;
    }
    // Apply the event itself
    if (ev.eventType === 'EMI') {
      const monthlyRate = rate / 12 / 100;
      const interest = +ev.amount > balance * monthlyRate ? balance * monthlyRate : +ev.amount * 0.5;
      const principal = Math.min(+ev.amount - interest, balance);
      balance = Math.max(0, balance - principal);
      monthCount++;
      schedule.push({
        month: monthCount, date: ev.date,
        openingBalance: balance + principal,
        emi: +ev.amount, interest, principal,
        closingBalance: balance,
        status: 'Paid',
        eventType: 'EMI'
      });
      date = addMonths(ev.date, 1);
      remaining--;
    } else if (ev.eventType === 'Prepayment') {
      balance = Math.max(0, balance - +ev.amount);
      schedule.push({
        month: '—', date: ev.date,
        openingBalance: balance + +ev.amount,
        emi: 0, interest: 0, principal: +ev.amount,
        closingBalance: balance,
        status: 'Prepayment',
        eventType: 'Prepayment',
        note: ev.note || ''
      });
      // Recalculate remaining tenure or EMI based on strategy
      if (ev.strategy === 'ReduceEMI') {
        emi = calcEMI(balance, rate, remaining);
      } else {
        // ReduceTenure (default): keep EMI same, recompute n
        remaining = calcMonthsForEMI(balance, emi, rate);
      }
    } else if (ev.eventType === 'RateChange') {
      rate = +ev.newValue;
      emi = calcEMI(balance, rate, remaining);
      schedule.push({
        month: '—', date: ev.date,
        openingBalance: balance, emi: 0, interest: 0, principal: 0,
        closingBalance: balance,
        status: `Rate changed: ${ev.oldValue}% → ${ev.newValue}%`,
        eventType: 'RateChange'
      });
    } else if (ev.eventType === 'TenureChange') {
      remaining = +ev.newValue;
      emi = calcEMI(balance, rate, remaining);
      schedule.push({
        month: '—', date: ev.date,
        openingBalance: balance, emi: 0, interest: 0, principal: 0,
        closingBalance: balance,
        status: `Tenure changed: ${ev.oldValue} → ${ev.newValue} months`,
        eventType: 'TenureChange'
      });
    } else if (ev.eventType === 'EmiChange') {
      emi = +ev.newValue;
      remaining = calcMonthsForEMI(balance, emi, rate);
      schedule.push({
        month: '—', date: ev.date,
        openingBalance: balance, emi: 0, interest: 0, principal: 0,
        closingBalance: balance,
        status: `EMI changed: ₹${ev.oldValue} → ₹${ev.newValue}`,
        eventType: 'EmiChange'
      });
    } else if (ev.eventType === 'Foreclosure') {
      balance = 0;
      schedule.push({
        month: '—', date: ev.date,
        openingBalance: +ev.amount, emi: 0, interest: 0, principal: +ev.amount,
        closingBalance: 0,
        status: 'Foreclosed',
        eventType: 'Foreclosure'
      });
      return schedule; // No more future EMIs
    }
  }
  // Project future EMIs
  if (loan.status === 'Active') {
    let safetyLimit = remaining || 600;
    while (balance > 0.01 && safetyLimit-- > 0) {
      const monthlyRate = rate / 12 / 100;
      const interest = balance * monthlyRate;
      const principal = Math.min(emi - interest, balance);
      if (principal <= 0) break;
      balance -= principal;
      monthCount++;
      schedule.push({
        month: monthCount, date,
        openingBalance: balance + principal,
        emi, interest, principal,
        closingBalance: balance,
        status: 'Planned',
        eventType: null
      });
      date = addMonths(date, 1);
    }
  } else if (loan.status === 'Closed' || loan.status === 'Foreclosed') {
    // Mark remaining as cancelled if no events ended it
  }
  return schedule;
}

/* ---------- Loan Schedule View ---------- */
function openLoanSchedule(loanId) {
  const l = getLoan(loanId); if (!l) return;
  const schedule = generateLoanSchedule(l);
  // Group by year
  const byYear = {};
  schedule.forEach(row => {
    if (!row.date) return;
    const yr = row.date.slice(0,4);
    (byYear[yr] = byYear[yr] || []).push(row);
  });
  const years = Object.keys(byYear).sort();

              ${byYear[yr].map(r => `<tr style="${r.eventType && r.eventType !== 'EMI' ? 'background:var(--surface-2);font-style:italic;' : ''}${r.status === 'Paid' ? 'color:var(--text-secondary);' : ''}">

function previewRateChange(loanId) {

    <div class="form-row">
      <label>Recalculation strategy:</label>
      <div style="display:flex;flex-direction:column;gap:8px;background:var(--surface-2);padding:12px;border-radius:var(--radius-md);">
        <label style="margin:0;"><input type="radio" name="ppStrategy" value="ReduceTenure" checked onchange="previewPrepayment('${loanId}')" /> <strong>Reduce tenure</strong> <span class="text-xs text-tertiary">— keep EMI same, finish loan faster (recommended)</span></label>
        <label style="margin:0;"><input type="radio" name="ppStrategy" value="ReduceEMI" onchange="previewPrepayment('${loanId}')" /> <strong>Reduce EMI</strong> <span class="text-xs text-tertiary">— keep tenure same, lower monthly payment</span></label>
      </div>
    </div>
    <div class="form-row"><div><label>Note</label><input id="pNote" placeholder="e.g. Bonus prepayment" /></div></div>
    <div id="ppPreview" class="alert" style="display:none;"></div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="savePrepaymentV2('${loanId}')">Save Prepayment</button>
  `);

function previewPrepayment(loanId) {
  const l = getLoan(loanId);
  const amt = +document.getElementById('pAmount').value;
  const strat = document.querySelector('input[name="ppStrategy"]:checked')?.value || 'ReduceTenure';
  const div = document.getElementById('ppPreview');
  if (!amt || amt <= 0 || amt > +l.outstanding) { div.style.display = 'none'; return; }
  const rate = l.currentRate || l.originalRate;
  const oldEmi = l.currentEmi || l.originalEmi;
  const oldN = l.currentTenureRemaining || calcMonthsForEMI(l.outstanding, oldEmi, rate);
  const newBalance = +l.outstanding - amt;
  // Interest with no prepayment
  const intNoPP = totalInterestForPlan(+l.outstanding, oldEmi, oldN, rate);
  let msg = '', cls = 'alert-success';
  if (strat === 'ReduceTenure') {
    const newN = calcMonthsForEMI(newBalance, oldEmi, rate);
    const intWithPP = totalInterestForPlan(newBalance, oldEmi, newN, rate);
    const saved = intNoPP - intWithPP;
    const monthsSaved = oldN - newN;
    msg = `<strong>Tenure reduces by ${monthsSaved} months</strong> (${oldN} → ${newN}). EMI stays at <strong>${fmt(oldEmi)}</strong>. Interest saved: <strong>${fmt(saved)}</strong>.`;
  } else {
    const newEmi = calcEMI(newBalance, rate, oldN);
    const intWithPP = totalInterestForPlan(newBalance, newEmi, oldN, rate);
    const saved = intNoPP - intWithPP;
    const emiSaved = oldEmi - newEmi;
    msg = `<strong>EMI reduces by ${fmt(emiSaved)}/month</strong> (${fmt(oldEmi)} → ${fmt(newEmi)}). Tenure stays at <strong>${oldN} months</strong>. Interest saved: <strong>${fmt(saved)}</strong>.`;
  }
  div.className = 'alert ' + cls;
  div.style.display = 'flex';
  div.innerHTML = `<i data-lucide="trending-down" class="alert-icon"></i><div>${msg}</div>`;
  refreshIcons();
}

async function savePrepaymentV2(loanId) {
  const l = getLoan(loanId);
  const amount = +document.getElementById('pAmount').value;
  if (!amount || amount <= 0) { toast('Invalid amount','error'); return; }
  if (amount > +l.outstanding) { toast('Exceeds outstanding','error'); return; }
  const fromId = document.getElementById('pFrom').value;
  if (!fromId) { toast('Choose source account','error'); return; }
  const date = document.getElementById('pDate').value || today();
  const note = document.getElementById('pNote').value.trim() || 'Prepayment';
  const strategy = document.querySelector('input[name="ppStrategy"]:checked')?.value || 'ReduceTenure';
  const rate = l.currentRate || l.originalRate;
  const oldEmi = l.currentEmi || l.originalEmi;
  const oldN = l.currentTenureRemaining || calcMonthsForEMI(l.outstanding, oldEmi, rate);
  // Create expense transaction
  const t = {
    id: uid(), type:'expense', status:'Settled', source:'LoanEMI',
    date, amount, category:'EMI', subcategory:'',
    fromAccountId: fromId, toAccountId: null, cardId: null,
    loanId, insuranceId: null, recurringId: null,
    payee:'', mode:'', reference:'', taxFlag:'',
    note: `Prepayment: ${l.name} — ${note}`,
    draftCreatedAt: nowISO(), settledAt: nowISO()
  };
  await dbPut('transactions', t); state.transactions.push(t);
  await applyTxnToBalance(t, +1);
  // Event log
  const before = { ...l };
  const ev = { id: uid(), loanId, date, eventType: 'Prepayment', amount, fromAccountId: fromId, strategy, note, balanceAfter: 0, createdAt: nowISO() };
  l.outstanding = Math.max(0, +l.outstanding - amount);
  ev.balanceAfter = l.outstanding;
  await dbPut('loanEvents', ev); state.loanEvents.push(ev);
  // Recalc
  if (l.outstanding === 0) {
    l.status = 'Closed';
  } else {
    if (strategy === 'ReduceTenure') {
      l.currentTenureRemaining = calcMonthsForEMI(l.outstanding, oldEmi, rate);
    } else {
      l.currentEmi = Math.round(calcEMI(l.outstanding, rate, oldN));
    }
  }
  await dbPut('loans', l);
  await audit('create', 'transaction', t.id, null, t, 'Prepayment');
  await audit('update', 'loan', l.id, before, l, `Prepayment ${strategy}`);
  closeModal(); toast('Prepayment recorded','success'); renderCurrent();
}

function annualizedPremium(i) {
  const p = +i.premium || 0;
  const f = (i.frequency || '').toLowerCase();
  if (f === 'monthly') return p * 12;
  if (f === 'quarterly') return p * 4;
  if (f === 'half-yearly') return p * 2;
  if (f === 'single') return 0;
  return p;
}

const ACCOUNT_TYPES = ['Savings','Current','Salary','Fixed Deposit','Recurring Deposit','Wallet','Cash','NRE','NRO','Demat Cash','Other'];
const ACCOUNT_STATUSES = ['Active','Dormant','Closed'];
const ACCOUNT_ICONS = {
  'Savings': 'piggy-bank', 'Current': 'building-2', 'Salary': 'briefcase',
  'Fixed Deposit': 'lock', 'Recurring Deposit': 'repeat',
  'Wallet': 'smartphone', 'Cash': 'banknote',
  'NRE': 'globe', 'NRO': 'globe', 'Demat Cash': 'trending-up', 'Other': 'wallet'
};
const INTEREST_PAYOUT = ['Cumulative','Monthly','Quarterly','Half-yearly','Yearly'];
const MIN_BAL_TYPES = ['None','Daily','AMB','AQB'];
let accountsFilter = { status: 'Active' };

/* AMB/AQB balance reconstruction */
function txnDeltaForAccount(t, accountId) {
  if (t.status !== 'Settled') return 0;
  if (t.type === 'income' && t.toAccountId === accountId) return +t.amount;
  if (t.type === 'expense' && t.fromAccountId === accountId) return -+t.amount;
  if (t.type === 'settlement' && t.fromAccountId === accountId) return -+t.amount;
  if (t.type === 'transfer' && t.fromAccountId === accountId) return -+t.amount;
  if (t.type === 'transfer' && t.toAccountId === accountId) return +t.amount;
  return 0;
}

function getDailyBalances(accountId, fromDate, toDate) {
  const a = getAccount(accountId); if (!a) return {};
  const txns = state.transactions
    .filter(t => t.status === 'Settled' && (t.fromAccountId === accountId || t.toAccountId === accountId))
    .sort((x, y) => x.date.localeCompare(y.date));
  let opening = +a.balance;
  for (const t of txns) {
    if (t.date >= fromDate) opening -= txnDeltaForAccount(t, accountId);
  }
  const result = {};
  let running = opening;
  let d = fromDate;
  while (d <= toDate) {
    for (const t of txns.filter(x => x.date === d)) running += txnDeltaForAccount(t, accountId);
    result[d] = running;
    d = addDays(d, 1);
  }
  return result;
}

function monthRange(mk) {
  const [y, m] = mk.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  return { start: `${mk}-01`, end: `${mk}-${String(lastDay).padStart(2,'0')}`,
    label: new Date(y, m-1, 1).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' }) };
}

function quarterRange(year, q) {
  const sm = (q-1)*3+1, em = sm+2;
  const lastDay = new Date(year, em, 0).getDate();
  return { start: `${year}-${String(sm).padStart(2,'0')}-01`,
    end: `${year}-${String(em).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`,
    label: `Q${q} ${year}` };
}

function currentQuarter() { const d = new Date(); return { year: d.getFullYear(), q: Math.floor(d.getMonth()/3)+1 }; }
function previousQuarter() { const c = currentQuarter(); return c.q === 1 ? { year: c.year-1, q: 4 } : { year: c.year, q: c.q-1 }; }

function avgBalance(accountId, fromDate, toDate) {
  const cap = toDate > today() ? today() : toDate;
  if (cap < fromDate) return null;
  const daily = getDailyBalances(accountId, fromDate, cap);
  const vals = Object.values(daily);
  if (!vals.length) return null;
  return { avg: vals.reduce((s,v) => s+v, 0) / vals.length,
    daysElapsed: vals.length,
    totalDays: Math.round((new Date(toDate) - new Date(fromDate)) / 86400000) + 1,
    daily };
}

function computeAMB(accountId, mk) { const r = monthRange(mk); return avgBalance(accountId, r.start, r.end); }
function computeAQB(accountId, year, q) { const r = quarterRange(year, q); return avgBalance(accountId, r.start, r.end); }

function accountCardHTML(a) {
  const icon = ACCOUNT_ICONS[a.type] || 'wallet';
  const isDeposit = a.type === 'Fixed Deposit' || a.type === 'Recurring Deposit';
  const isCashish = a.type === 'Cash' || a.type === 'Wallet';
  const minType = a.minBalanceType || 'None';
  const minBal = +a.minBalance || 0;
  const lowDaily = minType === 'Daily' && minBal > 0 && +a.balance < minBal;

  // Line 1: Icon · Bank · Name · Type · Last4    →    Balance
  const bankParts = [];
  if (a.bank && a.bank !== a.name) bankParts.push(`<span class="acc-bank">${escapeHTML(a.bank)}</span>`);
  bankParts.push(`<span class="acc-name">${escapeHTML(a.name)}</span>`);
  bankParts.push(`<span class="acc-type">${escapeHTML(a.type)}</span>`);
  if (a.last4) bankParts.push(`<span class="acc-num">·· ${escapeHTML(a.last4)}</span>`);
  if (a.status !== 'Active') bankParts.push(`<span class="badge badge-warning">${a.status}</span>`);

  // Line 2: meta info → actions
  let line2 = '';
  if (isDeposit) {
    const days = a.maturityDate ? daysUntil(a.maturityDate) : null;
    const parts = [];
    if (days !== null) {
      if (days < 0) parts.push(`<span class="text-warning fw-600">Matured ${-days}d ago</span>`);
      else if (days <= 30) parts.push(`<span class="text-warning fw-600">Matures in ${days}d</span>`);
      else parts.push(`Matures in ${days}d`);
    }
    if (+a.interestRate > 0) parts.push(`${a.interestRate}% ${a.interestPayout ? a.interestPayout.toLowerCase() : 'p.a.'}`);
    if (+a.maturityAmount > 0) parts.push(`Maturity ${fmt(a.maturityAmount)}`);
    line2 = parts.join(' <span class="acc-sep">·</span> ');
  } else if (isCashish || minType === 'None') {
    const parts = [];
    if (+a.interestRate > 0) parts.push(`${a.interestRate}% p.a.`);
    const txnCount = state.transactions.filter(t => t.fromAccountId === a.id || t.toAccountId === a.id).length;
    if (txnCount > 0) parts.push(`${txnCount} txn${txnCount === 1 ? '' : 's'}`);
    if (minType === 'Daily' && minBal > 0) parts.push(`Min daily ${fmt(minBal)}${lowDaily ? ' ⚠' : ' ✓'}`);
    line2 = parts.join(' <span class="acc-sep">·</span> ');
    if (!line2) line2 = '<span class="text-tertiary">No transactions yet</span>';
  } else {
    // Both AMB and AQB
    const ambResult = computeAMB(a.id, currentMonthKey());
    const cq = currentQuarter();
    const aqbResult = computeAQB(a.id, cq.year, cq.q);
    const monthLabel = new Date(currentMonthKey() + '-02').toLocaleDateString('en-IN', { month: 'short' });
    const qLabel = `Q${cq.q}`;
    const parts = [];
    const metricHTML = (label, result, isStarred) => {
      if (!result) return '';
      const meets = minBal > 0 ? result.avg >= minBal : null;
      const cls = meets === true ? 'ok' : meets === false ? 'bad' : '';
      const sym = meets === true ? ' ✓' : meets === false ? ' ⚠' : '';
      const star = isStarred ? '<span class="acc-star">★</span>' : '';
      return `<span class="acc-metric ${cls}"><strong>${label}${star}</strong> <span class="v">${fmt(result.avg)}</span>${sym}</span>`;
    };
    const ambHTML = metricHTML(`AMB ${monthLabel}`, ambResult, minType === 'AMB');
    const aqbHTML = metricHTML(`AQB ${qLabel}`, aqbResult, minType === 'AQB');
    if (ambHTML) parts.push(ambHTML);
    if (aqbHTML) parts.push(aqbHTML);
    if (minBal > 0) parts.push(`<span class="acc-min">Min ${fmt(minBal)}</span>`);
    line2 = parts.join(' <span class="acc-sep">·</span> ');
  }

  const actions = `
    <div class="acc-actions">
      <button class="btn btn-ghost btn-sm" title="Passbook" onclick="openAccountPassbook('${a.id}')"><i data-lucide="book-open"></i></button>
      <button class="btn btn-ghost btn-sm" title="Update balance" onclick="quickUpdateBalance('${a.id}')"><i data-lucide="dollar-sign"></i></button>
      <button class="btn btn-ghost btn-sm" title="Edit" onclick="openAccountModal('${a.id}')"><i data-lucide="pencil"></i></button>
      <button class="btn btn-ghost btn-sm" title="Delete" onclick="deleteAccount('${a.id}')"><i data-lucide="trash-2"></i></button>
    </div>
  `;

  return `<div class="card acc-card">
    <div class="acc-line acc-line-1">
      <div class="acc-icon-sm"><i data-lucide="${icon}"></i></div>
      <div class="acc-identity">${bankParts.join('<span class="acc-sep">·</span>')}</div>
      <div class="acc-balance${lowDaily ? ' low' : ''}">${fmt(a.balance)}${lowDaily ? ' ⚠' : ''}</div>
    </div>
    <div class="acc-line acc-line-2">
      <div class="acc-meta">${line2}</div>
      ${actions}
    </div>
  </div>`;
}

async function saveAccount(id) {
  const name = document.getElementById('aName').value.trim();
  if (!name) { toast('Name required','error'); return; }
  const last4 = document.getElementById('aLast4').value.trim();
  if (last4 && !/^\d{1,4}$/.test(last4)) { toast('Last 4 must be digits','error'); return; }
  const obj = {
    id: id || uid(), name,
    bank: document.getElementById('aBank').value.trim(),
    type: document.getElementById('aType').value,
    status: document.getElementById('aStatus').value,
    last4,
    balance: +document.getElementById('aBalance').value || 0,
    minBalance: +document.getElementById('aMinBalance').value || 0,
    minBalanceType: document.getElementById('aMinBalType').value || 'None',
    interestRate: +document.getElementById('aRate').value || 0,
    interestPayout: document.getElementById('aPayout').value,
    ifsc: document.getElementById('aIfsc').value.trim().toUpperCase(),
    openingDate: document.getElementById('aOpening').value,
    maturityDate: document.getElementById('aMaturity').value,
    maturityAmount: +document.getElementById('aMaturityAmt').value || 0,
    jointHolder: document.getElementById('aJoint').value.trim(),
    nominee: document.getElementById('aNominee').value.trim(),
    notes: document.getElementById('aNotes').value.trim()
  };
  const before = id ? getAccount(id) : null;
  await dbPut('accounts', obj);
  if (id) { const i = state.accounts.findIndex(x => x.id === id); state.accounts[i] = obj; }
  else state.accounts.push(obj);
  await audit(id ? 'update' : 'create', 'account', obj.id, before, obj);
  closeModal(); toast('Saved','success'); renderCurrent();
}

async function deleteAccount(id) {
  const refs = state.transactions.filter(t => t.fromAccountId === id || t.toAccountId === id).length;
  if (refs > 0) { toast(`Cannot delete — ${refs} transactions reference this account. Mark Closed instead.`,'error'); return; }
  if (!confirm('Delete this account?')) return;
  const a = getAccount(id);
  await dbDel('accounts', id);
  state.accounts = state.accounts.filter(x => x.id !== id);
  await audit('delete', 'account', id, a, null);
  toast('Deleted','success'); renderCurrent();
}

async function saveQuickBalance(id) {

function openAccountPassbook(id) {
  const a = getAccount(id); if (!a) return;
  const txns = state.transactions
    .filter(t => t.status === 'Settled' && (t.fromAccountId === id || t.toAccountId === id))
    .sort((x, y) => y.date.localeCompare(x.date));
  let running = +a.balance;
  const rows = txns.map(t => {
    const isIn = (t.type === 'income' && t.toAccountId === id) || (t.type === 'transfer' && t.toAccountId === id);
    const isOut = (t.type === 'expense' && t.fromAccountId === id) || (t.type === 'transfer' && t.fromAccountId === id) || (t.type === 'settlement' && t.fromAccountId === id);
    const balAfter = running;
    if (isIn) running -= +t.amount; else if (isOut) running += +t.amount;
    return { t, isIn, isOut, balAfter };
  });

  const ambCur = computeAMB(id, currentMonthKey());
  const ambPrev = computeAMB(id, previousMonthKey());
  const cq = currentQuarter(), pq = previousQuarter();
  const aqbCur = computeAQB(id, cq.year, cq.q);
  const aqbPrev = computeAQB(id, pq.year, pq.q);
  const minBal = +a.minBalance || 0;
  const minType = a.minBalanceType || 'None';

  const summaryRow = (label, info, primary) => {
    if (!info) return `<tr><td>${label}</td><td class="num text-tertiary">—</td><td class="num text-xs">—</td><td class="num text-xs">—</td></tr>`;
    const meets = minBal > 0 ? info.avg >= minBal : null;
    return `<tr${primary ? ' style="background:var(--surface-2);font-weight:600;"' : ''}>
      <td>${label}</td>
      <td class="num" style="color:${primary ? (meets === false ? 'var(--danger)' : meets === true ? 'var(--success)' : '') : ''}">${fmt(info.avg)}${primary && meets === false ? ' ⚠' : primary && meets === true ? ' ✓' : ''}</td>
      <td class="num text-xs text-tertiary">${info.daysElapsed} of ${info.totalDays}</td>
      <td class="num text-xs">${minBal > 0 ? (meets === false ? `<span class="text-danger">Short ${fmt(minBal - info.avg)}</span>` : `<span class="text-success">+ ${fmt(info.avg - minBal)}</span>`) : '—'}</td>
    </tr>`;
  };

  openModal(`Passbook: ${escapeHTML(a.name)}`, `
    <div class="card mb-md" style="background:var(--surface-2);">
      <div class="row-between">
        <div><div class="card-title">Current balance</div><div class="stat-value">${fmt(a.balance)}</div></div>
        <div class="text-sm text-tertiary" style="text-align:right;">${txns.length} settled transactions<br>${escapeHTML(a.bank || '')}${a.last4 ? ` ··${a.last4}` : ''}<br>${minBal > 0 ? `Min ${minType}: ${fmt(minBal)}` : 'No min balance'}</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Balance Summary <span class="text-xs text-tertiary fw-600">(end-of-day balances)</span></div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Period</th><th class="num">Average</th><th class="num">Days</th><th class="num">vs Min${minType === 'None' ? '' : ` (${fmt(minBal)})`}</th></tr></thead>
          <tbody>
            ${summaryRow(`AMB · ${monthRange(currentMonthKey()).label}`, ambCur, minType === 'AMB')}
            ${summaryRow(`AMB · ${monthRange(previousMonthKey()).label}`, ambPrev, false)}
            ${summaryRow(`AQB · ${quarterRange(cq.year, cq.q).label}`, aqbCur, minType === 'AQB')}
            ${summaryRow(`AQB · ${quarterRange(pq.year, pq.q).label}`, aqbPrev, false)}
          </tbody>
        </table>
      </div>
      ${minType !== 'None' && minBal > 0
        ? `<div class="text-xs text-tertiary mt-sm">💡 Your bank requires <strong>${minType}</strong> of ${fmt(minBal)}. Highlighted row is your bank's metric.</div>`
        : `<div class="text-xs text-tertiary mt-sm">💡 Set "Min balance basis" (AMB/AQB/Daily) to track bank compliance.</div>`}
    </div>
    <div class="section">
      <div class="section-title">Transaction History</div>
      ${txns.length === 0
        ? '<div class="empty"><div class="empty-icon"><i data-lucide="inbox"></i></div><div class="empty-sub">No transactions yet</div></div>'
        : `<div class="tbl-wrap"><table class="tbl">
            <thead><tr><th>Date</th><th>Description</th><th class="num">Debit</th><th class="num">Credit</th><th class="num">Balance</th></tr></thead>
            <tbody>
              ${rows.map(r => `<tr>
                <td class="text-xs">${fmtDate(r.t.date, { year: '2-digit' })}</td>
                <td>${escapeHTML(r.t.category || r.t.type)}${r.t.note ? `<div class="text-xs text-tertiary">${escapeHTML(r.t.note)}</div>` : ''}</td>
                <td class="num text-danger">${r.isOut ? fmt(r.t.amount) : ''}</td>
                <td class="num text-success">${r.isIn ? fmt(r.t.amount) : ''}</td>
                <td class="num">${fmt(r.balAfter)}</td>
              </tr>`).join('')}
            </tbody>
          </table></div>`}
    </div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Close</button>`, { wide: true });
}

async function saveCategory(id, kindFallback) {
  const name = document.getElementById('catName').value.trim();
  if (!name) { toast('Name required','error'); return; }
  const kind = document.getElementById('catKind').value || kindFallback;
  // Check unique
  const dup = state.categories.find(c => c.kind === kind && c.name === name && c.id !== id);
  if (dup) { toast('Category name already used','error'); return; }
  const before = id ? state.categories.find(c => c.id === id) : null;
  // If renaming, update all transactions
  if (id && before && before.name !== name) {
    for (const t of state.transactions.filter(t => t.category === before.name)) {
      const tBefore = { ...t };
      t.category = name;
      await dbPut('transactions', t);
      await audit('update', 'transaction', t.id, tBefore, t, 'Category renamed');
    }
  }
  const obj = {
    id: id || uid(), kind, name,
    essential: document.getElementById('catEssential').checked,
    icon: document.getElementById('catIconHidden').value,
    color: before?.color || '',
    displayOrder: before?.displayOrder ?? state.categories.filter(c => c.kind === kind).length
  };
  await dbPut('categories', obj);
  if (id) { const i = state.categories.findIndex(x => x.id === id); state.categories[i] = obj; } else state.categories.push(obj);
  await audit(id ? 'update' : 'create', 'category', obj.id, before, obj);
  closeModal(); toast('Saved','success'); renderSettings();
}

async function deleteCategory(id) {
  const c = state.categories.find(x => x.id === id);
  const useCount = state.transactions.filter(t => t.category === c.name).length;
  if (useCount > 0) { toast(`Cannot delete — ${useCount} transactions use "${c.name}". Re-categorize them first.`,'error'); return; }
  if (!confirm(`Delete category "${c.name}" and its subcategories?`)) return;
  // Delete subcategories
  const subs = state.subcategories.filter(s => s.categoryId === id);
  for (const s of subs) await dbDel('subcategories', s.id);
  state.subcategories = state.subcategories.filter(s => s.categoryId !== id);
  await dbDel('categories', id);
  state.categories = state.categories.filter(x => x.id !== id);
  await audit('delete', 'category', id, c, null);
  toast('Deleted','success'); renderSettings();
}

async function exportData() {
  const data = {};
  for (const s of STORES) data[s] = await dbAll(s);
  data._exportedAt = nowISO();
  data._version = 3;
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = `finance-portal-backup-${today()}.json`; a.click(); URL.revokeObjectURL(url);
  await audit('export', null, null, null, null, 'Full backup exported');
  toast('Backup downloaded','success');
}

async function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = async (evt) => {
    try {
      const data = JSON.parse(evt.target.result);
      if (!confirm('Replace ALL current data with this backup?')) return;
      for (const s of STORES) await dbClear(s);
      for (const s of STORES) {
        const items = data[s] || (s === 'settings' && data.settings ? [data.settings] : []);
        if (Array.isArray(items)) for (const it of items) await dbPut(s, it);
        else if (items) await dbPut(s, items);
      }
      await loadState();
      await initIfFirstRun();
      applyTheme(); buildNav();
      await audit('import', null, null, null, null, 'Full backup imported');
      toast('Data imported','success'); renderCurrent();
    } catch (err) { toast('Invalid backup file: ' + err.message,'error'); }
  };
  r.readAsText(file); e.target.value = '';
}
