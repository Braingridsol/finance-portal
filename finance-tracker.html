/* ---------- Sync Diagnostic ---------- */
async function runSyncDiagnostic() {
  const cfg = getCloudConfig();
  const checks = [];
  // 1. Cloud config
  checks.push({ name: 'Cloud config saved', ok: !!cfg, detail: cfg ? `${cfg.url} · key set` : 'No config — go to Cloud Setup' });
  // 2. Supabase SDK loaded
  checks.push({ name: 'Supabase SDK loaded', ok: !!window.supabase, detail: window.supabase ? 'Yes' : 'No — check internet / SDK CDN' });
  // 3. Client initialized
  checks.push({ name: 'Supabase client initialized', ok: !!cloud.client, detail: cloud.client ? 'Yes' : 'No — try refresh' });
  // 4. Auth session
  checks.push({ name: 'Signed in', ok: !!cloud.user, detail: cloud.user ? cloud.user.email : 'No — sign in required' });
  // 5. Email verified
  checks.push({ name: 'Email verified', ok: !!cloud.user?.email_confirmed_at, detail: cloud.user?.email_confirmed_at ? 'Yes' : 'No — check inbox' });
  // 6. Active profile
  checks.push({ name: 'Active profile selected', ok: !!cloud.activeProfileId, detail: cloud.activeProfileId ? `${cloud.profiles.find(p => p.id === cloud.activeProfileId)?.name} (${cloud.activeProfileId})` : 'None' });
  // 7. Online
  checks.push({ name: 'Browser online', ok: navigator.onLine, detail: navigator.onLine ? 'Yes' : 'No — offline mode' });
  // 8. Test API call
  let apiOk = false, apiDetail = 'Not tested';
  if (cloud.client && cloud.user && cloud.activeProfileId) {
    try {
      const start = Date.now();
      const { data, error } = await cloud.client.from('accounts').select('id', { count: 'exact', head: true }).eq('profile_id', cloud.activeProfileId);
      apiOk = !error;
      apiDetail = error ? `Error: ${error.message}` : `OK (${Date.now() - start}ms)`;
    } catch (e) { apiDetail = 'Threw: ' + e.message; }
  } else {
    apiDetail = 'Skipped (prerequisites failed)';
  }
  checks.push({ name: 'Test query to Supabase', ok: apiOk, detail: apiDetail });
  // 9. Record counts (local vs cloud)
  const recordCounts = [];
  if (cloud.client && cloud.activeProfileId) {
    const tablesToCheck = ['accounts', 'transactions', 'cards', 'loans', 'insurance', 'investments', 'people', 'recurring'];
    for (const t of tablesToCheck) {
      const localCount = (state[t.replace('investment_transactions','investmentTxns')] || []).length;
      try {
        const { count } = await cloud.client.from(t).select('id', { count: 'exact', head: true }).eq('profile_id', cloud.activeProfileId);
        recordCounts.push({ table: t, local: localCount, cloud: count ?? 0 });
      } catch(e) {
        recordCounts.push({ table: t, local: localCount, cloud: 'error: ' + e.message });
      }
    }
  }
  // 10. Outbox
  const outboxCount = outbox.pending.length;
  checks.push({ name: 'Outbox pending', ok: outboxCount === 0, detail: outboxCount === 0 ? 'Empty (all pushed)' : `${outboxCount} items waiting to push` });
  // 11. Last sync error
  if (cloud.lastSyncError) {
    checks.push({ name: 'Last sync error', ok: false, detail: cloud.lastSyncError.slice(0, 200) });
  }
  // 12. Non-UUID records (would be silently skipped)
  let nonUuidCount = 0;
  for (const s of STORES) {
    const all = await dbAll(s);
    nonUuidCount += all.filter(r => r.id && !isUuid(r.id)).length;
  }
  checks.push({ name: 'Legacy non-UUID records', ok: nonUuidCount === 0, detail: nonUuidCount === 0 ? 'None' : `${nonUuidCount} won't sync — reset & reload sample data` });
  // 13. Orphaned records
  const orphanCount = await countOrphanedRecords();
  checks.push({ name: 'Orphaned records (no profileId)', ok: orphanCount === 0, detail: orphanCount === 0 ? 'None' : `${orphanCount} — will auto-claim on next profile enter` });
  // 14. Realtime subscriptions
  const rts = cloud.realtimeStatus || {};
  const rtKeys = Object.keys(rts);
  const subscribed = rtKeys.filter(k => rts[k] === 'SUBSCRIBED').length;
  const totalRT = rtKeys.length;
  const rtOk = totalRT > 0 && subscribed === totalRT;
  checks.push({
    name: 'Realtime subscriptions',
    ok: rtOk,
    detail: totalRT === 0 ? 'Not set up yet — enter a profile' :
            rtOk ? `${subscribed}/${totalRT} subscribed ✓` :
            `Only ${subscribed}/${totalRT} active — ${rtKeys.filter(k => rts[k] !== 'SUBSCRIBED').map(k => k + '=' + rts[k]).join(', ')}. Enable Realtime on tables in Supabase.`
  });

  // Render diagnostic
  const checkRowHTML = (c) => `<tr>
    <td><i data-lucide="${c.ok ? 'check-circle' : 'x-circle'}" style="width:16px;height:16px;color:var(--${c.ok ? 'success' : 'danger'});display:inline-block;vertical-align:middle;margin-right:6px;"></i>${c.name}</td>
    <td class="text-xs ${c.ok ? '' : 'text-danger'}">${escapeHTML(String(c.detail))}</td>
  </tr>`;

  openModal('Sync Diagnostic', `
    <div class="tbl-wrap mb-md">
      <table class="tbl">
        <thead><tr><th>Check</th><th>Status</th></tr></thead>
        <tbody>${checks.map(checkRowHTML).join('')}</tbody>
      </table>
    </div>
    ${recordCounts.length ? `<div class="section-title">Record counts: local vs cloud</div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Table</th><th class="num">Local</th><th class="num">Cloud</th><th>Status</th></tr></thead>
      <tbody>${recordCounts.map(r => {
        const match = r.local === r.cloud;
        const cls = match ? 'text-success' : 'text-warning';
        return `<tr>
          <td>${r.table}</td>
          <td class="num">${r.local}</td>
          <td class="num">${r.cloud}</td>
          <td class="text-xs ${cls}">${match ? '✓ in sync' : r.local > r.cloud ? `${r.local - r.cloud} not pushed` : `${r.cloud - r.local} not pulled`}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>` : ''}
    <div class="alert alert-info mt-md"><i data-lucide="info" class="alert-icon"></i><div>
      <strong>If local &gt; cloud:</strong> Click <em>"Push all local"</em> to upload.<br>
      <strong>If cloud &gt; local:</strong> Click <em>"Full refresh"</em> to download.<br>
      <strong>If both 0 and you've added data:</strong> Data has legacy IDs — reset profile + reload sample data.<br>
      <strong>If "Test query" fails:</strong> Your URL or anon key is wrong.
    </div></div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">Close</button>
    <button class="btn btn-primary" onclick="closeModal();runSyncDiagnostic()"><i data-lucide="refresh-cw"></i>Re-run</button>
  `, { wide: true });
}

/* ---------- Fresh start: wipe cloud + local for active profile, reinit defaults ---------- */
async function freshStartProfile() {
  const profile = cloud.profiles.find(p => p.id === cloud.activeProfileId);
  const name = profile?.name || 'this profile';
  if (!confirm(`This DELETES ALL data in "${name}" — both cloud and local — and starts fresh with default categories/tax flags.\n\nOther profiles are NOT affected.\n\nCannot be undone. Continue?`)) return;
  const typed = prompt(`Type "${name}" to confirm:`);
  if (typed !== name) { toast('Cancelled', 'info'); return; }

  toast(`Wiping "${name}"…`, 'info');
  cloud.status = 'syncing'; updateConnIndicator();

  // 1. Delete from cloud — parallel per table
  const deletePromises = Object.keys(TABLE_MAP).map(async (key) => {
    const map = TABLE_MAP[key];
    try {
      const { error } = await cloud.client.from(map.table).delete().eq('profile_id', cloud.activeProfileId);
      if (error) console.warn(`Cloud delete ${key}:`, error.message);
    } catch (e) { console.warn(`Cloud delete ${key}:`, e.message); }
  });
  await Promise.all(deletePromises);

  // 2. Delete from local cache for this profile
  for (const s of STORES) {
    const all = await dbAll(s);
    const ids = all.filter(r => r.profileId === cloud.activeProfileId).map(r => r.id);
    if (ids.length) await dbBulkDel(s, ids);
  }

  // 3. Clear in-memory state
  clearStateArrays();

  // 4. Clear sync timestamps + outbox
  localStorage.removeItem(getLastSyncKey());
  outbox.clear();

  // 5. Reinit defaults DIRECTLY in cloud (each dbPut is a direct Supabase write)
  await initIfFirstRun();

  // 6. Pull fresh state (confirms cloud has what we just wrote)
  await pullAllFromCloud({ silent: true, full: true });

  cloud.status = 'online'; updateConnIndicator();
  toast(`"${name}" reset complete — fresh defaults loaded`, 'success');
  renderCurrent();
}

/* ---------- Migration: local → cloud ---------- */
async function migrateLocalToCloud() {
  if (!confirm(`Push all local data to cloud profile "${cloud.profiles.find(p => p.id === cloud.activeProfileId)?.name}"? Cloud data for this profile will be merged (upserted).`)) return;
  toast('Migrating to cloud…','info'); cloud.status = 'syncing'; updateConnIndicator();
  try {
    for (const key of Object.keys(TABLE_MAP)) {
      if (key === 'settings' || key === 'auditLog') continue;
      for (const item of state[key] || []) await pushToCloud(key, item);
    }
    if (state.settings) await pushToCloud('settings', state.settings);
    cloud.status = 'online'; updateConnIndicator();
    toast('Migration complete','success');
  } catch (err) {
    cloud.status = 'error'; updateConnIndicator();
    toast('Migration failed: ' + err.message,'error');
  }
}

async function doPasswordReset2() {
  if (!cloud.user) return;
  const { error } = await cloud.client.auth.resetPasswordForEmail(cloud.user.email);

async function renameProfile(id) {
  const p = cloud.profiles.find(x => x.id === id); if (!p) return;
  const newName = prompt('New profile name:', p.name);
  if (!newName || newName === p.name) return;
  const { error } = await cloud.client.from('profiles').update({ name: newName.trim() }).eq('id', id);
  if (error) { toast('Failed: ' + error.message,'error'); return; }
  p.name = newName.trim();
  toast('Renamed','success'); renderSettings(); buildNav();
}

async function archiveProfile(id) {
  const p = cloud.profiles.find(x => x.id === id);
  if (id === cloud.activeProfileId) { toast('Cannot archive active profile — switch first','error'); return; }
  if (!confirm(`Archive "${p.name}"? Data preserved but hidden.`)) return;
  await cloud.client.from('profiles').update({ archived: true }).eq('id', id);
  p.archived = true;
  toast('Archived','success'); renderSettings();
}

async function unarchiveProfile(id) {
  await cloud.client.from('profiles').update({ archived: false }).eq('id', id);
  cloud.profiles.find(x => x.id === id).archived = false;
  toast('Unarchived','success'); renderSettings();
}

async function deleteProfile(id) {
  const p = cloud.profiles.find(x => x.id === id);
  if (id === cloud.activeProfileId) { toast('Cannot delete active profile — switch first','error'); return; }
  if (cloud.profiles.length === 1) { toast('Cannot delete your only profile','error'); return; }
  const typed = prompt(`This will DELETE all data in profile "${p.name}" forever. Type the profile name to confirm:`);
  if (typed !== p.name) { toast('Name did not match — cancelled','info'); return; }
  const { error } = await cloud.client.from('profiles').delete().eq('id', id);
  if (error) { toast('Failed: ' + error.message,'error'); return; }
  cloud.profiles = cloud.profiles.filter(x => x.id !== id);
  toast('Profile deleted','success'); renderSettings();
}

async function boot() {
  await openDB();
  await loadState();
  outbox.load();
  // Cloud-direct mode: legacy outbox is bypassed. Auto-clear if items are stale (>1 hour old).
  if (outbox.pending.length > 0) {
    console.log(`Found ${outbox.pending.length} legacy outbox items (cloud-direct mode bypasses queue) — clearing.`);
    outbox.clear();
  }
  // Cloud config?
  const cfg = getCloudConfig();
  const dismissed = localStorage.getItem('cloudDismissed');
  if (!cfg && !dismissed) {
    // First-time experience: offer cloud setup
    renderCloudSetup();
    return;
  }
  if (!cfg && dismissed) {
    // User chose offline-only
    await bootLocalOnly();
    return;
  }
  // Cloud config exists — try to use it
  const ok = await initSupabase();
  if (!ok) {
    toast('Cloud unreachable — running offline','warning');
    await bootLocalOnly();
    return;
  }
  if (!cloud.user) {
    // Show login screen
    await initIfFirstRun(); // ensure local has at least defaults
    applyTheme();
    renderAuthScreen('login');
    return;
  }
  // Logged in
  await postLoginInit();
}

async function saveInvTxn(invId, type) {
  const inv = state.investments.find(x => x.id === invId);
  const date = document.getElementById('itDate').value || today();
  const units = +document.getElementById('itUnits').value || 0;
  const pricePerUnit = +document.getElementById('itPrice').value || 0;
  let totalAmount = +document.getElementById('itTotal').value || (units * pricePerUnit);
  if (type === 'Dividend') totalAmount = units; // for dividend, "units" field is actually the amount
  const charges = +document.getElementById('itCharges').value || 0;
  const accountId = document.getElementById('itAccount').value || null;
  if (!totalAmount && type !== 'Dividend') { toast('Enter amount','error'); return; }
  let realizedGL = 0, costBasis = 0;
  if (type === 'Sell') {
    // FIFO cost basis from prior Buy transactions
    const buys = state.investmentTxns
      .filter(t => t.investmentId === invId && t.type === 'Buy' && t.date <= date)
      .sort((a,b) => a.date.localeCompare(b.date));
    let remainingToSell = units;
    let usedCost = 0;
    // Track already-sold units per buy lot
    const sellsBeforeThis = state.investmentTxns
      .filter(t => t.investmentId === invId && t.type === 'Sell')
      .sort((a,b) => a.date.localeCompare(b.date));
    const lotConsumed = {};
    for (const s of sellsBeforeThis) {
      let u = +s.units;
      for (const b of buys) {
        if (u <= 0) break;
        const left = +b.units - (lotConsumed[b.id] || 0);
        if (left <= 0) continue;
        const take = Math.min(u, left);
        lotConsumed[b.id] = (lotConsumed[b.id] || 0) + take;
        u -= take;
      }
    }
    // Now compute for this new sell
    for (const b of buys) {
      if (remainingToSell <= 0) break;
      const left = +b.units - (lotConsumed[b.id] || 0);
      if (left <= 0) continue;
      const take = Math.min(remainingToSell, left);
      usedCost += take * (+b.pricePerUnit || (+b.totalAmount / +b.units));
      remainingToSell -= take;
    }
    costBasis = usedCost;
    realizedGL = (totalAmount - charges) - costBasis;
  }
  const obj = {
    id: uid(), investmentId: invId, date, type,
    units: type === 'Dividend' ? 0 : units,
    pricePerUnit: type === 'Dividend' ? 0 : pricePerUnit,
    totalAmount, charges,
    realizedGainLoss: type === 'Sell' ? realizedGL : 0,
    costBasis: type === 'Sell' ? costBasis : 0,
    fromAccountId: accountId,
    notes: document.getElementById('itNotes').value.trim()
  };
  await dbPut('investmentTxns', obj);
  state.investmentTxns.push(obj);
  // Update parent investment totals
  const before = { ...inv };
  if (type === 'Buy') {
    inv.invested = +inv.invested + totalAmount + charges;
    inv.units = (+inv.units || 0) + units;
  } else if (type === 'Sell') {
    inv.invested = Math.max(0, +inv.invested - costBasis);
    inv.units = (+inv.units || 0) - units;
    inv.currentValue = Math.max(0, +inv.currentValue - costBasis);
  }
  await dbPut('investments', inv);
  // Create matching Settled txn for cash impact
  if (accountId && (type === 'Buy' || type === 'Sell' || type === 'Dividend')) {
    const isCashIn = (type === 'Sell' || type === 'Dividend');
    const cashAmount = type === 'Buy' ? (totalAmount + charges) : (totalAmount - charges);
    const cashTxn = {
      id: uid(),
      type: isCashIn ? 'income' : 'expense',
      status: 'Settled', source: 'Manual',
      date, amount: cashAmount,
      category: isCashIn ? (type === 'Dividend' ? 'Dividend' : 'Other') : 'Investment',
      subcategory: '',
      fromAccountId: isCashIn ? null : accountId,
      toAccountId: isCashIn ? accountId : null,
      cardId: null, loanId: null, insuranceId: null, recurringId: null,
      payee: inv.name, mode: '', reference: '', taxFlag: '',
      note: `${type}: ${inv.name}${type === 'Sell' && realizedGL ? ' (G/L: ' + fmt(realizedGL) + ')' : ''}`,
      draftCreatedAt: nowISO(), settledAt: nowISO()
    };
    await dbPut('transactions', cashTxn);
    state.transactions.push(cashTxn);
    await applyTxnToBalance(cashTxn, +1);
  }
  await audit('create', 'investmentTxn', obj.id, null, obj);
  await audit('update', 'investment', inv.id, before, inv);
  closeModal();
  toast(type === 'Sell' ? `Sold — Realized ${fmtSigned(realizedGL)}` : 'Saved', 'success');
  openInvestmentTxns(invId);
}

async function deleteInvTxn(id, invId) {
  if (!confirm('Delete this investment transaction? This does NOT undo the cash transaction.')) return;
  const t = state.investmentTxns.find(x => x.id === id);
  await dbDel('investmentTxns', id);
  state.investmentTxns = state.investmentTxns.filter(x => x.id !== id);
  // Revert parent
  const inv = state.investments.find(x => x.id === invId);
  if (inv && t) {
    if (t.type === 'Buy') {
      inv.invested = Math.max(0, +inv.invested - +t.totalAmount - +t.charges);
      inv.units = Math.max(0, (+inv.units || 0) - +t.units);
    } else if (t.type === 'Sell') {
      inv.invested = +inv.invested + +t.costBasis;
      inv.units = (+inv.units || 0) + +t.units;
    }
    await dbPut('investments', inv);
  }
  await audit('delete', 'investmentTxn', id, t, null);
  toast('Deleted','success');
  openInvestmentTxns(invId);
}

function computeXIRR(invId) {
  // Simplified XIRR using Newton's method
  const txns = state.investmentTxns.filter(t => t.investmentId === invId).sort((a,b) => a.date.localeCompare(b.date));
  const inv = state.investments.find(x => x.id === invId);
  if (!inv || txns.length === 0) return 0;
  const cashflows = [];
  txns.forEach(t => {
    const amt = t.type === 'Buy' ? -(+t.totalAmount + +t.charges)
             : t.type === 'Sell' ? (+t.totalAmount - +t.charges)
             : t.type === 'Dividend' ? +t.totalAmount : 0;
    if (amt !== 0) cashflows.push({ date: new Date(t.date), amount: amt });
  });
  cashflows.push({ date: todayDate(), amount: +(inv.currentValue || 0) });
  if (cashflows.length < 2) return 0;
  const d0 = cashflows[0].date;
  const npv = (rate) => cashflows.reduce((s, c) => {
    const years = (c.date - d0) / (365.25 * 86400000);
    return s + c.amount / Math.pow(1 + rate, years);
  }, 0);
  let rate = 0.1;
  for (let i = 0; i < 50; i++) {
    const v = npv(rate);
    const slope = (npv(rate + 0.0001) - v) / 0.0001;
    if (Math.abs(slope) < 1e-9) break;
    const newRate = rate - v / slope;
    if (Math.abs(newRate - rate) < 1e-6) { rate = newRate; break; }
    rate = newRate;
    if (rate < -0.99) { rate = -0.99; break; }
    if (rate > 10) { rate = 10; break; }
  }
  return rate * 100;
}

function addSplitRow() {
  const rows = document.getElementById('splitRows');
  const idx = rows.querySelectorAll('.split-row').length;
  const div = document.createElement('div');
  div.innerHTML = splitRowHTML({ amount: 0, category: '', note: '' }, idx);
  rows.appendChild(div.firstElementChild);
  refreshSplitSummary(); refreshIcons();
}

function refreshSplitSummary() {
  const parent = +document.getElementById('splitParentAmount').value;
  const splits = Array.from(document.querySelectorAll('.split-row')).map(r => +r.querySelector('.split-amt').value || 0);
  const total = splits.reduce((s,v) => s + v, 0);
  const diff = parent - total;
  const sum = document.getElementById('splitSummary');
  if (Math.abs(diff) < 0.01) {
    sum.className = 'alert alert-success';
    sum.innerHTML = `<i data-lucide="check" class="alert-icon"></i><div>Splits total ${fmt(total)} — matches ✓</div>`;
  } else {
    sum.className = 'alert alert-warning';
    sum.innerHTML = `<i data-lucide="alert-triangle" class="alert-icon"></i><div>Splits total ${fmt(total)} vs parent ${fmt(parent)} — ${diff > 0 ? 'short by ' : 'over by '}${fmt(Math.abs(diff))}</div>`;
  }
  refreshIcons();
}

async function saveSplits(txnId) {
  const t = state.transactions.find(x => x.id === txnId);
  const parent = +t.amount;
  const splits = Array.from(document.querySelectorAll('.split-row')).map(r => ({
    amount: +r.querySelector('.split-amt').value || 0,
    category: r.querySelector('.split-cat').value,
    note: r.querySelector('.split-note').value.trim()
  })).filter(s => s.amount > 0);
  const total = splits.reduce((s,v) => s + v.amount, 0);
  if (Math.abs(total - parent) > 0.01) { toast('Splits must total ' + fmt(parent),'error'); return; }
  const before = { ...t };
  t.splits = splits;
  await dbPut('transactions', t);
  await audit('update', 'transaction', t.id, before, t, 'Splits saved');
  closeModal(); toast('Splits saved','success'); renderCurrent();
}

async function handleAttachUpload(e, entityType, entityId, label) {
  const files = e.target.files;
  for (const f of files) {
    if (f.size > 2 * 1024 * 1024) { toast(`${f.name} too large (max 2MB)`,'warning'); continue; }
    const data = await new Promise(res => {
      const r = new FileReader();
      r.onload = ev => res(ev.target.result);
      r.readAsDataURL(f);
    });
    const obj = { id: uid(), entityType, entityId, filename: f.name, mimeType: f.type, size: f.size, data, uploadedAt: nowISO() };
    await dbPut('attachments', obj);
    state.attachments.push(obj);

  toast('Uploaded','success');
  openAttachments(entityType, entityId, label);
}

function openCSVImport() {
  openModal('Import Transactions from CSV', `
    <p class="text-sm text-muted">Upload your bank/card statement CSV. We'll detect columns; you map and confirm.</p>
    <input type="file" id="csvFile" accept=".csv,.txt" onchange="handleCSVUpload(event)" />
    <div id="csvWizard"></div>
  `, '');

function handleCSVUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = (ev) => {
    const text = ev.target.result;
    const rows = parseCSV(text);
    if (rows.length < 2) { toast('CSV looks empty','error'); return; }
    const headers = rows[0];
    const dataRows = rows.slice(1).filter(r => r.length === headers.length);
    showCSVMapping(headers, dataRows);
  };
  r.readAsText(file);
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  return lines.map(line => {
    const result = []; let cur = ''; let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (ch === '"') inQuote = !inQuote;
      else if (ch === ',' && !inQuote) { result.push(cur); cur = ''; }
      else cur += ch;
    }
    result.push(cur);
    return result;
  });
}

function showCSVMapping(headers, dataRows) {
  const guess = (keys) => headers.findIndex(h => keys.some(k => h.toLowerCase().includes(k)));
  const dateCol = guess(['date','txn date']);
  const descCol = guess(['narration','description','particulars','remarks']);
  const debitCol = guess(['debit','withdrawal','dr']);
  const creditCol = guess(['credit','deposit','cr']);
  const amtCol = guess(['amount']);
  const refCol = guess(['ref','utr','chq']);
  const acctOpts = state.accounts.filter(a => a.status === 'Active').map(a => `<option value="${a.id}">${escapeHTML(a.name)}</option>`).join('');
  document.getElementById('csvWizard').innerHTML = `
    <div class="alert alert-success mt-md"><i data-lucide="check-circle" class="alert-icon"></i><div>Detected ${dataRows.length} rows.</div></div>

function parseCSVRows(dataRows) {
  const dateIdx = +document.getElementById('mapDate').value;
  const descIdx = +document.getElementById('mapDesc').value;
  const debitIdx = +document.getElementById('mapDebit').value;
  const creditIdx = +document.getElementById('mapCredit').value;
  const amtIdx = +document.getElementById('mapAmt').value;
  const refIdx = +document.getElementById('mapRef').value;
  const accountId = document.getElementById('mapAccount').value;
  const parseDate = (s) => {
    if (!s) return null;
    // Try DD/MM/YYYY, DD-MM-YYYY, YYYY-MM-DD
    const m1 = s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if (m1) { const [, d, m, y] = m1; const yy = y.length === 2 ? '20' + y : y; return `${yy}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
    const m2 = s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if (m2) return s.slice(0,10);
    return null;
  };
  return dataRows.map(row => {
    const date = parseDate(row[dateIdx]);
    const desc = row[descIdx] || '';
    let amount = 0, type = 'expense';
    if (debitIdx >= 0 && row[debitIdx]) { amount = parseFloat(row[debitIdx].replace(/,/g,'')); type = 'expense'; }
    else if (creditIdx >= 0 && row[creditIdx]) { amount = parseFloat(row[creditIdx].replace(/,/g,'')); type = 'income'; }
    else if (amtIdx >= 0 && row[amtIdx]) { const a = parseFloat(row[amtIdx].replace(/,/g,'')); amount = Math.abs(a); type = a < 0 ? 'expense' : 'income'; }
    const reference = refIdx >= 0 ? (row[refIdx] || '') : '';
    return { date, desc, amount, type, reference, accountId, valid: !!(date && amount > 0 && accountId) };
  });
}

function previewCSV(dataRows) {
  const parsed = parseCSVRows(dataRows);
  const valid = parsed.filter(p => p.valid).length;
  document.getElementById('csvPreview').innerHTML = `
    <div class="alert ${valid === parsed.length ? 'alert-success' : 'alert-warning'} mt-md"><i data-lucide="info" class="alert-icon"></i><div>${valid} of ${parsed.length} rows valid${valid < parsed.length ? ' — invalid rows will be skipped' : ''}</div></div>
    <div class="tbl-wrap mt-md" style="max-height:300px;overflow-y:auto;"><table class="tbl">
      <thead><tr><th>Date</th><th>Description</th><th class="num">Amount</th><th>Type</th><th>Status</th></tr></thead>
      <tbody>${parsed.slice(0, 50).map(p => `<tr>

        <td class="text-xs">${escapeHTML(p.desc.slice(0,60))}</td>

      </tr>`).join('')}</tbody>

}

async function commitCSV(dataRows) {
  const parsed = parseCSVRows(dataRows).filter(p => p.valid);
  if (!confirm(`Import ${parsed.length} transactions as Settled?`)) return;
  let count = 0;
  for (const p of parsed) {
    const t = {
      id: uid(), type: p.type, status: 'Settled', source: 'Manual',
      date: p.date, amount: p.amount,
      category: p.type === 'income' ? 'Other' : 'Other', subcategory: '',
      fromAccountId: p.type === 'expense' ? p.accountId : null,
      toAccountId: p.type === 'income' ? p.accountId : null,
      cardId: null, loanId: null, insuranceId: null, recurringId: null,
      payee: p.desc.slice(0,80), mode: '', reference: p.reference, taxFlag: '',
      note: 'CSV import',
      draftCreatedAt: nowISO(), settledAt: nowISO()
    };
    await dbPut('transactions', t);
    state.transactions.push(t);
    await applyTxnToBalance(t, +1);
    count++;
  }
  await audit('import', 'transactions', null, null, null, `CSV import: ${count} txns`);
  closeModal(); toast(`Imported ${count} transactions`,'success'); renderCurrent();
}

/* ===== 6. PERIOD LOCKING ===== */
function isPeriodLocked(date) {
  const lockedPeriods = state.settings.lockedPeriods || [];
  return lockedPeriods.some(lp => date >= lp.start && date <= lp.end);
}

async function togglePeriodLock(start, end, label) {
  if (!state.settings.lockedPeriods) state.settings.lockedPeriods = [];
  const idx = state.settings.lockedPeriods.findIndex(lp => lp.start === start && lp.end === end);
  if (idx >= 0) {
    state.settings.lockedPeriods.splice(idx, 1);
    toast(`${label} unlocked`,'info');
  } else {
    state.settings.lockedPeriods.push({ start, end, label });
    toast(`${label} locked — transactions in this period are read-only`,'success');
  }
  await dbPut('settings', state.settings);
  renderSettings();
}

/* ---------- Swipe-to-delete helper ---------- */
function attachSwipeHandlers() {
  document.querySelectorAll('.swipeable:not([data-swipe-init])').forEach((el) => {
    el.dataset.swipeInit = '1';
    let startX = 0, currentX = 0, isOpen = false;
    const content = el.querySelector('.swipe-content');
    if (!content) return;

    el.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      content.style.transition = 'none';
    }, { passive: true });

    el.addEventListener('touchmove', (e) => {
      currentX = e.touches[0].clientX;
      const dx = currentX - startX;
      if (dx < 0 && dx > -200) {
        content.style.transform = `translateX(${dx}px)`;
      } else if (isOpen && dx > 0 && dx < 200) {
        content.style.transform = `translateX(${-180 + dx}px)`;
      }
    }, { passive: true });

    el.addEventListener('touchend', () => {
      const dx = currentX - startX;
      content.style.transition = '';
      if (!isOpen && dx < -60) { el.classList.add('is-open'); isOpen = true; }
      else if (isOpen && dx > 40) { el.classList.remove('is-open'); isOpen = false; }
      else { el.classList.toggle('is-open', isOpen); }
    });
  });
}

/* Re-run swipe init after every render (via MutationObserver on main) */

  if (window.innerWidth <= 768) attachSwipeHandlers();
});
window.addEventListener('load', () => {
  const main = document.getElementById('main');
  if (main) renderObserver.observe(main, { childList: true, subtree: true });
});

/* ---------- Pull-to-refresh (basic) ---------- */
let ptrStartY = 0, ptrPulling = false;
function attachPullToRefresh() {
  if (window.innerWidth > 768) return;
  const main = document.getElementById('main');
  if (!main || main.dataset.ptrInit) return;
  main.dataset.ptrInit = '1';
  // Create indicator
  const ind = document.createElement('div');
  ind.className = 'ptr-indicator';
  ind.innerHTML = '<i data-lucide="refresh-cw"></i>';
  document.body.appendChild(ind);
  refreshIcons();

  main.addEventListener('touchstart', (e) => {
    if (window.scrollY > 5) return;
    ptrStartY = e.touches[0].clientY;
    ptrPulling = true;
    ind.classList.add('pulling');
  }, { passive: true });

  main.addEventListener('touchmove', (e) => {
    if (!ptrPulling) return;
    const dy = e.touches[0].clientY - ptrStartY;
    if (dy > 0 && window.scrollY <= 5) {
      const dist = Math.min(dy * 0.5, 80);
      ind.style.top = `${-50 + dist}px`;
      ind.style.transform = `translateX(-50%) rotate(${dist * 4}deg)`;
    }
  }, { passive: true });

  main.addEventListener('touchend', async (e) => {
    if (!ptrPulling) return;
    ptrPulling = false;
    const dy = e.changedTouches[0].clientY - ptrStartY;
    if (dy > 80) {
      ind.classList.remove('pulling');
      ind.classList.add('refreshing');
      ind.style.top = '20px';
      ind.style.transform = 'translateX(-50%)';
      if (cloud.user && cloud.activeProfileId) {
        await pullAllFromCloud();
      }
      await generateRecurringDrafts();
      renderCurrent();
      setTimeout(() => {
        ind.classList.remove('refreshing');
        ind.style.top = '-50px';
      }, 400);
    } else {
      ind.classList.remove('pulling');
      ind.style.top = '-50px';
      ind.style.transform = 'translateX(-50%)';
    }
  });
}
window.addEventListener('load', () => setTimeout(attachPullToRefresh, 500));

/* ---------- Notifications ---------- */
async function requestNotificationPermission() {
  if (!('Notification' in window)) { toast('Notifications not supported','warning'); return false; }
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') { toast('Notifications blocked in browser settings','warning'); return false; }
  const result = await Notification.requestPermission();
  return result === 'granted';
}

function scheduleNotification(title, body, delayMs) {
  if (Notification.permission !== 'granted') return;
  setTimeout(() => {
    new Notification(title, { body, icon: 'icon-192.svg', badge: 'icon-192.svg' });
  }, delayMs);
}

async function checkAndScheduleAlertNotifications() {
  // Once per day, schedule notifications for next-day card dues / EMI / renewals
  const lastCheck = localStorage.getItem('lastAlertCheck');
  const today_ = today();
  if (lastCheck === today_) return;
  if (Notification.permission !== 'granted') return;
  localStorage.setItem('lastAlertCheck', today_);
  const alerts = computeAlerts();
  alerts.forEach((a, i) => {
    // Strip HTML for notification body
    const body = a.msg.replace(/<[^>]+>/g, '');
    scheduleNotification('Finance Portal', body, 1000 + i * 500);
  });
}

  const ok = await requestNotificationPermission();
  if (ok) {
    toast('Notifications enabled','success');
    scheduleNotification('Notifications enabled', 'You\'ll get alerts for card dues, EMIs and renewals.', 500);
  }
}

const MV2_BP = 768;
let mv2State = { tab: 'home', moneySub: 'accounts', ready: false, hiddenForPage: false, lastTab: 'home' };

function mv2IsMobile() { return window.innerWidth <= MV2_BP; }

function mv2Init() {
  if (!mv2IsMobile()) {
    document.body.classList.remove('mv2', 'mv2-page-mode');
    return;
  }
  // Only activate after a profile is entered or in offline mode
  const ready = (typeof cloud !== 'undefined' && cloud.activeProfileId) || (typeof state !== 'undefined' && state.settings);
  if (!ready) return;
  document.body.classList.add('mv2');
  if (!mv2State.ready) { mv2BuildShell(); mv2State.ready = true; }
  if (!mv2State.hiddenForPage) mv2Render();
}

function mv2BuildShell() {
  if (document.getElementById('mv2Shell')) return;
  const shell = document.createElement('div');
  shell.id = 'mv2Shell';
  shell.className = 'mv2-shell';
  shell.innerHTML = `<header id="mv2Header"></header><div id="mv2Body" class="mv2-body"></div><nav id="mv2BottomNav" class="mv2-bnav"></nav>`;
  document.body.appendChild(shell);
  // Back button (used in page mode)
  const bbtn = document.createElement('button');
  bbtn.id = 'mv2BackBtn';
  bbtn.innerHTML = '<i data-lucide="arrow-left"></i>';
  bbtn.onclick = mv2RestoreShell;
  document.body.appendChild(bbtn);
}

function mv2Render() {
  mv2RenderHeader();
  mv2RenderBNav();
  mv2RenderBody();
  if (window.lucide) lucide.createIcons();
}

function mv2RenderHeader() {
  const h = document.getElementById('mv2Header'); if (!h) return;
  const active = (typeof cloud !== 'undefined' && cloud.profiles) ? cloud.profiles.find(p => p.id === cloud.activeProfileId) : null;
  const userEmail = (typeof cloud !== 'undefined' && cloud.user) ? cloud.user.email : '';
  const userName = (active?.name) || (userEmail ? userEmail.split('@')[0] : 'You');
  const initials = (active?.name || userName).slice(0,2).toUpperCase();
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  let alertCount = 0;
  try { if (typeof computeAlerts === 'function') alertCount = computeAlerts().length; } catch(e){}

  if (mv2State.tab === 'home') {
    h.innerHTML = `
      <div class="mv2-header">
        <div class="mv2-avatar">${escapeHTML(initials)}</div>
        <div class="mv2-greeting">
          <div class="mv2-greeting-small">${greeting}</div>
          <div class="mv2-greeting-name">${escapeHTML(userName)}</div>
        </div>
        <button class="mv2-iconbtn" onclick="mv2OpenAlerts(event)">
          <i data-lucide="bell"></i>${alertCount > 0 ? '<span class="badge-dot"></span>' : ''}
        </button>
      </div>
      ${active ? `<button class="mv2-profile-chip" onclick="mv2OpenProfileSwitch()">
        <span class="mv2-pc-avatar">${escapeHTML(active.name.charAt(0).toUpperCase())}</span>
        <span>${escapeHTML(active.name)}</span>
        <i data-lucide="chevron-down"></i>
      </button>` : ''}`;
  } else {
    const titleMap = { money: 'Money', reports: 'Reports', more: 'More' };
    h.innerHTML = `<div class="mv2-pagetitle">${titleMap[mv2State.tab] || ''}</div>`;
  }
}

function mv2RenderBNav() {
  const nav = document.getElementById('mv2BottomNav'); if (!nav) return;
  const tabs = [
    { id: 'home', icon: 'home', label: 'Home' },
    { id: 'money', icon: 'wallet', label: 'Money' },
    { id: '__fab__' },
    { id: 'reports', icon: 'pie-chart', label: 'Reports' },
    { id: 'more', icon: 'menu', label: 'More' }
  ];
  nav.innerHTML = tabs.map(t => {
    if (t.id === '__fab__') return `<button class="mv2-bn-fab" onclick="mv2OpenAddSheet()"><i data-lucide="plus"></i></button>`;
    const active = mv2State.tab === t.id ? 'active' : '';
    return `<button class="mv2-bn-tab ${active}" onclick="mv2GoTab('${t.id}')"><i data-lucide="${t.icon}"></i><div class="mv2-bn-tab-lbl">${t.label}</div></button>`;
  }).join('');
}

function mv2GoTab(tab) {
  mv2State.tab = tab; mv2State.lastTab = tab;
  mv2Render();
  const b = document.getElementById('mv2Body'); if (b) b.scrollTop = 0;
}

function mv2OpenAddSheet() {
  if (typeof openTxnModal === 'function') openTxnModal();
}

function mv2OpenAlerts() {
  // Try existing notification dropdown, else open transactions page
  if (typeof toggleNotificationDropdown === 'function') { toggleNotificationDropdown(); return; }
  if (typeof openNotificationDropdown === 'function') { openNotificationDropdown(); return; }
  // Fallback: show alerts in a simple sheet
  try {
    const alerts = (typeof computeAlerts === 'function') ? computeAlerts() : [];
    let html = alerts.length ? alerts.map(a => `<div style="padding:12px;border-bottom:1px solid var(--border);"><div style="font-size:13px;">${a.msg}</div></div>`).join('') : '<div style="padding:24px;text-align:center;color:var(--text-tertiary);">No alerts</div>';
    if (typeof openModal === 'function') openModal('Notifications', `<div style="margin:-16px;">${html}</div>`);
  } catch(e){}
}

function mv2OpenProfileSwitch() {
  if (typeof toggleProfileMenu === 'function') { toggleProfileMenu(); return; }
  if (typeof renderProfilePicker === 'function') {
    mv2NavigateToPage('settings');
  }
}

function mv2NewProfilePrompt() {
  if (typeof createNewProfilePrompt === 'function') { createNewProfilePrompt(); return; }
  mv2NavigateToPage('settings');
}

function mv2RenderBody() {
  const body = document.getElementById('mv2Body'); if (!body) return;
  const renderers = { home: mv2Home, money: mv2Money, reports: mv2Reports, more: mv2More };
  (renderers[mv2State.tab] || mv2Home)(body);
}

/* ====== HOME ====== */
function mv2Home(body) {
  const nw = (typeof getNetWorth === 'function') ? getNetWorth() : 0;
  // Month totals
  const now = new Date();
  const ms = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const mTxns = (state.transactions || []).filter(t => t.status !== 'Draft' && t.date >= ms);
  const income = mTxns.filter(t => t.type === 'Income').reduce((s,t) => s + +t.amount, 0);
  const expense = mTxns.filter(t => t.type === 'Expense').reduce((s,t) => s + +t.amount, 0);
  // Last month for comparison
  const lmStart = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString().slice(0,10);
  const lmExpense = (state.transactions || []).filter(t => t.status !== 'Draft' && t.type === 'Expense' && t.date >= lmStart && t.date < ms).reduce((s,t) => s + +t.amount, 0);
  let insight = `Add transactions to start seeing insights.`;
  if (income > 0) {
    const rate = Math.round((income - expense) / income * 100);
    insight = `Your savings rate this month is ${rate}%.`;
  }
  if (lmExpense > 0 && expense > 0) {
    const diff = expense - lmExpense;
    if (Math.abs(diff) > lmExpense * 0.05) {
      insight = diff > 0 ? `You're spending ${fmt(diff)} more than last month so far.` : `You're spending ${fmt(-diff)} less than last month — keep it up!`;
    }
  }
  // Recent transactions
  const recent = [...(state.transactions || [])].filter(t => t.status !== 'Draft').sort((a,b) => (b.date || '').localeCompare(a.date || '')).slice(0, 5);

  body.innerHTML = `
    <div class="mv2-hero">
      <div class="mv2-hero-row">
        <span>Net worth</span>
        <span class="${nw >= 0 ? 'pos' : 'neg'}">${nw >= 0 ? 'Positive' : 'Negative'}</span>
      </div>
      <div class="mv2-hero-amt">${fmt(nw)}</div>
      <svg class="mv2-hero-spark" viewBox="0 0 200 30" preserveAspectRatio="none">${mv2Spark()}</svg>
    </div>
    <div class="mv2-stats">
      <div class="mv2-stat">
        <div class="mv2-stat-lbl"><i data-lucide="arrow-down-left" style="color:#10b981;"></i>Income</div>
        <div class="mv2-stat-val">${fmt(income)}</div>
      </div>
      <div class="mv2-stat">
        <div class="mv2-stat-lbl"><i data-lucide="arrow-up-right" style="color:#ef4444;"></i>Expense</div>
        <div class="mv2-stat-val">${fmt(expense)}</div>
      </div>
    </div>
    <div class="mv2-sectitle"><span>Quick actions</span></div>
    <div class="mv2-qactions">
      <button class="mv2-qa" onclick="mv2OpenAddSheet()"><div class="mv2-qa-ic"><i data-lucide="plus"></i></div><div class="mv2-qa-lbl">Add</div></button>
      <button class="mv2-qa" onclick="mv2GoTab('money');setTimeout(()=>mv2SetMoneySub('cards'),50)"><div class="mv2-qa-ic"><i data-lucide="credit-card"></i></div><div class="mv2-qa-lbl">Pay card</div></button>
      <button class="mv2-qa" onclick="mv2OpenTransfer()"><div class="mv2-qa-ic"><i data-lucide="arrow-left-right"></i></div><div class="mv2-qa-lbl">Transfer</div></button>
      <button class="mv2-qa" onclick="mv2NavigateToPage('recurring')"><div class="mv2-qa-ic"><i data-lucide="receipt"></i></div><div class="mv2-qa-lbl">Bills</div></button>
    </div>
    <div class="mv2-insight">
      <i data-lucide="sparkles"></i>
      <div><div class="mv2-insight-t">Smart insight</div><div class="mv2-insight-m">${escapeHTML(insight)}</div></div>
    </div>
    <div class="mv2-sectitle"><span>Recent activity</span><a onclick="mv2NavigateToPage('transactions')">See all</a></div>
    <div class="mv2-listcard">
      ${recent.length === 0 ? '<div class="mv2-li" style="justify-content:center;color:#9ca3af;padding:20px;display:flex;">No transactions yet</div>' : recent.map(mv2TxnRow).join('')}
    </div>`;
}

function mv2Spark() {
  const snaps = ((state.netWorthSnapshots) || []).slice(-30).sort((a,b) => a.date.localeCompare(b.date));
  if (snaps.length < 2) return '<polyline points="0,15 200,15" fill="none" stroke="#818cf8" stroke-width="2"/>';
  const vals = snaps.map(s => +s.netWorth);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v,i) => `${((i/(vals.length-1))*200).toFixed(1)},${(28 - ((v-min)/range)*24).toFixed(1)}`).join(' ');
  return `<polyline points="${pts}" fill="none" stroke="#818cf8" stroke-width="2" stroke-linejoin="round"/>`;
}

function mv2TxnRow(t) {
  const isInc = t.type === 'Income';
  const isTr = t.type === 'Internal Transfer';
  const isCard = t.type === 'Card Settlement';
  const cat = (state.categories || []).find(c => c.id === t.categoryId);
  const catName = cat?.name || (isTr ? 'Transfer' : isCard ? 'Card payment' : 'Other');
  const icon = isInc ? 'briefcase' : isTr ? 'arrow-left-right' : isCard ? 'credit-card' : (cat?.icon || 'shopping-bag');
  const icCls = isInc ? 'mv2-ic-green' : isTr ? 'mv2-ic-blue' : isCard ? 'mv2-ic-purple' : 'mv2-ic-red';
  const sign = isInc ? '+' : (isTr ? '' : '−');
  return `<button class="mv2-li" onclick="mv2NavigateToPage('transactions')">
    <div class="mv2-li-ic ${icCls}"><i data-lucide="${icon}"></i></div>
    <div class="mv2-li-main"><div class="mv2-li-t">${escapeHTML(t.payee || catName)}</div><div class="mv2-li-s">${escapeHTML(catName)} · ${mv2RelDate(t.date)}</div></div>
    <div class="mv2-li-r"><div class="mv2-li-amt ${isInc?'gain':''}">${sign}${fmt(t.amount)}</div></div>
  </button>`;
}

function mv2RelDate(s) {
  if (!s) return '';
  const d = new Date(s); const t = new Date(); t.setHours(0,0,0,0); d.setHours(0,0,0,0);
  const diff = Math.round((t - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff > 0 && diff < 7) return `${diff}d ago`;
  return (typeof fmtDate === 'function') ? fmtDate(s) : s;
}

function mv2OpenTransfer() {
  if (typeof openTxnModal === 'function') {
    openTxnModal();
    setTimeout(() => {
      const sel = document.getElementById('txnType');
      if (sel) { sel.value = 'Internal Transfer'; sel.dispatchEvent(new Event('change')); }
    }, 80);
  }
}

/* ====== MONEY ====== */
function mv2Money(body) {
  body.innerHTML = `
    <div class="mv2-pills" id="mv2MoneyPills">
      ${[['accounts','Accounts'],['cards','Cards'],['loans','Loans'],['investments','Invest'],['insurance','Insurance']].map(([id,lbl]) =>
        `<button class="mv2-pill ${mv2State.moneySub === id ? 'active' : ''}" onclick="mv2SetMoneySub('${id}')">${lbl}</button>`
      ).join('')}
    </div>
    <div id="mv2MoneyBody" style="padding:0 16px;"></div>`;
  mv2RenderMoneySub();
}

function mv2SetMoneySub(sub) {
  mv2State.moneySub = sub;
  document.querySelectorAll('#mv2MoneyPills .mv2-pill').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#mv2MoneyPills .mv2-pill').forEach(p => {
    if (p.getAttribute('onclick')?.includes(`'${sub}'`)) p.classList.add('active');
  });
  mv2RenderMoneySub();
}

function mv2RenderMoneySub() {
  const body = document.getElementById('mv2MoneyBody'); if (!body) return;
  const sub = mv2State.moneySub;
  let html = '';
  if (sub === 'accounts') {
    const list = (state.accounts || []).filter(a => a.status === 'Active');
    const total = list.reduce((s,a) => s + +a.balance, 0);
    html = `<div class="mv2-sum"><div><div class="mv2-sum-lbl">Total balance</div><div class="mv2-sum-val">${fmt(total)}</div></div><div style="text-align:right;"><div class="mv2-sum-lbl">Accounts</div><div class="mv2-sum-sub">${list.length}</div></div></div>`;
    html += list.length === 0 ? '<div class="mv2-listcard"><div class="mv2-li" style="justify-content:center;color:#9ca3af;padding:24px;display:flex;">No accounts yet</div></div>' : list.map(mv2AcctCard).join('');
    html += `<button class="mv2-mcard" style="background:#4f46e5;color:#fff;border:none;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:600;margin-top:10px;" onclick="mv2NavigateToPage('accounts')"><i data-lucide="plus" style="width:16px;height:16px;"></i>Add account</button>`;
  } else if (sub === 'cards') {
    const list = (state.cards || []).filter(c => c.status !== 'Closed');
    const total = list.reduce((s,c) => s + (typeof getCardOutstanding === 'function' ? getCardOutstanding(c.id) : 0), 0);
    html = `<div class="mv2-sum"><div><div class="mv2-sum-lbl">Total outstanding</div><div class="mv2-sum-val">${fmt(total)}</div></div><div style="text-align:right;"><div class="mv2-sum-lbl">Cards</div><div class="mv2-sum-sub">${list.length}</div></div></div>`;
    html += list.length === 0 ? '<div class="mv2-listcard"><div class="mv2-li" style="justify-content:center;color:#9ca3af;padding:24px;display:flex;">No credit cards</div></div>' : list.map(mv2CardCard).join('');
  } else if (sub === 'loans') {
    const list = (state.loans || []).filter(l => l.status === 'Active');
    const total = list.reduce((s,l) => s + +l.outstanding, 0);
    html = `<div class="mv2-sum"><div><div class="mv2-sum-lbl">Total outstanding</div><div class="mv2-sum-val">${fmt(total)}</div></div><div style="text-align:right;"><div class="mv2-sum-lbl">Loans</div><div class="mv2-sum-sub">${list.length}</div></div></div>`;
    html += list.length === 0 ? '<div class="mv2-listcard"><div class="mv2-li" style="justify-content:center;color:#9ca3af;padding:24px;display:flex;">No active loans</div></div>' : list.map(mv2LoanCard).join('');
  } else if (sub === 'investments') {
    const list = (state.investments || []).filter(i => i.status !== 'Closed');
    const total = list.reduce((s,i) => s + +(i.currentValue || i.invested || 0), 0);
    html = `<div class="mv2-sum"><div><div class="mv2-sum-lbl">Portfolio value</div><div class="mv2-sum-val">${fmt(total)}</div></div><div style="text-align:right;"><div class="mv2-sum-lbl">Holdings</div><div class="mv2-sum-sub">${list.length}</div></div></div>`;
    html += list.length === 0 ? '<div class="mv2-listcard"><div class="mv2-li" style="justify-content:center;color:#9ca3af;padding:24px;display:flex;">No investments yet</div></div>' : list.map(mv2InvCard).join('');
  } else if (sub === 'insurance') {
    const list = (state.insurance || []).filter(p => p.status === 'Active');
    const cover = list.reduce((s,p) => s + +(p.sumAssured || 0), 0);
    html = `<div class="mv2-sum"><div><div class="mv2-sum-lbl">Total cover</div><div class="mv2-sum-val">${fmt(cover)}</div></div><div style="text-align:right;"><div class="mv2-sum-lbl">Policies</div><div class="mv2-sum-sub">${list.length}</div></div></div>`;
    html += list.length === 0 ? '<div class="mv2-listcard"><div class="mv2-li" style="justify-content:center;color:#9ca3af;padding:24px;display:flex;">No policies</div></div>' : list.map(mv2InsCard).join('');
  }
  body.innerHTML = html;
  if (window.lucide) lucide.createIcons();
}

function mv2AcctCard(a) {
  const last4 = a.last4 || (a.accountNumber || '').slice(-4);
  const ic = {'Savings':'mv2-ic-red','Current':'mv2-ic-blue','Salary':'mv2-ic-amber','Fixed Deposit':'mv2-ic-purple','Recurring Deposit':'mv2-ic-green'}[a.type] || 'mv2-ic-gray';
  let ambStat = '', ambClr = '#9ca3af';
  if (a.minAMB && a.amb) {
    const ok = +a.amb >= +a.minAMB;
    ambStat = ok ? 'Above min' : 'Below min';
    ambClr = ok ? '#10b981' : '#ef4444';
  }
  return `<div class="mv2-mcard" onclick="mv2NavigateToPage('accounts')">
    <div class="mv2-mcard-row">
      <div class="mv2-li-ic ${ic}"><i data-lucide="building-2"></i></div>
      <div style="flex:1;min-width:0;"><div class="mv2-li-t">${escapeHTML(a.bank || a.name)}</div><div class="mv2-li-s">${escapeHTML(a.name)}${last4 ? ' · XXXX ' + last4 : ''}</div></div>
      <div style="text-align:right;"><div style="font-size:14px;font-weight:700;">${fmt(a.balance)}</div></div>
    </div>
    ${(a.amb || a.aqb) ? `<div class="mv2-mcard-meta">${a.amb ? `<span>AMB: ${fmt(a.amb)}</span>` : ''}${a.aqb ? `<span>AQB: ${fmt(a.aqb)}</span>` : ''}${ambStat ? `<span style="color:${ambClr};">${ambStat}</span>` : ''}</div>` : ''}
  </div>`;
}

function mv2CardCard(c) {
  const out = typeof getCardOutstanding === 'function' ? getCardOutstanding(c.id) : 0;
  const last4 = c.last4 || (c.cardNumber || '').slice(-4);
  return `<div class="mv2-mcard" onclick="mv2NavigateToPage('cards')"><div class="mv2-mcard-row">
    <div class="mv2-li-ic mv2-ic-purple"><i data-lucide="credit-card"></i></div>
    <div style="flex:1;min-width:0;"><div class="mv2-li-t">${escapeHTML(c.issuer || c.name)}</div><div class="mv2-li-s">${escapeHTML(c.name)}${last4 ? ' · XXXX ' + last4 : ''}</div></div>
    <div style="text-align:right;"><div style="font-size:14px;font-weight:700;">${fmt(out)}</div><div style="font-size:10px;color:#9ca3af;">outstanding</div></div>
  </div></div>`;
}

function mv2LoanCard(l) {
  return `<div class="mv2-mcard" onclick="mv2NavigateToPage('loans')"><div class="mv2-mcard-row">
    <div class="mv2-li-ic mv2-ic-red"><i data-lucide="landmark"></i></div>
    <div style="flex:1;min-width:0;"><div class="mv2-li-t">${escapeHTML(l.lender || l.name)}</div><div class="mv2-li-s">${escapeHTML(l.type || 'Loan')} · EMI ${fmt(l.emi)}</div></div>
    <div style="text-align:right;"><div style="font-size:14px;font-weight:700;">${fmt(l.outstanding)}</div><div style="font-size:10px;color:#9ca3af;">left</div></div>
  </div></div>`;
}

function mv2InvCard(i) {
  const gain = (+(i.currentValue || 0)) - (+(i.invested || 0));
  const pct = i.invested > 0 ? Math.round(gain / +i.invested * 100) : 0;
  return `<div class="mv2-mcard" onclick="mv2NavigateToPage('investments')"><div class="mv2-mcard-row">
    <div class="mv2-li-ic mv2-ic-green"><i data-lucide="trending-up"></i></div>
    <div style="flex:1;min-width:0;"><div class="mv2-li-t">${escapeHTML(i.name)}</div><div class="mv2-li-s">${escapeHTML(i.type || 'Investment')} · ${fmt(i.invested)} in</div></div>
    <div style="text-align:right;"><div style="font-size:14px;font-weight:700;">${fmt(i.currentValue || i.invested)}</div><div style="font-size:10px;color:${gain >= 0 ? '#10b981' : '#ef4444'};">${gain >= 0 ? '+' : ''}${pct}%</div></div>
  </div></div>`;
}

function mv2InsCard(p) {
  return `<div class="mv2-mcard" onclick="mv2NavigateToPage('insurance')"><div class="mv2-mcard-row">
    <div class="mv2-li-ic mv2-ic-blue"><i data-lucide="shield-check"></i></div>
    <div style="flex:1;min-width:0;"><div class="mv2-li-t">${escapeHTML(p.policyName || p.insurer)}</div><div class="mv2-li-s">${escapeHTML(p.type || 'Policy')} · Premium ${fmt(p.premium)}</div></div>
    <div style="text-align:right;"><div style="font-size:14px;font-weight:700;">${fmt(p.sumAssured)}</div><div style="font-size:10px;color:#9ca3af;">cover</div></div>
  </div></div>`;
}

/* ====== REPORTS ====== */
function mv2Reports(body) {
  // Try to compute health score from existing function
  let score = 0, scoreCount = 0;
  try {
    if (typeof computeFinancialHealthScore === 'function') {
      const r = computeFinancialHealthScore();
      score = r.score || 0; scoreCount = r.ratios?.length || 0;
    }
  } catch(e){}
  // Heuristic if no function
  if (!score) {
    const nw = (typeof getNetWorth === 'function') ? getNetWorth() : 0;
    score = nw > 0 ? 65 : 35; scoreCount = 8;
  }
  const pct = Math.max(0, Math.min(100, score));
  const arcAngle = (pct / 100) * 180; // 180deg sweep
  const x = 50 + 40 * Math.cos((180 - arcAngle) * Math.PI / 180);
  const y = 50 - 40 * Math.sin((180 - arcAngle) * Math.PI / 180);
  const largeArc = arcAngle > 180 ? 1 : 0;
  const stat = score >= 75 ? { lbl: 'Excellent', clr: '#10b981', bg: '#d1fae5' } : score >= 60 ? { lbl: 'Good', clr: '#10b981', bg: '#d1fae5' } : score >= 40 ? { lbl: 'Fair', clr: '#d97706', bg: '#fef3c7' } : { lbl: 'Needs work', clr: '#dc2626', bg: '#fee2e2' };

  // Quick stats
  const nw = (typeof getNetWorth === 'function') ? getNetWorth() : 0;
  const liquid = (typeof getTotalLiquid === 'function') ? getTotalLiquid() : 0;
  const liab = (typeof getTotalLiabilities === 'function') ? getTotalLiabilities() : 0;
  const inv = (typeof getTotalInvestments === 'function') ? getTotalInvestments() : 0;
  const now = new Date();
  const ms = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const mTxns = (state.transactions || []).filter(t => t.status !== 'Draft' && t.date >= ms);
  const income = mTxns.filter(t => t.type === 'Income').reduce((s,t) => s + +t.amount, 0);
  const expense = mTxns.filter(t => t.type === 'Expense').reduce((s,t) => s + +t.amount, 0);
  const monthlyExp = expense || 1;
  const emergencyMonths = liquid / monthlyExp;
  const savRate = income > 0 ? Math.round((income - expense) / income * 100) : 0;
  const debtRatio = income > 0 ? Math.round(liab / (income * 12) * 100) : 0;
  const invRatio = (liquid + inv) > 0 ? Math.round(inv / (liquid + inv) * 100) : 0;

  body.innerHTML = `
    <div class="mv2-gauge-card">
      <div style="font-size:11px;color:#6b7280;margin-bottom:8px;">Financial health score</div>
      <svg viewBox="0 0 100 60" style="width:160px;height:96px;">
        <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#e5e7eb" stroke-width="8" stroke-linecap="round"/>
        <path d="M 10 50 A 40 40 0 0 1 ${x.toFixed(1)} ${y.toFixed(1)}" fill="none" stroke="${stat.clr}" stroke-width="8" stroke-linecap="round"/>
      </svg>
      <div class="mv2-gauge-score">${score}<small>/100</small></div>
      <div class="mv2-gauge-pill" style="background:${stat.bg};color:${stat.clr};">${stat.lbl}</div>
    </div>
    <div class="mv2-stats">
      <div class="mv2-stat"><div class="mv2-stat-lbl">Savings rate</div><div class="mv2-stat-val">${savRate}%</div><div style="font-size:9px;color:${savRate >= 20 ? '#10b981' : '#d97706'};margin-top:2px;">${savRate >= 20 ? 'Healthy' : 'Build it up'}</div></div>
      <div class="mv2-stat"><div class="mv2-stat-lbl">Debt-to-income</div><div class="mv2-stat-val">${debtRatio}%</div><div style="font-size:9px;color:${debtRatio < 40 ? '#10b981' : '#dc2626'};margin-top:2px;">${debtRatio < 40 ? 'Healthy' : 'High'}</div></div>
      <div class="mv2-stat"><div class="mv2-stat-lbl">Emergency fund</div><div class="mv2-stat-val">${emergencyMonths.toFixed(1)} mo</div><div style="font-size:9px;color:${emergencyMonths >= 6 ? '#10b981' : '#d97706'};margin-top:2px;">Target: 6 mo</div></div>
      <div class="mv2-stat"><div class="mv2-stat-lbl">Invested</div><div class="mv2-stat-val">${invRatio}%</div><div style="font-size:9px;color:${invRatio >= 25 ? '#10b981' : '#9ca3af'};margin-top:2px;">of liquid + inv</div></div>
    </div>
    <button class="mv2-mcard" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;width:100%;padding:14px;margin-top:6px;" onclick="mv2NavigateToPage('reports')">
      <div style="display:flex;align-items:center;gap:10px;"><div class="mv2-li-ic mv2-ic-purple"><i data-lucide="bar-chart-3"></i></div><div><div style="font-size:13px;font-weight:600;">Full reports</div><div style="font-size:11px;color:#9ca3af;">14 detailed reports</div></div></div>
      <i data-lucide="chevron-right" style="width:18px;height:18px;color:#9ca3af;"></i>
    </button>
    <button class="mv2-mcard" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;width:100%;padding:14px;" onclick="mv2NavigateToPage('health')">
      <div style="display:flex;align-items:center;gap:10px;"><div class="mv2-li-ic mv2-ic-green"><i data-lucide="heart-pulse"></i></div><div><div style="font-size:13px;font-weight:600;">All ${scoreCount || 24} ratios</div><div style="font-size:11px;color:#9ca3af;">Detailed health breakdown</div></div></div>
      <i data-lucide="chevron-right" style="width:18px;height:18px;color:#9ca3af;"></i>
    </button>
    <button class="mv2-mcard" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;width:100%;padding:14px;" onclick="mv2NavigateToPage('projection')">
      <div style="display:flex;align-items:center;gap:10px;"><div class="mv2-li-ic mv2-ic-blue"><i data-lucide="line-chart"></i></div><div><div style="font-size:13px;font-weight:600;">Projection</div><div style="font-size:11px;color:#9ca3af;">Forecast next 60 days</div></div></div>
      <i data-lucide="chevron-right" style="width:18px;height:18px;color:#9ca3af;"></i>
    </button>
  `;
}

/* ====== MORE ====== */
function mv2More(body) {
  const active = (typeof cloud !== 'undefined' && cloud.profiles) ? cloud.profiles.find(p => p.id === cloud.activeProfileId) : null;
  const userEmail = (typeof cloud !== 'undefined' && cloud.user) ? cloud.user.email : '';
  const userName = (active?.name) || (userEmail ? userEmail.split('@')[0] : 'You');
  const initial = (active?.name || userName).charAt(0).toUpperCase();
  const recurringCount = (state.recurring || []).filter(r => r.active !== false).length;

  const secs = [
    { lbl: 'Data', items: [
      { ic: 'users', lbl: 'People', page: 'people', clr: '#4f46e5' },
      { ic: 'repeat', lbl: 'Recurring templates', page: 'recurring', badge: recurringCount, clr: '#4f46e5' },
      { ic: 'list', lbl: 'All transactions', page: 'transactions', clr: '#4f46e5' },
      { ic: 'line-chart', lbl: 'Projection', page: 'projection', clr: '#4f46e5' }
    ]},
    { lbl: 'Tools', items: [
      { ic: 'download', lbl: 'Export & backup', page: 'export', clr: '#10b981' },
      { ic: 'stethoscope', lbl: 'Diagnose sync', action: 'runSyncDiagnostic', clr: '#10b981' }
    ]},
    { lbl: 'Account', items: [
      { ic: 'settings', lbl: 'Settings', page: 'settings', clr: '#d97706' },
      ...((typeof cloud !== 'undefined' && cloud.user) ? [{ ic: 'log-out', lbl: 'Sign out', action: 'cloudSignOut', clr: '#ef4444', danger: true }] : [])
    ]}
  ];

  body.innerHTML = `
    <div class="mv2-more-prof">
      <div class="mv2-more-prof-row">
        <div class="mv2-more-prof-av">${escapeHTML(initial)}</div>
        <div style="flex:1;min-width:0;">
          <div class="mv2-more-prof-name">${escapeHTML(active?.name || userName)}</div>
          <div class="mv2-more-prof-meta">${escapeHTML(userEmail || 'Local only')}</div>
        </div>
      </div>
      ${(typeof cloud !== 'undefined' && cloud.user) ? `
        <div class="mv2-more-prof-actions">
          <button class="mv2-more-btn" onclick="mv2OpenProfileSwitch()"><i data-lucide="arrow-right-left"></i>Switch profile</button>
          <button class="mv2-more-btn" style="flex:0 0 auto;padding:8px 12px;" onclick="mv2NewProfilePrompt()"><i data-lucide="plus"></i></button>
        </div>
      ` : ''}
    </div>
    ${secs.map(s => `
      <div class="mv2-more-seclbl">${s.lbl}</div>
      <div class="mv2-more-list">
        ${s.items.map(it => `
          <button class="mv2-more-item" onclick="${it.action ? (it.action + '()') : ('mv2NavigateToPage(&#39;' + it.page + '&#39;)')}">
            <i data-lucide="${it.ic}" class="lead" style="color:${it.clr};"></i>
            <span class="label" ${it.danger ? 'style="color:#ef4444;"' : ''}>${escapeHTML(it.lbl)}</span>
            ${it.badge ? `<span class="mv2-more-badge">${it.badge}</span>` : ''}
            ${!it.danger ? '<i data-lucide="chevron-right" class="chev"></i>' : ''}
          </button>`).join('')}
      </div>`).join('')}
  `;
}

/* ====== Navigate to a non-tab page (Settings, People, etc.) ====== */
function mv2NavigateToPage(pageId) {
  // Hide mv2 shell, show .app, render the page, add back button
  mv2State.hiddenForPage = true;
  document.body.classList.add('mv2-page-mode');
  if (typeof navigate === 'function') {
    navigate(pageId);
  }
  setTimeout(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, 30);
  if (window.lucide) lucide.createIcons();
}

function mv2RestoreShell() {
  mv2State.hiddenForPage = false;
  document.body.classList.remove('mv2-page-mode');
  mv2Render();
}

/* ====== Resize + Boot ====== */
window.addEventListener('resize', () => {
  clearTimeout(window.__mv2RT);
  window.__mv2RT = setTimeout(mv2Init, 150);
});

// Hook into renderCurrent so mv2 stays in sync when underlying data changes
(function() {
  if (typeof renderCurrent !== 'function') return;
  const orig = renderCurrent;
  window.renderCurrent = function() {
    const r = orig.apply(this, arguments);
    if (mv2IsMobile() && document.body.classList.contains('mv2') && !mv2State.hiddenForPage) {
      try { mv2Render(); } catch(e) { console.warn('mv2 render fail:', e); }
    }
    return r;
  };
})();

// Boot mv2 after main app boots
window.addEventListener('load', () => setTimeout(mv2Init, 800));
// Also try again after 2s in case profile loads later
setTimeout(mv2Init, 2500);

boot().catch(err => {
  console.error('Boot failed:', err);
  document.getElementById('main').innerHTML = `<div class="alert alert-danger"><i data-lucide="alert-triangle"></i><div>Failed to start: ${err.message}</div></div>`;
  if (window.lucide) lucide.createIcons();
});
</script>
</body>
</html>
