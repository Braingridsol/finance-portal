<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ========================================================================
   DESIGN TOKENS
======================================================================== */
:root {
  /* Surfaces */
  --bg: #fafbfc;
  --surface: #ffffff;
  --surface-2: #f4f6f8;
  --surface-3: #eef1f4;
  --border: #e1e5ea;
  --border-strong: #c8cfd6;
  /* Text */
  --text-primary: #1a1f36;
  --text-secondary: #5e6c84;
  --text-tertiary: #8b95a5;
  /* Brand & status */
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --primary-soft: #eef2ff;
  --success: #15803d;
  --success-soft: #dcfce7;
  --danger: #dc2626;
  --danger-soft: #fee2e2;
  --warning: #d97706;
  --warning-soft: #fef3c7;
  --info: #0369a1;
  --info-soft: #dbeafe;
  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 1px 3px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 8px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.08), 0 4px 10px rgba(0,0,0,.04);
  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  /* Spacing (4px grid) */
  --xs: 4px; --sm: 8px; --md: 16px; --lg: 24px; --xl: 32px; --xxl: 48px;
}
[data-theme="dark"] {
  --bg: #0b1020;
  --surface: #131a2c;
  --surface-2: #1b2336;
  --surface-3: #232c42;
  --border: #2a3349;
  --border-strong: #3a4360;
  --text-primary: #e8ecf2;
  --text-secondary: #a3adc2;
  --text-tertiary: #6b7591;
  --primary-soft: #1e1b4b;
  --success-soft: #052e16;
  --danger-soft: #450a0a;
  --warning-soft: #451a03;
  --info-soft: #082f49;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow: 0 1px 3px rgba(0,0,0,.4);
  --shadow-md: 0 4px 8px rgba(0,0,0,.4);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.5);
}

/* ========================================================================
   RESET
======================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'cv02','cv03','cv04','cv11';
}
body { overflow-x: hidden; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea {
  font-family: inherit;
  font-size: 14px;
  width: 100%;
  padding: 10px 12px;
  background: var(--surface);
  color: var(--text-primary);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  transition: border-color .15s, box-shadow .15s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.18);
}
input[type="checkbox"], input[type="radio"] { width: auto; accent-color: var(--primary); }
textarea { min-height: 72px; resize: vertical; }
label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: var(--xs);
}
[data-lucide] { width: 18px; height: 18px; stroke-width: 2; flex-shrink: 0; }

/* ========================================================================
   APP SHELL
======================================================================== */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: 248px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.brand {
  padding: var(--md);
  display: flex;
  align-items: center;
  gap: var(--sm);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), #8b5cf6);
  border-radius: var(--radius-md);
  display: grid; place-items: center;
  color: white; font-weight: 700; font-size: 18px;
}
.brand-text { font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
.nav { flex: 1; padding: var(--sm) var(--xs); }
.nav-group { margin-bottom: var(--sm); }
.nav-group-label {
  padding: var(--sm) var(--md) var(--xs);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: var(--sm);
  width: 100%;
  padding: 8px 12px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  text-align: left;
  transition: background .12s, color .12s;
  margin: 1px 6px;
  width: calc(100% - 12px);
}
.nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
.nav-item.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
[data-theme="dark"] .nav-item.active { background: var(--primary); color: white; }
.sidebar-foot {
  padding: var(--sm);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: var(--xs);
  flex-shrink: 0;
}

/* ========================================================================
   MAIN AREA
======================================================================== */
.main {
  flex: 1;
  padding: var(--lg) var(--xl) calc(var(--xxl) * 2);
  min-width: 0;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--lg);
  gap: var(--md);
  flex-wrap: wrap;
}
.topbar-left { min-width: 0; }
.page-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.01em;
  color: var(--text-primary);
}
.page-sub {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.topbar-actions { display: flex; gap: var(--sm); align-items: center; flex-wrap: wrap; }

/* ========================================================================
   BUTTONS
======================================================================== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--xs);
  padding: 9px 14px;
  font-size: 13px;
  font-weight: 600;
  border-radius: var(--radius-md);
  transition: background .12s, transform .04s, opacity .12s, box-shadow .12s;
  white-space: nowrap;
  border: 1px solid transparent;
}
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); box-shadow: 0 2px 8px rgba(79,70,229,.3); }
.btn-secondary { background: var(--surface-2); color: var(--text-primary); border-color: var(--border); }
.btn-secondary:hover { background: var(--surface-3); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-success { background: var(--success); color: white; }
.btn-ghost { color: var(--text-secondary); padding: 8px; border-radius: var(--radius-md); }
.btn-ghost:hover { background: var(--surface-2); color: var(--text-primary); }
.btn-ghost [data-lucide] { width: 16px; height: 16px; }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.btn-sm [data-lucide] { width: 14px; height: 14px; }
.btn-icon { padding: 8px; }
.btn-icon [data-lucide] { width: 18px; height: 18px; }
.btn-block { width: 100%; }
.btn-bell { position: relative; }
.btn-bell .bell-badge {
  position: absolute;
  top: 2px; right: 2px;
  background: var(--danger);
  color: white;
  font-size: 9px;
  font-weight: 700;
  min-width: 14px; height: 14px;
  border-radius: 999px;
  display: grid; place-items: center;
  padding: 0 3px;
  border: 2px solid var(--surface);
}

/* ========================================================================
   CARDS
======================================================================== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--md);
  box-shadow: var(--shadow-sm);
  transition: box-shadow .15s;
}
.card.clickable { cursor: pointer; }
.card.clickable:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); }
.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--sm);
  margin-bottom: var(--sm);
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}
.card-actions { display: flex; gap: 2px; align-items: center; }
.stat-value {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--text-primary);
}
.stat-value.lg { font-size: 28px; }
.stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.grid { display: grid; gap: var(--md); }
.grid-stats { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.grid-2 { grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.grid-mini { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--sm); }

.section { margin-bottom: var(--lg); }
.section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: var(--sm);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ========================================================================
   LISTS
======================================================================== */
.list { display: flex; flex-direction: column; }
.list-item {
  display: flex;
  align-items: center;
  gap: var(--md);
  padding: 12px var(--md);
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.list-item:last-child { border-bottom: none; }
.list-item:hover { background: var(--surface-2); }
.list-icon {
  width: 36px; height: 36px;
  background: var(--surface-2);
  color: var(--text-secondary);
  border-radius: var(--radius-md);
  display: grid;
  place-items: center;
  flex-shrink: 0;
}
.list-icon [data-lucide] { width: 18px; height: 18px; }
.list-icon.icon-success { background: var(--success-soft); color: var(--success); }
.list-icon.icon-danger { background: var(--danger-soft); color: var(--danger); }
.list-icon.icon-warning { background: var(--warning-soft); color: var(--warning); }
.list-icon.icon-info { background: var(--info-soft); color: var(--info); }
.list-icon.icon-primary { background: var(--primary-soft); color: var(--primary); }
.list-main { flex: 1; min-width: 0; }
.list-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.list-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
.list-amount {
  font-weight: 700;
  font-size: 14px;
  text-align: right;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.list-amount.pos { color: var(--success); }
.list-amount.neg { color: var(--danger); }
.list-actions { display: flex; gap: 2px; }
.list-item.draft { border-left: 3px solid var(--warning); padding-left: calc(var(--md) - 3px); background: var(--warning-soft); }
[data-theme="dark"] .list-item.draft { background: rgba(217,119,6,.1); }

/* ========================================================================
   BADGES & PILLS
======================================================================== */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  background: var(--surface-2);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.badge-success { background: var(--success-soft); color: var(--success); border-color: transparent; }
.badge-danger { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
.badge-warning { background: var(--warning-soft); color: var(--warning); border-color: transparent; }
.badge-info { background: var(--info-soft); color: var(--info); border-color: transparent; }
.badge-primary { background: var(--primary-soft); color: var(--primary); border-color: transparent; }

.pill-group {
  display: flex;
  gap: var(--xs);
  flex-wrap: wrap;
  margin-bottom: var(--md);
}
.pill {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background .12s, color .12s;
}
.pill:hover { background: var(--surface-2); color: var(--text-primary); }
.pill.active { background: var(--primary); color: white; border-color: var(--primary); }

/* ========================================================================
   PROGRESS
======================================================================== */
.progress {
  width: 100%;
  height: 6px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  transition: width .3s;
}
.progress-fill.success { background: var(--success); }
.progress-fill.warning { background: var(--warning); }
.progress-fill.danger { background: var(--danger); }

/* ========================================================================
   ALERTS
======================================================================== */
.alert {
  display: flex;
  gap: var(--sm);
  align-items: flex-start;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  font-size: 13px;
  margin-bottom: var(--sm);
  border: 1px solid;
}
.alert-icon { flex-shrink: 0; margin-top: 1px; }
.alert-info { background: var(--info-soft); color: var(--info); border-color: rgba(3,105,161,.2); }
.alert-warning { background: var(--warning-soft); color: var(--warning); border-color: rgba(217,119,6,.2); }
.alert-danger { background: var(--danger-soft); color: var(--danger); border-color: rgba(220,38,38,.2); }
.alert-success { background: var(--success-soft); color: var(--success); border-color: rgba(21,128,61,.2); }

/* ========================================================================
   MODAL
======================================================================== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.6);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: var(--md);
}
.modal-backdrop.show { display: flex; animation: fadeIn .15s; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 560px;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s cubic-bezier(.2,.8,.2,1);
}
.modal.wide { max-width: 820px; }
.modal-head {
  padding: var(--md);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 1;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
.modal-body { padding: var(--md); }
.modal-foot {
  padding: 12px var(--md);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: var(--sm);
  position: sticky;
  bottom: 0;
  background: var(--surface);
  flex-wrap: wrap;
}
.form-row { display: grid; gap: var(--sm); margin-bottom: 12px; }
.form-row-2 { grid-template-columns: 1fr 1fr; }
.form-row-3 { grid-template-columns: 1fr 1fr 1fr; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ========================================================================
   TOAST
======================================================================== */
.toast-host {
  position: fixed;
  top: var(--md);
  right: var(--md);
  display: flex;
  flex-direction: column;
  gap: var(--sm);
  z-index: 200;
  pointer-events: none;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--primary);
  padding: 12px var(--md);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  font-size: 13px;
  min-width: 240px;
  pointer-events: auto;
  animation: slideInRight .25s;
  display: flex;
  align-items: center;
  gap: var(--sm);
}
.toast.success { border-left-color: var(--success); }
.toast.error { border-left-color: var(--danger); }
.toast.warning { border-left-color: var(--warning); }
.toast.info { border-left-color: var(--info); }
@keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ========================================================================
   MOBILE NAV + FAB
======================================================================== */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 4px 4px;
  padding-bottom: calc(4px + env(safe-area-inset-bottom));
  z-index: 50;
  box-shadow: 0 -2px 10px rgba(0,0,0,.05);
}
.mobile-nav ul {
  display: flex;
  list-style: none;
  justify-content: space-around;
}
.mobile-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 4px;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-tertiary);
  background: none;
  border: none;
  cursor: pointer;
}
.mobile-nav-item [data-lucide] { width: 20px; height: 20px; }
.mobile-nav-item.active { color: var(--primary); }
.fab {
  position: fixed;
  right: var(--md);
  bottom: 80px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  box-shadow: var(--shadow-lg);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 49;
  border: none;
  cursor: pointer;
}
.fab [data-lucide] { width: 24px; height: 24px; stroke-width: 2.5; }
.fab:hover { background: var(--primary-hover); }

/* ========================================================================
   TABLES
======================================================================== */
.tbl-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--surface);
}
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}
.tbl thead th {
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-tertiary);
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
  white-space: nowrap;
}
.tbl tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.tbl tbody tr:hover td { background: var(--surface-2); }
.tbl tbody tr:last-child td { border-bottom: none; }
.tbl td.num, .tbl th.num { text-align: right; }
.tbl td.text-sm { font-size: 12px; }

/* ========================================================================
   FILTER BAR
======================================================================== */
.filter-bar {
  display: flex;
  gap: var(--sm);
  flex-wrap: wrap;
  margin-bottom: var(--md);
  align-items: center;
}
.filter-bar select, .filter-bar input { max-width: 180px; flex: 0 0 auto; min-width: 130px; }
.filter-bar .search-input { max-width: 220px; }

/* ========================================================================
   EMPTY STATE
======================================================================== */
.empty {
  text-align: center;
  padding: var(--xxl) var(--md);
  color: var(--text-tertiary);
}
.empty-icon {
  width: 56px; height: 56px;
  background: var(--surface-2);
  border-radius: 50%;
  margin: 0 auto var(--md);
  display: grid;
  place-items: center;
  color: var(--text-tertiary);
}
.empty-icon [data-lucide] { width: 28px; height: 28px; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.empty-sub { font-size: 13px; max-width: 360px; margin: 0 auto var(--md); }

/* ========================================================================
   CHART CONTAINER
======================================================================== */
.chart-wrap { position: relative; height: 280px; }

/* ========================================================================
   TYPOGRAPHY UTILITIES
======================================================================== */
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-warning { color: var(--warning); }
.text-info { color: var(--info); }
.text-primary { color: var(--primary); }
.text-muted { color: var(--text-secondary); }
.text-tertiary { color: var(--text-tertiary); }
.text-xs { font-size: 11px; }
.text-sm { font-size: 12px; }
.text-lg { font-size: 16px; }
.fw-600 { font-weight: 600; }
.fw-700 { font-weight: 700; }
.num { font-variant-numeric: tabular-nums; }
.strike { text-decoration: line-through; opacity: .55; }

.row { display: flex; gap: var(--sm); align-items: center; flex-wrap: wrap; }
.row-between { display: flex; gap: var(--sm); align-items: center; justify-content: space-between; flex-wrap: wrap; }
.gap-xs { gap: var(--xs); } .gap-sm { gap: var(--sm); } .gap-md { gap: var(--md); }
.mt-sm { margin-top: var(--sm); } .mt-md { margin-top: var(--md); } .mt-lg { margin-top: var(--lg); }
.mb-sm { margin-bottom: var(--sm); } .mb-md { margin-bottom: var(--md); }
.hidden { display: none !important; }

/* ========================================================================
   RESPONSIVE
======================================================================== */
@media (max-width: 1024px) {
  .sidebar { width: 220px; }
  .main { padding: var(--md) var(--lg); }
}

/* ========================================================================
   MOBILE UI ENHANCEMENTS (Sprint 5)
======================================================================== */
/* Disable hover effects on touch devices */
@media (hover: none) and (pointer: coarse) {
  .card.clickable:hover { box-shadow: var(--shadow-sm); border-color: var(--border); }
  .list-item:hover { background: transparent; }
  .btn:hover { background: inherit; }
  .btn-primary:hover { background: var(--primary); }
  .btn-secondary:hover { background: var(--surface-2); }
  .nav-item:hover { background: transparent; color: var(--text-secondary); }
  .nav-item.active { background: var(--primary-soft); color: var(--primary); }
}
/* Bottom sheet handle for mobile modals */
@media (max-width: 768px) {
  .modal { position: relative; overflow-y: auto; }
  .modal::before {
    content: ''; display: block; position: sticky; top: 0; z-index: 2;
    width: 40px; height: 4px; background: var(--border-strong); border-radius: 2px;
    margin: 8px auto 0;
  }
  .modal-head { padding-top: 4px; }
  /* Larger touch targets on mobile */
  .btn-ghost.btn-sm { padding: 10px; min-width: 40px; min-height: 40px; }
  .list-item { padding: 14px var(--md); }
  .nav-item { padding: 12px 14px; }
  /* Smooth bottom-sheet slide-in */
  .modal { animation: slideUpSheet .25s cubic-bezier(.2,.8,.2,1); }
}
@keyframes slideUpSheet {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
/* Swipe-to-delete UI */
.swipeable { position: relative; overflow: hidden; touch-action: pan-y; }
.swipeable .swipe-content { transition: transform .2s cubic-bezier(.2,.8,.2,1); background: var(--surface); position: relative; z-index: 1; }
.swipeable .swipe-actions {
  position: absolute; right: 0; top: 0; bottom: 0;
  display: flex; align-items: center; gap: 2px;
  padding: 0 8px; z-index: 0;
}
.swipe-action {
  width: 56px; height: 100%; display: grid; place-items: center;
  border: none; cursor: pointer; color: white; font-size: 12px; font-weight: 600;
}
.swipe-action.edit { background: var(--info); }
.swipe-action.delete { background: var(--danger); }
.swipe-action.settle { background: var(--success); }
.swipeable.is-open .swipe-content { transform: translateX(-180px); }
/* Pull-to-refresh */
.ptr-host { position: relative; }
.ptr-indicator {
  position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
  width: 36px; height: 36px; background: var(--surface); border-radius: 50%;
  box-shadow: var(--shadow-md); display: grid; place-items: center;
  transition: top .2s, transform .2s; z-index: 10;
}
.ptr-indicator.pulling { transition: none; }
.ptr-indicator.refreshing { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: translateX(-50%) rotate(0deg); } to { transform: translateX(-50%) rotate(360deg); } }
/* Install button in sidebar */
.install-banner {
  margin: 0 6px 6px;
  padding: 10px 12px;
  background: linear-gradient(135deg, var(--primary), #8b5cf6);
  color: white;
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: 12px;
  display: none;
}
.install-banner.show { display: flex; align-items: center; gap: 8px; }
.install-banner [data-lucide] { width: 14px; height: 14px; }

/* ========================================================================
   AUTH SCREENS (Sprint 4)
======================================================================== */
.auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: var(--md); }
.auth-card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: var(--xl); width: 100%; max-width: 420px; border: 1px solid var(--border); }
.auth-brand { display: flex; align-items: center; gap: var(--sm); justify-content: center; margin-bottom: var(--lg); }
.auth-brand .brand-logo { width: 48px; height: 48px; font-size: 24px; }
.auth-brand .brand-text { font-size: 20px; }
.auth-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: var(--xs); }
.auth-sub { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: var(--lg); }
.auth-link { color: var(--primary); cursor: pointer; font-weight: 600; }
.auth-link:hover { text-decoration: underline; }
.auth-divider { text-align: center; margin: var(--md) 0; color: var(--text-tertiary); font-size: 12px; }
.profile-picker-card { cursor: pointer; transition: all .15s; }
.profile-picker-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary); }
.conn-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; background: var(--surface-2); color: var(--text-secondary); }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; }
.conn-online { background: var(--success-soft); color: var(--success); } .conn-online .conn-dot { background: var(--success); }
.conn-offline { background: var(--surface-2); color: var(--text-tertiary); } .conn-offline .conn-dot { background: var(--text-tertiary); }
.conn-syncing { background: var(--warning-soft); color: var(--warning); } .conn-syncing .conn-dot { background: var(--warning); animation: pulse 1s infinite; }
.conn-error { background: var(--danger-soft); color: var(--danger); } .conn-error .conn-dot { background: var(--danger); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.profile-switcher { padding: 10px 12px; background: var(--surface-2); border-radius: var(--radius-md); margin: 6px; cursor: pointer; transition: background .12s; }
.profile-switcher:hover { background: var(--surface-3); }
.profile-switcher .row-between { gap: var(--sm); }

/* Profile header below brand */
.profile-header {
  padding: 10px 12px;
  margin: 8px 10px 4px;
  background: linear-gradient(135deg, var(--surface-2), var(--surface-3));
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all .15s;
}
.profile-header:hover { border-color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.profile-avatar {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), #8b5cf6);
  color: white;
  border-radius: 8px;
  display: grid; place-items: center;
  font-weight: 700;
  font-size: 15px;
  flex-shrink: 0;
}
.profile-info { flex: 1; min-width: 0; }
.profile-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.profile-meta {
  font-size: 11px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}
.profile-meta .conn-dot { width: 6px; height: 6px; border-radius: 50%; }
.profile-meta.online .conn-dot { background: var(--success); }
.profile-meta.syncing .conn-dot { background: var(--warning); animation: pulse 1s infinite; }
.profile-meta.offline .conn-dot { background: var(--text-tertiary); }
.profile-meta.error .conn-dot { background: var(--danger); }
.profile-header [data-lucide="chevrons-up-down"] { color: var(--text-tertiary); width: 16px; height: 16px; flex-shrink: 0; }

/* Mobile profile chip — fixed at top-right */
.profile-chip-mobile {
  display: none;
  position: fixed;
  top: 8px;
  right: 8px;
  z-index: 51;
  padding: 6px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  box-shadow: var(--shadow-md);
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}
.profile-chip-mobile .profile-avatar { width: 22px; height: 22px; font-size: 11px; border-radius: 6px; }
.profile-chip-mobile [data-lucide] { width: 14px; height: 14px; color: var(--text-tertiary); }
/* Profile chip hidden on mobile — profile lives in More menu instead */
.profile-chip-mobile { display: none !important; }

/* Brand minified (since profile is now at top) */
.brand-mini { padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
.brand-mini .brand-logo { width: 24px; height: 24px; font-size: 12px; border-radius: 6px; }
.brand-mini .brand-text { font-size: 12px; font-weight: 600; color: var(--text-secondary); }

/* ========================================================================
   NOTIFICATION DROPDOWN
======================================================================== */
.notif-bell-wrap { position: relative; }
.notif-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  width: 380px;
  max-width: calc(100vw - 32px);
  max-height: 75vh;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  z-index: 80;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.notif-dropdown.show { display: flex; animation: notifIn .15s ease-out; }
@keyframes notifIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.notif-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);

}
.notif-head-title { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
.notif-list { overflow-y: auto; flex: 1; }
.notif-item {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
  align-items: flex-start;
  font-family: inherit;
}
.notif-item:hover { background: var(--surface-2); }
.notif-item:last-child { border-bottom: none; }
.notif-item.unread { background: rgba(79,70,229,0.04); }
[data-theme="dark"] .notif-item.unread { background: rgba(79,70,229,0.12); }
.notif-item.unread .notif-title { font-weight: 700; color: var(--text-primary); }
.notif-item.read .notif-title { color: var(--text-secondary); font-weight: 400; }
.notif-item.read .notif-icon { opacity: 0.55; }
.notif-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--primary);
  flex-shrink: 0;
  margin-top: 8px;
}
.notif-item.read .notif-dot { background: transparent; }
.notif-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.notif-icon [data-lucide] { width: 16px; height: 16px; }
.notif-icon.warning { background: var(--warning-soft); color: var(--warning); }
.notif-icon.danger { background: var(--danger-soft); color: var(--danger); }
.notif-icon.info { background: var(--info-soft); color: var(--info); }
.notif-icon.success { background: var(--success-soft); color: var(--success); }
.notif-content { flex: 1; min-width: 0; }
.notif-title { font-size: 13px; line-height: 1.45; }
.notif-empty { padding: 40px 20px; text-align: center; color: var(--text-tertiary); }
.notif-empty-icon { font-size: 32px; margin-bottom: 8px; opacity: .6; }

@media (max-width: 768px) {
  .notif-dropdown {
    position: fixed;
    top: auto;
    bottom: 64px;
    left: 8px;
    right: 8px;
    width: auto;
    max-width: none;
    max-height: 70vh;
    border-radius: var(--radius-xl) var(--radius-xl) var(--radius-md) var(--radius-md);
  }
  .notif-dropdown.show { animation: slideUpSheet .25s cubic-bezier(.2,.8,.2,1); }
}

/* ========================================================================
   ACCOUNT 2-LINE CARDS (Variant A)
======================================================================== */
.acc-list { display: flex; flex-direction: column; gap: 8px; }
.acc-card { padding: 12px 14px; }
.acc-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }

}

<script>
/* ============================================================
   FINANCE PORTAL v3 — Sprint 1
============================================================ */

/* ============================================================
   1. INDEXEDDB LAYER
============================================================ */
const DB_NAME = 'FinancePortal';
const DB_VERSION = 3;
const STORES = ['settings','people','accounts','cards','loans','loanEvents','insurance','investments','transactions','recurring','categories','subcategories','taxFlags','auditLog','statementUploads','investmentTxns','attachments','netWorthSnapshots'];

let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      STORES.forEach(s => { if (!d.objectStoreNames.contains(s)) d.createObjectStore(s, { keyPath: 'id' }); });
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function tx(stores, mode='readonly') {
  return db.transaction(stores, mode);
}

async function dbAll(storeName) {
  return new Promise((resolve, reject) => {
    const req = tx([storeName]).objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGet(storeName, id) {
  return new Promise((resolve, reject) => {
    const req = tx([storeName]).objectStore(storeName).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(storeName, obj) {
  return new Promise((resolve, reject) => {
    const t = tx([storeName], 'readwrite');
    const req = t.objectStore(storeName).put(obj);
    req.onsuccess = () => resolve(obj);
    req.onerror = () => reject(req.error);
  });
}

async function dbDel(storeName, id) {
  return new Promise((resolve, reject) => {
    const t = tx([storeName], 'readwrite');
    const req = t.objectStore(storeName).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function dbClear(storeName) {
  return new Promise((resolve, reject) => {
    const t = tx([storeName], 'readwrite');
    const req = t.objectStore(storeName).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// Bulk write — single transaction, much faster than per-row dbPut
async function dbBulkPut(storeName, items) {
  if (!items || !items.length) return;
  return new Promise((resolve, reject) => {
    const t = tx([storeName], 'readwrite');
    const store = t.objectStore(storeName);
    let done = 0;
    items.forEach(it => {
      const req = store.put(it);
      req.onsuccess = () => { if (++done === items.length) resolve(); };
      req.onerror = () => reject(req.error);
    });
    t.onerror = () => reject(t.error);
  });
}

async function dbBulkDel(storeName, ids) {
  if (!ids || !ids.length) return;
  return new Promise((resolve, reject) => {
    const t = tx([storeName], 'readwrite');
    const store = t.objectStore(storeName);
    let done = 0;
    ids.forEach(id => {
      const req = store.delete(id);
      req.onsuccess = () => { if (++done === ids.length) resolve(); };
      req.onerror = () => reject(req.error);
    });
    t.onerror = () => reject(t.error);
  });
}

/* ============================================================
   2. IN-MEMORY STATE (mirror of DB)
============================================================ */
const state = {
  settings: null,
  people: [], accounts: [], cards: [], loans: [], loanEvents: [],
  insurance: [], investments: [], transactions: [], recurring: [],
  categories: [], subcategories: [], taxFlags: [], statementUploads: [],
  investmentTxns: [], attachments: [], netWorthSnapshots: []
};

const DEFAULT_SETTINGS = {
  id: 'default',
  currency: '₹',
  theme: 'light',
  projectionDays: 60,
  fyStartMonth: 4,
  retirementAge: 60,
  inflationRate: 6.0,
  equityBenchmarkReturn: 12.0,
  cardMinPaymentPct: 5.0,
  roundingDecimals: 0,
  dateFormat: 'DD MMM YYYY'
};

const DEFAULT_CATEGORIES = [
  // Income (all essential for cash flow purposes — set true)
  { kind:'income', name:'Salary', essential:true, icon:'briefcase' },
  { kind:'income', name:'Freelance', essential:true, icon:'laptop' },
  { kind:'income', name:'Business', essential:true, icon:'building-2' },
  { kind:'income', name:'Interest', essential:true, icon:'percent' },
  { kind:'income', name:'Dividend', essential:true, icon:'pie-chart' },
  { kind:'income', name:'Rental', essential:true, icon:'home' },
  { kind:'income', name:'Refund', essential:true, icon:'rotate-ccw' },
  { kind:'income', name:'Gift', essential:true, icon:'gift' },
  { kind:'income', name:'Bonus', essential:true, icon:'award' },
  { kind:'income', name:'Other', essential:true, icon:'circle' },
  // Expense — essential
  { kind:'expense', name:'EMI', essential:true, icon:'landmark' },
  { kind:'expense', name:'Housing', essential:true, icon:'home' },
  { kind:'expense', name:'Utilities', essential:true, icon:'zap' },
  { kind:'expense', name:'Groceries', essential:true, icon:'shopping-basket' },
  { kind:'expense', name:'Health', essential:true, icon:'heart-pulse' },
  { kind:'expense', name:'Insurance Premium', essential:true, icon:'shield-check' },
  { kind:'expense', name:'Education', essential:true, icon:'graduation-cap' },
  { kind:'expense', name:'Tax', essential:true, icon:'receipt' },
  // Expense — non-essential
  { kind:'expense', name:'Food', essential:false, icon:'utensils' },
  { kind:'expense', name:'Transport', essential:false, icon:'car' },
  { kind:'expense', name:'Entertainment', essential:false, icon:'film' },
  { kind:'expense', name:'Shopping', essential:false, icon:'shopping-bag' },
  { kind:'expense', name:'Travel', essential:false, icon:'plane' },
  { kind:'expense', name:'Subscription', essential:false, icon:'repeat' },
  { kind:'expense', name:'Personal', essential:false, icon:'user' },
  { kind:'expense', name:'Investment', essential:false, icon:'trending-up' },
  { kind:'expense', name:'Other', essential:false, icon:'circle' }
];

const DEFAULT_SUBCATEGORIES = {
  'Food': ['Restaurants','Tiffin','Cafe','Snacks'],
  'Groceries': ['Vegetables','Dairy','Provisions','Online'],
  'Transport': ['Fuel','Public','Cab','Parking','Service'],
  'Utilities': ['Electricity','Water','Gas','Internet','Mobile','DTH'],
  'Health': ['Doctor','Medicine','Lab','Hospital'],
  'Subscription': ['OTT','Music','Software','Cloud','Gym']
};

const DEFAULT_TAX_FLAGS = ['80C','80D','80CCD','HRA','TDS','GST','LTA','Section 24','Other'];

async function loadState() {
  for (const s of STORES) {
    if (s === 'settings') {
      const all = await dbAll('settings');
      // Offline-only mode: pick the unscoped settings (no profileId)
      state.settings = all.find(x => !x.profileId) || all[0] || null;
    } else {
      // Offline-only mode: show records without profileId (legacy data)
      // When cloud activates, loadProfileFromCache replaces this
      state[s] = (await dbAll(s)).filter(r => !r.profileId);
    }
  }
}

async function initIfFirstRun() {
  if (!state.settings) {
    state.settings = { ...DEFAULT_SETTINGS, id: uid() };
    await dbPut('settings', state.settings);
  } else if (state.settings.id === 'default') {
    // Migrate legacy "default" id to UUID
    const old = state.settings;
    await dbDel('settings', 'default');
    state.settings = { ...old, id: uid() };
    await dbPut('settings', state.settings);
  }
  if (state.categories.length === 0) {
    for (let i = 0; i < DEFAULT_CATEGORIES.length; i++) {
      const c = { id: uid(), displayOrder: i, color: '', ...DEFAULT_CATEGORIES[i] };
      await dbPut('categories', c);
      state.categories.push(c);
      // Subcategories
      const subs = DEFAULT_SUBCATEGORIES[c.name] || [];
      for (let j = 0; j < subs.length; j++) {
        const sc = { id: uid(), categoryId: c.id, name: subs[j], displayOrder: j };
        await dbPut('subcategories', sc);
        state.subcategories.push(sc);
      }
    }
  }
  if (state.taxFlags.length === 0) {
    for (let i = 0; i < DEFAULT_TAX_FLAGS.length; i++) {
      const t = { id: uid(), name: DEFAULT_TAX_FLAGS[i], displayOrder: i };
      await dbPut('taxFlags', t);
      state.taxFlags.push(t);
    }
  }
}

/* ============================================================
   3. UTILITIES
============================================================ */
function uid() {
  // Proper UUID v4 — required for Supabase UUID columns
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  // Fallback for older browsers
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = (typeof crypto !== 'undefined' && crypto.getRandomValues)
      ? crypto.getRandomValues(new Uint8Array(1))[0] & 15
      : Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3) | 0x8).toString(16);
  });
}

// Check if a string looks like a UUID
function isUuid(s) {
  return typeof s === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);
}

function fmt(n, opts={}) {
  const c = state.settings?.currency || '₹';
  const num = Number(n) || 0;
  const dec = opts.decimals ?? state.settings?.roundingDecimals ?? 0;
  const abs = Math.abs(num);
  const str = abs.toLocaleString('en-IN', { minimumFractionDigits: dec, maximumFractionDigits: 2 });
  return (num < 0 ? '−' : '') + c + str;
}

function fmtSigned(n) { return (n >= 0 ? '+' : '') + fmt(n); }
function today() { return new Date().toISOString().slice(0,10); }
function todayDate() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function nowISO() { return new Date().toISOString(); }
function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate() + n); return d.toISOString().slice(0,10); }
function addMonths(date, n) { const d = new Date(date); d.setMonth(d.getMonth() + n); return d.toISOString().slice(0,10); }
function daysUntil(s) { if (!s) return null; return Math.ceil((new Date(s) - todayDate()) / 86400000); }
function fmtDate(s, opts={}) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year: opts.year ?? 'numeric' });
}
function fmtMonth(s) { return new Date(s+'-01').toLocaleDateString('en-IN',{month:'long',year:'numeric'}); }
function monthKey(d) { return (d || today()).slice(0,7); }
function currentMonthKey() { return today().slice(0,7); }
function previousMonthKey() { const d = new Date(today()); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); }
function escapeHTML(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
function getCSS(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

// Lookups
function getAccount(id) { return state.accounts.find(a => a.id === id); }
function getCard(id) { return state.cards.find(c => c.id === id); }
function getLoan(id) { return state.loans.find(l => l.id === id); }
function getPerson(id) { return state.people.find(p => p.id === id); }
function accountLabel(id) { const a = getAccount(id); return a ? `${a.name}${a.last4?' ··'+a.last4:''}` : '—'; }
function cardLabel(id) { const c = getCard(id); return c ? `${c.name}${c.last4?' ··'+c.last4:''}` : '—'; }

async function audit(action, entityType, entityId, before, after, notes) {
  const entry = {
    id: uid(),
    timestamp: nowISO(),
    action,
    entityType,
    entityId: entityId || null,
    beforeData: before || null,
    afterData: after || null,
    notes: notes || null
  };
  await dbPut('auditLog', entry);
  // Async cleanup of old entries (>365 days)
  if (Math.random() < 0.05) cleanOldAudit();
}

async function cleanOldAudit() {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 365);
  const all = await dbAll('auditLog');
  const old = all.filter(a => new Date(a.timestamp) < cutoff);
  for (const o of old) await dbDel('auditLog', o.id);
}

function applyTheme() {

  const theme = (state.settings && state.settings.theme) || (typeof DEFAULT_SETTINGS !== 'undefined' ? DEFAULT_SETTINGS.theme : 'light');
  document.documentElement.dataset.theme = theme;
  const icon = theme === 'dark' ? 'sun' : 'moon';
  const label = theme === 'dark' ? 'Light mode' : 'Dark mode';
  const tt = document.getElementById('themeToggle');
  if (tt) tt.innerHTML = `<i data-lucide="${icon}"></i><span id="themeLabel">${label}</span>`;
  refreshIcons();
}

async function toggleTheme() {
  if (!state.settings) {
    // No settings record yet — initialize a minimal one so the toggle works
    state.settings = { ...(typeof DEFAULT_SETTINGS !== 'undefined' ? DEFAULT_SETTINGS : { theme: 'light' }), id: (typeof uid === 'function' ? uid() : 'default') };
  }
  state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
  await dbPut('settings', state.settings);
  applyTheme();
  renderCurrent();
}

/* ============================================================
   9. RECURRING AUTO-DRAFT ENGINE
============================================================ */
async function generateRecurringDrafts() {
  let created = 0;
  for (const r of state.recurring.filter(x => x.active !== false && x.autoCreateDrafts !== false)) {
    const horizon = (r.draftAdvanceMonths || 3) * 31;
    const start = todayDate();
    const end = new Date(start); end.setDate(end.getDate() + horizon);
    const rEnd = r.endDate ? new Date(r.endDate) : end;
    const limit = rEnd < end ? rEnd : end;
    const rStart = r.startDate ? new Date(Math.max(new Date(r.startDate).getTime(), start.getTime())) : new Date(start);
    const dates = [];
    if (r.frequency === 'monthly') {
      let cur = new Date(rStart);
      while (cur <= limit) {
        const lastOfMonth = new Date(cur.getFullYear(), cur.getMonth()+1, 0).getDate();
        const day = Math.min(r.dayOfMonth || 1, lastOfMonth);
        const fire = new Date(cur.getFullYear(), cur.getMonth(), day);
        if (fire >= start && fire <= limit) dates.push(fire.toISOString().slice(0,10));
        cur.setMonth(cur.getMonth() + 1);
      }
    } else if (r.frequency === 'yearly') {
      let cur = new Date(rStart);
      while (cur <= limit) {
        const fire = new Date(cur.getFullYear(), (r.month || 1) - 1, r.dayOfMonth || 1);
        if (fire >= start && fire <= limit) dates.push(fire.toISOString().slice(0,10));
        cur.setFullYear(cur.getFullYear() + 1);
      }
    } else if (r.frequency === 'quarterly') {
      let cur = new Date(rStart);
      while (cur <= limit) {
        dates.push(cur.toISOString().slice(0,10));
        cur.setMonth(cur.getMonth() + 3);
      }
    } else if (r.frequency === 'weekly') {
      let cur = new Date(rStart);
      while (cur <= limit) {
        dates.push(cur.toISOString().slice(0,10));
        cur.setDate(cur.getDate() + 7);
      }
    }
    // Create drafts for each date that doesn't yet have one
    for (const d of dates) {
      const exists = state.transactions.some(t => t.recurringId === r.id && t.date === d);
      if (exists) continue;
      const draft = {
        id: uid(),
        type: r.type,
        status: 'Draft',
        source: 'Recurring',
        date: d,
        amount: +r.amount,
        category: r.category,
        subcategory: '',
        fromAccountId: r.fromAccountId || null,
        toAccountId: r.toAccountId || null,
        cardId: r.cardId || null,
        loanId: null, insuranceId: null,
        recurringId: r.id,
        payee: r.label || '',
        mode: '',
        reference: '',
        taxFlag: '',
        note: 'From recurring: ' + (r.label || ''),
        draftCreatedAt: nowISO(),
        settledAt: null
      };
      await dbPut('transactions', draft);
      state.transactions.push(draft);
      created++;
    }
  }
  return created;
}

/* ============================================================
   10. BALANCE APPLY (used by Transactions)
============================================================ */
async function applyTxnToBalance(t, sign) {
  // sign +1 to apply, -1 to reverse
  const from = getAccount(t.fromAccountId);
  const to = getAccount(t.toAccountId);
  if (t.type === 'income' && to) {
    to.balance = +to.balance + sign * +t.amount;
    await dbPut('accounts', to);
  } else if (t.type === 'expense' && from) {
    from.balance = +from.balance - sign * +t.amount;
    await dbPut('accounts', from);
  } else if (t.type === 'settlement' && from) {
    from.balance = +from.balance - sign * +t.amount;
    await dbPut('accounts', from);
  } else if (t.type === 'transfer') {
    if (from) { from.balance = +from.balance - sign * +t.amount; await dbPut('accounts', from); }
    if (to) { to.balance = +to.balance + sign * +t.amount; await dbPut('accounts', to); }
  }
}

function getCardOutstanding(cardId) {
  const exp = state.transactions
    .filter(t => t.cardId === cardId && t.type === 'expense' && t.status === 'Settled')
    .reduce((s,t) => s + +t.amount, 0);
  const set = state.transactions
    .filter(t => t.cardId === cardId && t.type === 'settlement' && t.status === 'Settled')
    .reduce((s,t) => s + +t.amount, 0);
  return exp - set;
}

function getCardCycle(cardId, refDate) {
  const c = getCard(cardId); if (!c) return null;
  const now = refDate ? new Date(refDate) : new Date();
  const billDay = c.billDay || 1;
  let cycleStart = new Date(now.getFullYear(), now.getMonth(), billDay);
  if (now < cycleStart) cycleStart.setMonth(cycleStart.getMonth() - 1);
  const cycleEnd = new Date(cycleStart); cycleEnd.setMonth(cycleEnd.getMonth() + 1); cycleEnd.setDate(cycleEnd.getDate() - 1);
  const dueDay = c.dueDay || 25;
  let dueDate = new Date(cycleEnd.getFullYear(), cycleEnd.getMonth(), dueDay);
  if (dueDate < cycleEnd) dueDate.setMonth(dueDate.getMonth() + 1);
  return {
    startDate: cycleStart.toISOString().slice(0,10),
    endDate: cycleEnd.toISOString().slice(0,10),
    dueDate: dueDate.toISOString().slice(0,10)
  };
}

/* ============================================================
   11. ALERTS (for Dashboard)
============================================================ */
function computeAlerts() {
  const out = [];
  // Card dues
  state.cards.filter(c => c.status !== 'Closed').forEach(c => {
    const cycle = getCardCycle(c.id);
    const outstanding = getCardOutstanding(c.id);
    if (cycle && outstanding > 0) {
      const d = daysUntil(cycle.dueDate);
      if (d !== null && d <= 7) {
        out.push({ key:'card-'+c.id, type: d <= 2 ? 'danger' : 'warning', icon:'credit-card',
          msg: `<strong>${escapeHTML(c.name)}</strong> bill ${fmt(outstanding)} due in ${d} day${d===1?'':'s'} (${fmtDate(cycle.dueDate)})` });
      }
    }
  });
  // Loan EMIs
  state.loans.filter(l => l.status === 'Active' && l.emiDay).forEach(l => {
    const now = new Date();
    let next = new Date(now.getFullYear(), now.getMonth(), l.emiDay);
    if (next < todayDate()) next.setMonth(next.getMonth() + 1);
    const d = Math.ceil((next - todayDate()) / 86400000);
    if (d <= 5) {
      out.push({ key:'loan-'+l.id, type: d <= 1 ? 'warning' : 'info', icon:'landmark',
        msg: `<strong>${escapeHTML(l.name)}</strong> EMI ${fmt(l.currentEmi || l.originalEmi)} due in ${d} day${d===1?'':'s'}` });
    }
  });
  // Insurance renewals
  state.insurance.filter(i => i.status === 'Active').forEach(i => {
    const d = daysUntil(i.renewalDate);
    if (d !== null && d >= 0 && d <= 30) {
      out.push({ key:'ins-'+i.id, type: d <= 7 ? 'warning' : 'info', icon:'shield-check',
        msg: `<strong>${escapeHTML(i.name)}</strong> renewal in ${d} day${d===1?'':'s'} · premium ${fmt(i.premium)}` });
    }
  });
  return out;
}

      <div class="card mb-md">
        <div class="section-title">Accounts at a glance</div>

          ${state.accounts.filter(a => a.status === 'Active').slice(0, 8).map(a => `
            <div class="card clickable" style="padding:12px;" onclick="navigate('accounts')">
              <div class="row-between">

    </div>`;
  renderCategoryChart(monthTxns.filter(t => t.type === 'expense'));
  renderTrendChart();
  refreshIcons();
}

function renderCategoryChart(expenses) {
  const cats = {}; expenses.forEach(t => { cats[t.category] = (cats[t.category] || 0) + +t.amount; });
  const labels = Object.keys(cats), data = Object.values(cats);
  const ctx = document.getElementById('catChart'); if (!ctx) return;
  if (catChartInst) catChartInst.destroy();
  if (!labels.length) { ctx.parentElement.innerHTML = '<div class="empty"><div class="empty-icon"><i data-lucide="inbox"></i></div><div class="empty-sub">No expenses this month yet</div></div>'; refreshIcons(); return; }
  const colors = ['#4f46e5','#10b981','#f59e0b','#ef4444','#0ea5e9','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16','#06b6d4','#a855f7'];
  catChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: getCSS('--text-primary'), padding: 10, font: { size: 11, family: 'Inter' } } },
        tooltip: { callbacks: { label: c => `${c.label}: ${fmt(c.parsed)}` } }
      }
    }
  });
}

function renderTrendChart() {
  const labels = [], inc = [], exp = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.toISOString().slice(0, 7);
    labels.push(d.toLocaleDateString('en-IN', { month: 'short' }));
    const m = state.transactions.filter(t => t.status === 'Settled' && t.date.startsWith(key));
    inc.push(m.filter(t => t.type === 'income').reduce((s,t) => s + +t.amount, 0));
    exp.push(m.filter(t => t.type === 'expense').reduce((s,t) => s + +t.amount, 0));
  }
  const ctx = document.getElementById('trendChart'); if (!ctx) return;
  if (trendChartInst) trendChartInst.destroy();
  trendChartInst = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [
      { label: 'Income', data: inc, backgroundColor: '#15803d', borderRadius: 6 },
      { label: 'Expense', data: exp, backgroundColor: '#dc2626', borderRadius: 6 }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { ticks: { color: getCSS('--text-secondary'), font: { family: 'Inter' } }, grid: { display: false } },
        y: { ticks: { color: getCSS('--text-secondary'), callback: v => fmt(v), font: { family: 'Inter' } }, grid: { color: getCSS('--border') } }
      },
      plugins: {
        legend: { labels: { color: getCSS('--text-primary'), font: { size: 11, family: 'Inter' } } },
        tooltip: { callbacks: { label: c => `${c.dataset.label}: ${fmt(c.parsed.y)}` } }
      }
    }
  });
}

/* ============================================================
   NOTIFICATION DROPDOWN (global on every page)
============================================================ */
let notifDropdownOpen = false;

function getUnreadAlertCount() {
  const alerts = computeAlerts();
  const readKeys = (state.settings && state.settings.notificationsRead) || [];
  return alerts.filter(a => !readKeys.includes(a.key)).length;
}

function bellHTML() {
  const unread = getUnreadAlertCount();
  return `<div class="notif-bell-wrap">
    <button class="btn btn-secondary btn-bell" title="Notifications" onclick="toggleNotifDropdown(event)">
      <i data-lucide="bell"></i>${unread > 0 ? `<span class="bell-badge">${unread}</span>` : ''}
    </button>
    <div class="notif-dropdown" id="notifDropdown"></div>
  </div>`;
}

function renderNotifDropdown() {
  const alerts = computeAlerts();
  const readKeys = (state.settings && state.settings.notificationsRead) || [];
  const unread = alerts.filter(a => !readKeys.includes(a.key));
  const read = alerts.filter(a => readKeys.includes(a.key));
  // Sort: unread first (newest type-priority), then read
  const sortedAlerts = [...unread, ...read];
  const dd = document.getElementById('notifDropdown');
  if (!dd) return;
  dd.innerHTML = `
    <div class="notif-head">
      <div class="notif-head-title">
        Notifications ${unread.length ? `<span class="badge badge-primary">${unread.length}</span>` : ''}
      </div>
      ${unread.length ? `<button class="btn btn-ghost btn-sm" onclick="markAllNotifRead(event)"><i data-lucide="check-check"></i>Mark all read</button>` : ''}
    </div>
    <div class="notif-list">
      ${alerts.length === 0 ? `<div class="notif-empty">
        <div class="notif-empty-icon"><i data-lucide="check-circle" style="width:36px;height:36px;color:var(--success);"></i></div>
        <div class="fw-700" style="color:var(--text-primary);">All caught up</div>
        <div class="text-xs text-tertiary mt-sm">No alerts right now</div>
      </div>` : sortedAlerts.map(a => notifItemHTML(a, readKeys.includes(a.key))).join('')}
    </div>
  `;
  refreshIcons();
}

function notifItemHTML(a, isRead) {
  // Determine destination page from alert key prefix
  const prefix = a.key.split('-')[0];
  const navMap = { card:'cards', loan:'loans', ins:'insurance', bal:'accounts', amb:'accounts', aqb:'accounts', fd:'accounts' };
  const navTo = navMap[prefix] || 'dashboard';
  return `<button class="notif-item ${isRead ? 'read' : 'unread'}" onclick="handleNotifClick('${a.key}','${navTo}')">
    <div class="notif-dot"></div>
    <div class="notif-icon ${a.type}"><i data-lucide="${a.icon}"></i></div>
    <div class="notif-content">
      <div class="notif-title">${a.msg}</div>
    </div>
  </button>`;
}

async function handleNotifClick(key, navTo) {
  if (!state.settings.notificationsRead) state.settings.notificationsRead = [];
  if (!state.settings.notificationsRead.includes(key)) {
    state.settings.notificationsRead.push(key);
    await dbPut('settings', state.settings);
  }
  closeNotifDropdown();
  if (navTo && navTo !== currentPage) navigate(navTo);
  else { updateBellBadges(); renderCurrent(); }
}

async function markAllNotifRead(e) {
  if (e) e.stopPropagation();
  const alerts = computeAlerts();
  if (!state.settings.notificationsRead) state.settings.notificationsRead = [];
  alerts.forEach(a => {
    if (!state.settings.notificationsRead.includes(a.key)) state.settings.notificationsRead.push(a.key);
  });
  await dbPut('settings', state.settings);
  renderNotifDropdown();
  updateBellBadges();
}

function updateBellBadges() {
  const unread = getUnreadAlertCount();
  document.querySelectorAll('.notif-bell-wrap').forEach(wrap => {
    const btn = wrap.querySelector('button.btn-bell');
    if (!btn) return;
    let badge = btn.querySelector('.bell-badge');
    if (unread > 0) {
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'bell-badge';
        btn.appendChild(badge);
      }
      badge.textContent = unread;
    } else if (badge) badge.remove();
  });
}

function toggleNotifDropdown(e) {
  if (e) e.stopPropagation();
  const dd = document.getElementById('notifDropdown');
  if (!dd) return;
  if (dd.classList.contains('show')) {
    dd.classList.remove('show');
    notifDropdownOpen = false;
  } else {
    renderNotifDropdown();
    dd.classList.add('show');
    notifDropdownOpen = true;
  }
}

function closeNotifDropdown() {
  const dd = document.getElementById('notifDropdown');
  if (dd) dd.classList.remove('show');
  notifDropdownOpen = false;
}

// Close when clicking outside or pressing Escape
document.addEventListener('click', (e) => {
  if (!notifDropdownOpen) return;
  if (!e.target.closest('.notif-bell-wrap')) closeNotifDropdown();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && notifDropdownOpen) closeNotifDropdown();
});

/* Inject bell into every page's topbar after render */
function injectGlobalBell() {
  const actions = document.querySelector('.topbar .topbar-actions');
  if (!actions) return;
  if (actions.querySelector('.notif-bell-wrap')) return; // already there
  const wrapper = document.createElement('div');
  wrapper.innerHTML = bellHTML();
  actions.insertBefore(wrapper.firstElementChild, actions.firstChild);
  refreshIcons();
}

/* Legacy compat — anything still calling showNotifications opens dropdown */
function showNotifications() { toggleNotifDropdown(); }
/* ============================================================
   TRANSACTIONS MODULE (Draft/Settled workflow)
============================================================ */
const TXN_TYPES = [
  { id:'income',     label:'Income',           icon:'arrow-down-left',  color:'success' },
  { id:'expense',    label:'Expense',          icon:'arrow-up-right',   color:'danger' },
  { id:'settlement', label:'Card Settlement',  icon:'banknote',         color:'info' },
  { id:'transfer',   label:'Internal Transfer',icon:'arrow-right-left', color:'muted' }
];
const TRANSFER_MODES = ['NEFT','IMPS','UPI','RTGS','Cheque','Cash withdrawal','Cash deposit','Wallet','Other'];
let txnFilter = { type:'all', month:'', category:'all', account:'all', card:'all', status:'all', tax:'all', search:'' };

function renderTransactions() {
  const main = document.getElementById('main');
  const months = [...new Set(state.transactions.map(t => t.date.slice(0,7)))].sort().reverse();
  const allCats = [...new Set(state.transactions.map(t => t.category).filter(Boolean))].sort();
  const filtered = filterTxns();
  const sum = { income:0, expense:0, settlement:0, transfer:0 };
  filtered.filter(t => t.status === 'Settled').forEach(t => sum[t.type] = (sum[t.type] || 0) + +t.amount);
  const draftCount = filtered.filter(t => t.status === 'Draft').length;
  main.innerHTML = `
    <div class="topbar">
      <div><div class="page-title">Transactions</div>
        <div class="page-sub">${filtered.length} of ${state.transactions.length} · ${draftCount} draft${draftCount===1?'':'s'} · In ${fmt(sum.income)} · Out ${fmt(sum.expense + sum.settlement)}</div></div>
      <button class="btn btn-primary" onclick="openTxnModal()"><i data-lucide="plus"></i>Add Transaction</button>
    </div>
    <div class="filter-bar">
      <select id="fStatus">
        <option value="all">All status</option>
        <option value="Draft" ${txnFilter.status==='Draft'?'selected':''}>Drafts only</option>
        <option value="Settled" ${txnFilter.status==='Settled'?'selected':''}>Settled only</option>
      </select>
      <select id="fType">
        <option value="all">All types</option>
        ${TXN_TYPES.map(t => `<option value="${t.id}" ${txnFilter.type === t.id ? 'selected' : ''}>${t.label}</option>`).join('')}
      </select>
      <select id="fMonth"><option value="">All months</option>${months.map(m => `<option value="${m}" ${txnFilter.month === m ? 'selected' : ''}>${fmtMonth(m)}</option>`).join('')}</select>
      <select id="fCat"><option value="all">All categories</option>${allCats.map(c => `<option value="${c}" ${txnFilter.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
      <select id="fAccount"><option value="all">All accounts</option>${state.accounts.map(a => `<option value="${a.id}" ${txnFilter.account === a.id ? 'selected' : ''}>${escapeHTML(a.name)}</option>`).join('')}</select>
      <select id="fCard"><option value="all">All cards</option>${state.cards.map(c => `<option value="${c.id}" ${txnFilter.card === c.id ? 'selected' : ''}>${escapeHTML(c.name)}</option>`).join('')}</select>
      <input class="search-input" id="fSearch" placeholder="Search…" value="${escapeHTML(txnFilter.search)}" />
    </div>
    <div class="card"><div class="list" id="txnList">${renderTxnList(filtered)}</div></div>`;
  ['fStatus','fType','fMonth','fCat','fAccount','fCard'].forEach(id => {
    document.getElementById(id).onchange = () => { updateTxnFilters(); document.getElementById('txnList').innerHTML = renderTxnList(filterTxns()); refreshIcons(); };
  });
  document.getElementById('fSearch').oninput = () => { updateTxnFilters(); document.getElementById('txnList').innerHTML = renderTxnList(filterTxns()); refreshIcons(); };
  refreshIcons();
}

function updateTxnFilters() {
  txnFilter = {
    status: document.getElementById('fStatus').value,
    type: document.getElementById('fType').value,
    month: document.getElementById('fMonth').value,
    category: document.getElementById('fCat').value,
    account: document.getElementById('fAccount').value,
    card: document.getElementById('fCard').value,
    tax: 'all',
    search: document.getElementById('fSearch').value.toLowerCase()
  };
}

function filterTxns() {
  return state.transactions.filter(t => {
    if (txnFilter.status !== 'all' && t.status !== txnFilter.status) return false;
    if (txnFilter.type !== 'all' && t.type !== txnFilter.type) return false;
    if (txnFilter.month && !t.date.startsWith(txnFilter.month)) return false;
    if (txnFilter.category !== 'all' && t.category !== txnFilter.category) return false;
    if (txnFilter.account !== 'all' && t.fromAccountId !== txnFilter.account && t.toAccountId !== txnFilter.account) return false;
    if (txnFilter.card !== 'all' && t.cardId !== txnFilter.card) return false;
    if (txnFilter.search) {
      const hay = (t.note || '') + ' ' + (t.payee || '') + ' ' + (t.reference || '') + ' ' + (t.category || '');
      if (!hay.toLowerCase().includes(txnFilter.search)) return false;
    }
    return true;
  }).sort((a, b) => b.date.localeCompare(a.date));
}

function renderTxnList(list, opts = {}) {
  if (!list.length) return `<div class="empty">
    <div class="empty-icon"><i data-lucide="inbox"></i></div>
    <div class="empty-title">No transactions</div>
    <div class="empty-sub">Tap Add Transaction to create your first one.</div>
  </div>`;
  return list.map(t => txnRowHTML(t, opts)).join('');
}

function txnRowHTML(t, opts = {}) {
  const tt = TXN_TYPES.find(x => x.id === t.type) || TXN_TYPES[1];
  const sign = t.type === 'income' ? '+' : (t.type === 'expense' || t.type === 'settlement') ? '−' : '';
  const amountClass = t.type === 'income' ? 'pos' : (t.type === 'expense' || t.type === 'settlement') ? 'neg' : '';
  let detail = '';
  if (t.type === 'transfer') detail = `${accountLabel(t.fromAccountId)} → ${accountLabel(t.toAccountId)}`;
  else if (t.type === 'settlement') detail = `${accountLabel(t.fromAccountId)} → ${cardLabel(t.cardId)}`;
  else if (t.type === 'income') detail = `→ ${accountLabel(t.toAccountId)}`;
  else detail = t.cardId ? `← ${cardLabel(t.cardId)}` : `← ${accountLabel(t.fromAccountId)}`;
  const isDraft = t.status === 'Draft';
  return `<div class="list-item ${isDraft ? 'draft' : ''}">
    <div class="list-icon icon-${tt.color}"><i data-lucide="${tt.icon}"></i></div>
    <div class="list-main">
      <div class="list-title">
        ${isDraft ? '<span class="badge badge-warning" style="margin-right:6px;">Draft</span>' : ''}
        ${escapeHTML(t.category || tt.label)}${t.subcategory ? ` <span class="text-tertiary text-xs">/ ${escapeHTML(t.subcategory)}</span>` : ''}
        ${t.note ? ` <span class="text-muted text-xs">· ${escapeHTML(t.note)}</span>` : ''}
      </div>
      <div class="list-sub">${fmtDate(t.date)} · ${detail}${t.taxFlag ? ` · <span class="badge badge-primary">${escapeHTML(t.taxFlag)}</span>` : ''}</div>
    </div>
    <div class="list-amount ${amountClass}">${sign}${fmt(t.amount)}</div>
    ${opts.compact ? '' : `<div class="list-actions">
      ${isDraft ? `<button class="btn btn-success btn-sm" title="Settle" onclick="settleDraft('${t.id}')"><i data-lucide="check"></i>Settle</button>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="openTxnModal('${t.id}')"><i data-lucide="pencil"></i></button>
      <button class="btn btn-ghost btn-sm" onclick="deleteTxn('${t.id}')"><i data-lucide="trash-2"></i></button>
    </div>`}
  </div>`;
}

function openTxnModal(id) {
  const t = id ? state.transactions.find(x => x.id === id) : { type: 'expense', date: today(), status: 'Draft' };
  buildTxnForm(t, id);
}

function buildTxnForm(t, id) {
  const acctOpts = state.accounts.filter(a => a.status === 'Active').map(a => `<option value="${a.id}">${escapeHTML(a.name)} (${fmt(a.balance)})</option>`).join('');

  const cats = state.categories.filter(c => c.kind === (t.type === 'income' ? 'income' : 'expense')).sort((a,b) => a.displayOrder - b.displayOrder);
  const subs = state.subcategories.filter(s => { const c = state.categories.find(c => c.name === t.category); return c && s.categoryId === c.id; });

      <div class="form-row form-row-2">
        <div><label>Category</label><select id="txCategory" onchange="refreshTxnSubcats()">${cats.map(c => `<option ${t.category === c.name ? 'selected' : ''}>${c.name}</option>`).join('')}</select></div>
        <div><label>Subcategory</label><select id="txSubCat"><option value="">—</option>${subs.map(s => `<option ${t.subcategory === s.name ? 'selected' : ''}>${s.name}</option>`).join('')}</select></div>
      </div>
      <div class="form-row form-row-2">

          <option value="account" ${!t.cardId ? 'selected' : ''}>From account</option>

      <div class="form-row form-row-2">
        <div><label>From account</label><select id="txFrom">${acctOpts}</select></div>
        <div><label>To card</label><select id="txCard">${cardOpts}</select></div>

      </div>
      <div class="form-row form-row-2">
        <div><label>Mode</label><select id="txMode">${TRANSFER_MODES.map(m => `<option ${t.mode === m ? 'selected' : ''}>${m}</option>`).join('')}</select></div>
        <div><label>Reference</label><input id="txRef" value="${t.reference ? escapeHTML(t.reference) : ''}" /></div>
      </div>
      <input type="hidden" id="txCategory" value="Transfer" />`;
  }

  openModal(id ? `${t.status === 'Draft' ? 'Edit Draft' : 'Edit'} Transaction` : 'Add Transaction', `
    <input type="hidden" id="txType" value="${t.type}" />
    <input type="hidden" id="txStatus" value="${defaultStatus}" />

function switchTxnType(id, newType) {

function refreshTxnSubcats() {

function toggleExpenseSource() {

async function saveTxn(id) {
  const tType = document.getElementById('txType').value;
  const saveAs = document.querySelector('input[name="saveAs"]:checked')?.value || 'Settled';
  const amount = +document.getElementById('txAmount').value;
  if (!amount || amount <= 0) { toast('Invalid amount','error'); return; }
  const dateVal = document.getElementById('txDate').value;
  const obj = {
    id: id || uid(),
    type: tType,
    status: saveAs,
    source: id ? (state.transactions.find(x => x.id === id).source || 'Manual') : 'Manual',
    date: dateVal,
    amount,
    category: (document.getElementById('txCategory')?.value) || '',
    subcategory: (document.getElementById('txSubCat')?.value) || '',
    fromAccountId: (document.getElementById('txFrom')?.value) || null,
    toAccountId: (document.getElementById('txTo')?.value) || null,
    cardId: null,
    loanId: id ? (state.transactions.find(x => x.id === id).loanId || null) : null,
    insuranceId: id ? (state.transactions.find(x => x.id === id).insuranceId || null) : null,
    recurringId: id ? (state.transactions.find(x => x.id === id).recurringId || null) : null,
    payee: (document.getElementById('txPayee')?.value || '').trim(),
    mode: (document.getElementById('txMode')?.value) || '',
    reference: (document.getElementById('txRef')?.value || '').trim(),
    taxFlag: (document.getElementById('txTax')?.value) || '',
    note: (document.getElementById('txNote')?.value || '').trim(),
    draftCreatedAt: id ? (state.transactions.find(x => x.id === id).draftCreatedAt || nowISO()) : nowISO(),
    settledAt: saveAs === 'Settled' ? nowISO() : null
  };
  // Card handling
  if (tType === 'expense') {
    const isCard = document.getElementById('txPayMode')?.value === 'card';
    if (isCard) { obj.fromAccountId = null; obj.cardId = document.getElementById('txCard')?.value || null; if (!obj.cardId) { toast('Choose card','error'); return; } }
    else { obj.cardId = null; if (!obj.fromAccountId) { toast('Choose source account','error'); return; } }
  } else if (tType === 'settlement') {
    obj.cardId = document.getElementById('txCard')?.value || null;
    if (!obj.fromAccountId || !obj.cardId) { toast('Need from-account and to-card','error'); return; }
    obj.category = 'Card Settlement';
  } else if (tType === 'transfer') {
    if (!obj.fromAccountId || !obj.toAccountId) { toast('Need both accounts','error'); return; }
    if (obj.fromAccountId === obj.toAccountId) { toast('From and to must differ','error'); return; }
    obj.category = 'Transfer';
  } else if (tType === 'income') {
    if (!obj.toAccountId) { toast('Choose destination account','error'); return; }
  }
  // Reverse old, apply new
  let before = null;
  if (id) {
    const old = state.transactions.find(x => x.id === id);
    before = { ...old };
    if (old.status === 'Settled') await applyTxnToBalance(old, -1);
    const idx = state.transactions.findIndex(x => x.id === id);
    state.transactions[idx] = obj;
  } else {
    state.transactions.push(obj);
  }
  if (obj.status === 'Settled') await applyTxnToBalance(obj, +1);
  await dbPut('transactions', obj);
  await audit(id ? 'update' : 'create', 'transaction', obj.id, before, obj);
  closeModal();
  toast(saveAs === 'Settled' ? 'Settled' : 'Draft saved','success');
  renderCurrent();
}

async function settleDraft(id) {
  const t = state.transactions.find(x => x.id === id); if (!t) return;
  if (t.status !== 'Draft') return;
  const before = { ...t };
  t.status = 'Settled';
  t.settledAt = nowISO();
  await applyTxnToBalance(t, +1);
  await dbPut('transactions', t);
  await audit('update', 'transaction', t.id, before, t, 'Settled');
  // If from recurring, ensure next draft exists
  if (t.recurringId) await generateRecurringDrafts();
  toast('Settled — balance updated','success');
  renderCurrent();
}

async function deleteTxn(id, fromModal) {
  const t = state.transactions.find(x => x.id === id); if (!t) return;
  const isDraft = t.status === 'Draft';
  if (!confirm(isDraft ? 'Delete this draft?' : 'Delete this settled transaction? Balance will be reversed.')) return;
  if (t.status === 'Settled') await applyTxnToBalance(t, -1);
  await dbDel('transactions', id);
  state.transactions = state.transactions.filter(x => x.id !== id);
  await audit('delete', 'transaction', id, t, null);
  if (fromModal) closeModal();
  toast('Deleted','success');
  renderCurrent();
}

const RECUR_FREQ = ['monthly','weekly','quarterly','yearly'];
const RECUR_TYPES = [
  { id:'income', label:'Income', icon:'arrow-down-left' },
  { id:'expense', label:'Expense', icon:'arrow-up-right' },
  { id:'settlement', label:'Card Settlement', icon:'banknote' },
  { id:'transfer', label:'Transfer', icon:'arrow-right-left' }
];

function renderRecurring() {
  const main = document.getElementById('main');
  const active = state.recurring.filter(r => r.active !== false);
  const paused = state.recurring.filter(r => r.active === false);
  const monthlyIn = active.filter(r => r.type === 'income').reduce((s,r) => s + monthlyEquivalent(r), 0);
  const monthlyOut = active.filter(r => r.type === 'expense' || r.type === 'settlement').reduce((s,r) => s + monthlyEquivalent(r), 0);
  main.innerHTML = `
    <div class="topbar">

    </div>

      <div>Recurring templates auto-create Draft transactions for upcoming months. Settle drafts when they actually happen.</div></div>
    ${state.recurring.length === 0 ? `
      <div class="empty">
        <div class="empty-icon"><i data-lucide="repeat"></i></div>
        <div class="empty-title">No recurring templates</div>
        <div class="empty-sub">Add salary, rent, EMIs, subscriptions — they'll feed Projection.</div>
        <button class="btn btn-primary" onclick="openRecurringModal()"><i data-lucide="plus"></i>Add first template</button>
      </div>
    ` : `

      ${paused.length ? `<div class="card">
        <div class="section-title">Paused templates</div>
        <div class="list">${paused.map(r => recurringRowHTML(r)).join('')}</div>
      </div>` : ''}
    `}`;
  refreshIcons();
}

function monthlyEquivalent(r) {
  const a = +r.amount || 0;
  switch (r.frequency) {
    case 'weekly': return a * 52 / 12;
    case 'monthly': return a;
    case 'quarterly': return a / 3;
    case 'yearly': return a / 12;
    default: return 0;
  }
}

function recurringRowHTML(r) {
  const tt = RECUR_TYPES.find(t => t.id === r.type) || RECUR_TYPES[1];
  const sign = r.type === 'income' ? '+' : (r.type === 'expense' || r.type === 'settlement') ? '−' : '';
  const amountClass = r.type === 'income' ? 'pos' : (r.type === 'expense' || r.type === 'settlement') ? 'neg' : '';
  const detail = r.type === 'income' ? `→ ${accountLabel(r.toAccountId)}`
              : r.type === 'settlement' ? `${accountLabel(r.fromAccountId)} → ${cardLabel(r.cardId)}`
              : r.type === 'transfer' ? `${accountLabel(r.fromAccountId)} → ${accountLabel(r.toAccountId)}`
              : r.cardId ? `${cardLabel(r.cardId)}` : `← ${accountLabel(r.fromAccountId)}`;
  const sched = r.frequency === 'monthly' ? `Monthly on ${r.dayOfMonth}${getDaySuffix(r.dayOfMonth)}`
              : r.frequency === 'yearly' ? `Yearly on ${r.dayOfMonth}${getDaySuffix(r.dayOfMonth)} ${new Date(2000,(r.month||1)-1).toLocaleDateString('en-IN',{month:'long'})}`
              : r.frequency === 'quarterly' ? 'Quarterly' : 'Weekly';
  return `<div class="list-item ${r.active === false ? 'strike' : ''}">
    <div class="list-icon icon-primary"><i data-lucide="${tt.icon}"></i></div>
    <div class="list-main">
      <div class="list-title">${escapeHTML(r.label)}${r.category ? ` <span class="badge">${escapeHTML(r.category)}</span>` : ''}</div>
